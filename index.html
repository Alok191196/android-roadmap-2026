rst-class Jetpack Compose integration for Coil. Its primary API is **`AsyncImage`**, a composable that infers the correct image size from layout constraints and `ContentScale`, loads the image asynchronously, and supports `placeholder`, `error`, and `fallback` painters. For cases needing a `Painter` directly, `rememberAsyncImagePainter` is available, and `SubcomposeAsyncImage` enables slot-based loading state UI.","resources":[{"type":"Official","title":"Compose – Coil | coil-kt.github.io","url":"https://coil-kt.github.io/coil/compose/"},{"type":"Official","title":"Loading Images | Jetpack Compose | Android Developers","url":"https://developer.android.com/develop/ui/compose/graphics/images/loading"},{"type":"Article","title":"Loading Images with Coil in Android: XML and Jetpack Compose | Medium","url":"https://medium.com/@rajputmukesh748/loading-images-with-coil-in-android-xml-and-jetpack-compose-7a004f7738b1"},{"type":"Video","title":"Jetpack Compose + Coil Image Loading Tutorial | YouTube","url":"https://www.youtube.com/watch?v=jdoJVM5xJBI"}]},"image-loading/libraries/landscapist":{"id":"image-loading/libraries/landscapist","title":"Landscapist","description":"Landscapist is a **pluggable Jetpack Compose and Kotlin Multiplatform image loading library** by skydoves that wraps Glide, Coil, and Fresco with a consistent composable API. It adds capabilities like crossfade animation, blur transformation, circular reveal, and palette extraction on top of the underlying loader. Every composable is marked `@Skippable` and `@Restartable`, minimizing unnecessary recomposition in lazy lists.","resources":[{"type":"Official","title":"Landscapist Documentation | skydoves.github.io","url":"https://skydoves.github.io/landscapist/"},{"type":"Official","title":"Landscapist GitHub Repository | skydoves","url":"https://github.com/skydoves/landscapist"},{"type":"Article","title":"Image Component and Plugin – Landscapist | skydoves.github.io","url":"https://skydoves.github.io/landscapist/image-component-and-plugin/"},{"type":"Repo","title":"Landscapist GitHub Repository | skydoves/landscapist","url":"https://github.com/skydoves/landscapist"},{"type":"Video","title":"Coil - Modern Image Loading Library | Android Studio Tutorial (YouTube)","url":"https://www.youtube.com/watch?v=Ciab3R641YM"}]},"local-storage/databases/room-kmp":{"id":"local-storage/databases/room-kmp","title":"Room (KMP)","description":"Room is Google's official SQLite ORM for Android and, from version 2.7.0, **Kotlin Multiplatform**. It validates SQL at compile time, generates boilerplate DAO implementations, and integrates natively with Kotlin coroutines and Flow for reactive queries. In KMP projects all DAO functions must be `suspend` functions; reactive return types (LiveData, RxJava Flowable) are not supported on non-Android targets—use `Flow` instead.","resources":[{"type":"Official","title":"Set up Room Database for KMP | Android Developers","url":"https://developer.android.com/kotlin/multiplatform/room"},{"type":"Official","title":"Save data in a local database using Room | Android Developers","url":"https://developer.android.com/training/data-storage/room"},{"type":"Article","title":"Room Database for Kotlin Multiplatform | ProAndroidDev","url":"https://proandroiddev.com/room-in-kotlin-multiplatform-kmp-with-koin-d7716bdd8783"},{"type":"Video","title":"The Complete Beginner Guide for Room in Android 2024 | Philipp Lackner (YouTube)","url":"https://www.youtube.com/watch?v=r_UfOz3yaLg"},{"type":"Video","title":"How to Setup a Room DB for Kotlin Multiplatform Compose | Philipp Lackner (YouTube)","url":"https://www.youtube.com/watch?v=IHs0yPa2Nv4"}]},"local-storage/databases/sqlite":{"id":"local-storage/databases/sqlite","title":"SQLite","description":"SQLite is the relational database built into every Android device, accessible via the `android.database.sqlite` package. The raw API (`SQLiteDatabase`, `SQLiteOpenHelper`) gives full control but requires writing boilerplate cursor management code. Google recommends using **Room** as an abstraction layer over raw SQLite in almost all cases. The AndroidX SQLite library (`androidx.sqlite`) provides KMP-compatible low-level APIs (`SQLiteDriver`, `SQLiteConnection`).","resources":[{"type":"Official","title":"Save data using SQLite | Android Developers","url":"https://developer.android.com/training/data-storage/sqlite"},{"type":"Official","title":"SQLiteDatabase API Reference | Android Developers","url":"https://developer.android.com/reference/android/database/sqlite/SQLiteDatabase"},{"type":"Article","title":"Set up SQLite for KMP | Android Developers","url":"https://developer.android.com/kotlin/multiplatform/sqlite"},{"type":"Roadmap","title":"Android Developer Roadmap | roadmap.sh","url":"https://roadmap.sh/android"},{"type":"Video","title":"SQLite Database for Android - Full Course | freeCodeCamp (YouTube)","url":"https://www.youtube.com/watch?v=312RhjfetP8"}]},"local-storage/databases/sqldelight":{"id":"local-storage/databases/sqldelight","title":"SQLDelight","description":"SQLDelight generates **type-safe Kotlin APIs from `.sq` SQL files**, verifying your schema, statements, and migrations at compile time. Unlike Room (which generates SQL from annotations), SQLDelight treats SQL as the source of truth. It supports Kotlin Multiplatform (Android, iOS, JVM, JS) and provides IDE integration with autocomplete and refactoring for `.sq` files. It is a popular Room alternative in pure KMP projects.","resources":[{"type":"Official","title":"SQLDelight Overview | sqldelight.github.io","url":"https://sqldelight.github.io/sqldelight/2.3.2/"},{"type":"Official","title":"SQLDelight GitHub Repository | sqldelight/sqldelight","url":"https://github.com/sqldelight/sqldelight"},{"type":"Article","title":"SQLDelight for KMP (Kotlin Multiplatform) Explained | Medium","url":"https://medium.com/@michalankiersztajn/sqldelight-kmp-kotlin-multiplatform-tutorial-e39ab460a348"},{"type":"Video","title":"Caching the Data in a KMP App Using SQLDelight & Ktor | YouTube","url":"https://www.youtube.com/watch?v=nmKyP-uEUXs"},{"type":"Video","title":"How To Use SQLDelight Database in Compose Multiplatform | YouTube","url":"https://www.youtube.com/watch?v=iRlfJcnLFF8"}]},"local-storage/databases/realm-kotlin-atlas-device-sdk":{"id":"local-storage/databases/realm-kotlin-atlas-device-sdk","title":"Realm Kotlin / Atlas Device SDK","description":"Realm Kotlin (now Atlas Device SDK for Kotlin) is an **offline-first object database** for Android and KMP that stores data as live objects rather than rows, enabling reactive UI updates without manual queries. It optionally syncs with MongoDB Atlas via Device Sync for multi-device and collaborative scenarios. **Note:** As of September 2024, Atlas Device SDKs are deprecated with end-of-life on September 30, 2025; new projects should evaluate Room or SQLDelight instead.","resources":[{"type":"Official","title":"Atlas Device SDK for Kotlin | MongoDB Docs","url":"https://www.mongodb.com/docs/atlas/device-sdks/sdk/kotlin/"},{"type":"Official","title":"realm-kotlin GitHub Repository | realm","url":"https://github.com/realm/realm-kotlin"},{"type":"Article","title":"Introduction to Atlas Device Sync for Android | MongoDB Developer","url":"https://www.mongodb.com/developer/products/realm/introduction-realm-sync-android/"},{"type":"Repo","title":"realm-kotlin GitHub Repository | realm/realm-kotlin","url":"https://github.com/realm/realm-kotlin"},{"type":"Video","title":"Mastering Realm Database in Android: Step-by-Step Tutorial with Kotlin | CRUD Operations (YouTube)","url":"https://www.youtube.com/watch?v=6ACqngKglZA"}]},"local-storage/key-value/datastore":{"id":"local-storage/key-value/datastore","title":"DataStore","description":"Jetpack DataStore is Google's **modern replacement for SharedPreferences**, offering a fully asynchronous API via Kotlin coroutines and Flow with data-consistency guarantees. It comes in two flavors: **Preferences DataStore** (key-value, no schema) and **Proto DataStore** (typed objects backed by Protocol Buffers). DataStore guarantees that reads and writes happen off the main thread and handles data corruption with a catch-all error handler.","resources":[{"type":"Official","title":"DataStore | Android Developers","url":"https://developer.android.com/topic/libraries/architecture/datastore"},{"type":"Official","title":"Working with Preferences DataStore Codelab | Android Developers","url":"https://developer.android.com/codelabs/android-preferences-datastore"},{"type":"Article","title":"All about Proto DataStore | Android Developers – Medium","url":"https://medium.com/androiddevelopers/all-about-proto-datastore-1b1af6cd2879"},{"type":"Video","title":"How To Use Android's Preferences DataStore | Android Jetpack Tutorial (YouTube)","url":"https://www.youtube.com/watch?v=W7ua0qCmH1g"},{"type":"Video","title":"Local Preferences in Kotlin Multiplatform With DataStore | Philipp Lackner (YouTube)","url":"https://www.youtube.com/watch?v=cQ64RkdPZBw"}]},"local-storage/key-value/encrypted-datastore":{"id":"local-storage/key-value/encrypted-datastore","title":"Encrypted DataStore","description":"DataStore has no built-in encryption, but sensitive data can be protected by combining DataStore with **Google Tink** (via the `androidx.datastore:datastore-tink` artifact). The `AeadSerializer` wraps a standard `Serializer\u003cT>` with Authenticated Encryption with Associated Data (AEAD) before writing to disk. The encryption key is stored in the Android Keystore. This supersedes the deprecated `EncryptedSharedPreferences` (deprecated in security-crypto 1.1.0-alpha07).","resources":[{"type":"Official","title":"DataStore | Jetpack Releases | Android Developers","url":"https://developer.android.com/jetpack/androidx/releases/datastore"},{"type":"Official","title":"Security | Jetpack Releases | Android Developers","url":"https://developer.android.com/jetpack/androidx/releases/security"},{"type":"Article","title":"Goodbye EncryptedSharedPreferences: A 2026 Migration Guide | ProAndroidDev","url":"https://proandroiddev.com/goodbye-encryptedsharedpreferences-a-2026-migration-guide-4b819b4a537a"},{"type":"Video","title":"How to Encrypt DataStore On Android - Full Guide | Philipp Lackner (YouTube)","url":"https://www.youtube.com/watch?v=XMaQNN9YpKk"}]},"local-storage/key-value/sharedpreferences-legacy":{"id":"local-storage/key-value/sharedpreferences-legacy","title":"SharedPreferences (legacy)","description":"SharedPreferences is Android's original key-value storage API backed by an XML file. It uses a **synchronous commit/apply API** with no coroutine or Flow support, and can cause `StrictMode` violations when read on the main thread. Google now recommends **DataStore** for all new development. SharedPreferences remains functional for maintaining existing code, but should not be chosen for new features.","resources":[{"type":"Official","title":"Save simple data with SharedPreferences | Android Developers","url":"https://developer.android.com/training/data-storage/shared-preferences"},{"type":"Official","title":"SharedPreferences API Reference | Android Developers","url":"https://developer.android.com/reference/android/content/SharedPreferences"},{"type":"Article","title":"SharedPreferences → DataStore migration | Medium","url":"https://medium.com/geekculture/preferences-4d7119ffae3e"},{"type":"Video","title":"Preferences DataStore in 10min (SharedPreferences deprecated) | YouTube","url":"https://www.youtube.com/watch?v=McnVx7l5awk"}]},"asynchronous-concurrency/coroutines/flow":{"id":"asynchronous-concurrency/coroutines/flow","title":"Flow","description":"Kotlin Flow is a **cold, asynchronous stream** built on coroutines that emits multiple values sequentially. \"Cold\" means the producer code inside `flow { }` only runs when a coroutine actively calls `collect`. Flow supports a rich set of operators (`map`, `filter`, `flatMapLatest`, `combine`, `flowOn`) and is the standard way to model streams in Android's data and domain layers—replacing RxJava's Observable in new Kotlin codebases.","resources":[{"type":"Official","title":"Asynchronous Flow | Kotlin Documentation","url":"https://kotlinlang.org/docs/flow.html"},{"type":"Official","title":"Kotlin flows on Android | Android Developers","url":"https://developer.android.com/kotlin/flow"},{"type":"Article","title":"Flow API Reference | kotlinx.coroutines","url":"https://kotlinlang.org/api/kotlinx.coroutines/kotlinx-coroutines-core/kotlinx.coroutines.flow/-flow/"},{"type":"Video","title":"Flow Basics – The Ultimate Guide to Kotlin Flows (Part 1) | Philipp Lackner (YouTube)","url":"https://www.youtube.com/watch?v=ZX8VsqNO_Ss"},{"type":"Roadmap","title":"Android Developer Roadmap | roadmap.sh","url":"https://roadmap.sh/android"}]},"asynchronous-concurrency/coroutines/stateflow":{"id":"asynchronous-concurrency/coroutines/stateflow","title":"StateFlow","description":"StateFlow is a **hot, state-holder flow** that always has a current value readable synchronously via `.value`. It conflates updates using equality (like `distinctUntilChanged`), so collectors only receive distinct state changes. In Android, `ViewModel` exposes `StateFlow` to the UI layer as observable state that survives configuration changes. Use `MutableStateFlow` inside the ViewModel and expose the read-only `StateFlow` interface to the UI.","resources":[{"type":"Official","title":"StateFlow API Reference | kotlinx.coroutines","url":"https://kotlinlang.org/api/kotlinx.coroutines/kotlinx-coroutines-core/kotlinx.coroutines.flow/-state-flow/"},{"type":"Official","title":"StateFlow and SharedFlow | Android Developers","url":"https://developer.android.com/kotlin/flow/stateflow-and-sharedflow"},{"type":"Article","title":"SharedFlow and StateFlow | kt.academy","url":"https://kt.academy/article/cc-sharedflow-stateflow"},{"type":"Video","title":"StateFlow vs. Flow vs. SharedFlow vs. LiveData – When to Use What | Philipp Lackner (YouTube)","url":"https://www.youtube.com/watch?v=6Jc6-INantQ"},{"type":"Video","title":"Android Jetpack Compose Flow | StateFlow | SharedFlow | Beginner Tutorial (YouTube)","url":"https://www.youtube.com/watch?v=M61MgpzS2U0"}]},"asynchronous-concurrency/coroutines/sharedflow":{"id":"asynchronous-concurrency/coroutines/sharedflow","title":"SharedFlow","description":"SharedFlow is a **hot, broadcast flow** that shares emitted values among all active collectors simultaneously. Unlike StateFlow it has no mandatory initial value and is configurable with a replay cache (values replayed to new subscribers) and buffer overflow strategies (`DROP_OLDEST`, `SUSPEND`). SharedFlow is the right tool for **one-time events** such as navigation commands, snackbars, and analytics triggers that should not be re-delivered on collection.","resources":[{"type":"Official","title":"SharedFlow API Reference | kotlinx.coroutines","url":"https://kotlinlang.org/api/kotlinx.coroutines/kotlinx-coroutines-core/kotlinx.coroutines.flow/-shared-flow/"},{"type":"Official","title":"StateFlow and SharedFlow | Android Developers","url":"https://developer.android.com/kotlin/flow/stateflow-and-sharedflow"},{"type":"Article","title":"SharedFlow and StateFlow | kt.academy","url":"https://kt.academy/article/cc-sharedflow-stateflow"},{"type":"Video","title":"SharedFlow in KOTLIN Android | Replay, Buffer & Overflow Strategies (YouTube)","url":"https://www.youtube.com/watch?v=R9IiBlYB7Mo"},{"type":"Video","title":"StateFlow vs. Flow vs. SharedFlow vs. LiveData – When to Use What | Philipp Lackner (YouTube)","url":"https://www.youtube.com/watch?v=6Jc6-INantQ"}]},"asynchronous-concurrency/coroutines/channels":{"id":"asynchronous-concurrency/coroutines/channels","title":"Channels","description":"Channels are coroutine primitives for **point-to-point communication** of a stream of values between coroutines, conceptually similar to `BlockingQueue` but non-blocking. Each value sent is delivered to exactly **one** receiver (unlike SharedFlow's broadcast). Channel variants include Rendezvous (no buffer), Buffered, Conflated, and Unlimited. For most UI/architecture use cases, Flow (or SharedFlow/StateFlow) is preferred; Channels are most useful for producer-consumer pipeline internals.","resources":[{"type":"Official","title":"Channels | Kotlin Documentation","url":"https://kotlinlang.org/docs/channels.html"},{"type":"Official","title":"Channel API Reference | kotlinx.coroutines","url":"https://kotlinlang.org/api/kotlinx.coroutines/kotlinx-coroutines-core/kotlinx.coroutines.channels/-channel/"},{"type":"Article","title":"Channel in Kotlin Coroutines | kt.academy","url":"https://kt.academy/article/cc-channel"},{"type":"Video","title":"Complete Guide on Kotlin Channels (Coroutines) - Android Studio Tutorial (YouTube)","url":"https://www.youtube.com/watch?v=unkgAYV9SpI"}]},"asynchronous-concurrency/coroutines/structured-concurrency":{"id":"asynchronous-concurrency/coroutines/structured-concurrency","title":"Structured Concurrency","description":"Structured Concurrency is the principle that every coroutine must belong to a **`CoroutineScope`** which bounds its lifetime. Parent coroutines wait for all their children to complete before finishing, and cancellation propagates down the hierarchy automatically. This eliminates coroutine leaks: when a `viewModelScope` is cancelled (on ViewModel `onCleared()`), every in-flight coroutine it launched is cancelled too—no manual cleanup needed.","resources":[{"type":"Official","title":"Coroutines Basics – Structured Concurrency | Kotlin Documentation","url":"https://kotlinlang.org/docs/coroutines-basics.html"},{"type":"Official","title":"Kotlin coroutines on Android | Android Developers","url":"https://developer.android.com/kotlin/coroutines"},{"type":"Article","title":"Structured Concurrency | Roman Elizarov – Medium","url":"https://elizarov.medium.com/structured-concurrency-722d765aa952"},{"type":"Video","title":"Understand Kotlin Coroutines on Android (Google I/O 2019) | Android Developers (YouTube)","url":"https://www.youtube.com/watch?v=BOHK_w09pVA"},{"type":"Course","title":"Introduction to Coroutines in Kotlin Playground | Android Developers Codelab","url":"https://developer.android.com/codelabs/basic-android-kotlin-compose-coroutines-kotlin-playground"}]},"asynchronous-concurrency/coroutines/dispatchers":{"id":"asynchronous-concurrency/coroutines/dispatchers","title":"Dispatchers","description":"Coroutine Dispatchers determine which **thread pool** a coroutine runs on. `Dispatchers.Main` runs on the Android main/UI thread; `Dispatchers.IO` uses an elastic pool sized for blocking I/O (network, file, database); `Dispatchers.Default` uses a CPU-bounded pool for compute-heavy work (sorting, parsing); `Dispatchers.Unconfined` runs in the calling thread until the first suspension. Use `withContext(Dispatchers.IO)` to switch dispatchers within a coroutine rather than launching a new one.","resources":[{"type":"Official","title":"Coroutine Context and Dispatchers | Kotlin Documentation","url":"https://kotlinlang.org/docs/coroutine-context-and-dispatchers.html"},{"type":"Official","title":"Dispatchers API Reference | kotlinx.coroutines","url":"https://kotlinlang.org/api/kotlinx.coroutines/kotlinx-coroutines-core/kotlinx.coroutines/-dispatchers/"},{"type":"Article","title":"Kotlin Coroutines Dispatchers | kt.academy","url":"https://kt.academy/article/cc-dispatchers"},{"type":"Video","title":"Coroutine Scopes & Dispatchers in Android: Lifecycle, ViewModel, Global & Coroutine Scope | Philipp Lackner (YouTube)","url":"https://www.youtube.com/watch?v=pd8E7Wp1hZY"}]},"asynchronous-concurrency/other/thread":{"id":"asynchronous-concurrency/other/thread","title":"Thread","description":"Android's main thread (UI thread) handles all UI drawing and user events; performing long-running work on it causes **ANR** (Application Not Responding) errors. The platform exposes Java's `Thread`, `Runnable`, `Executor`, and `HandlerThread` for background work. In modern Kotlin Android code, coroutines are strongly preferred over raw threads; however, understanding threads is foundational because the JVM threading model underlies coroutine dispatchers.","resources":[{"type":"Official","title":"Processes and threads overview | Android Developers","url":"https://developer.android.com/guide/components/processes-and-threads"},{"type":"Official","title":"Asynchronous work with Java threads | Android Developers","url":"https://developer.android.com/develop/background-work/background-tasks/asynchronous/java-threads"},{"type":"Article","title":"Better performance through threading | Android Developers","url":"https://developer.android.com/topic/performance/threads"},{"type":"Video","title":"Kotlin Coroutines 101 – Android Conference Talks | Android Developers (YouTube)","url":"https://www.youtube.com/watch?v=ZTDXo0-SKuU"}]},"asynchronous-concurrency/other/workmanager":{"id":"asynchronous-concurrency/other/workmanager","title":"WorkManager","description":"WorkManager is the Jetpack library for **deferrable, guaranteed background work** that must complete even if the app exits or the device restarts. It selects the best underlying mechanism (JobScheduler, AlarmManager) based on API level. You define work as `Worker`/`CoroutineWorker` subclasses, attach constraints (network, charging, storage), and enqueue `OneTimeWorkRequest` or `PeriodicWorkRequest`. Ideal for uploading logs, syncing data, or processing images in the background.","resources":[{"type":"Official","title":"Getting started with WorkManager | Android Developers","url":"https://developer.android.com/develop/background-work/background-tasks/persistent/getting-started"},{"type":"Official","title":"WorkManager API Reference | Android Developers","url":"https://developer.android.com/reference/androidx/work/WorkManager"},{"type":"Article","title":"Background Work with WorkManager Codelab | Android Developers","url":"https://developer.android.com/codelabs/basic-android-kotlin-compose-workmanager"},{"type":"Video","title":"The Ultimate Guide to WorkManager (with Jetpack Compose) | Philipp Lackner (YouTube)","url":"https://www.youtube.com/watch?v=Psc2xyutE2U"}]},"asynchronous-concurrency/other/expedited-jobs":{"id":"asynchronous-concurrency/other/expedited-jobs","title":"Expedited Jobs","description":"Expedited Jobs (introduced in WorkManager 2.7 / Android 12) are WorkManager requests marked with `setExpedited()` that the system tries to **start immediately**, subject to a quota of foreground execution time based on App Standby Buckets. They are less affected by Battery Saver and Doze than regular background work. On Android 11 and below, WorkManager transparently falls back to a foreground service, so you must also implement `getForegroundInfo()` in your worker.","resources":[{"type":"Official","title":"Define work requests – Expedited Work | Android Developers","url":"https://developer.android.com/develop/background-work/background-tasks/persistent/getting-started/define-work"},{"type":"Official","title":"WorkManager | Jetpack Releases | Android Developers","url":"https://developer.android.com/jetpack/androidx/releases/work"},{"type":"Article","title":"Using WorkManager on Android 12 | Android Developers – Medium","url":"https://medium.com/androiddevelopers/using-workmanager-on-android-12-f7d483ca0ecb"},{"type":"Video","title":"WorkManager - Android Basics 2023 | YouTube","url":"https://www.youtube.com/watch?v=A2JetouoNSc"}]},"asynchronous-concurrency/other/rxjava-legacy":{"id":"asynchronous-concurrency/other/rxjava-legacy","title":"RxJava (legacy)","description":"RxJava is a JVM implementation of ReactiveX that was the dominant async/reactive library for Android before Kotlin coroutines. It models asynchronous sequences as `Observable`/`Flowable` streams with a rich operator set (`flatMap`, `switchMap`, `zip`, `debounce`). **For new Android projects, Kotlin coroutines + Flow are the recommended replacement.** RxJava remains relevant when maintaining large existing codebases or when integrating with third-party Java libraries that emit RxJava types.","resources":[{"type":"Official","title":"RxJava GitHub Repository | ReactiveX","url":"https://github.com/ReactiveX/RxJava"},{"type":"Official","title":"RxAndroid GitHub Repository | ReactiveX","url":"https://github.com/ReactiveX/RxAndroid"},{"type":"Article","title":"ReactiveX Documentation | reactivex.io","url":"https://reactivex.io/documentation"},{"type":"Video","title":"Reactive Programming on Android Part 3: RxJava | Android Developers (YouTube)","url":"https://www.youtube.com/watch?v=AgGE7fAMrdA"}]},"user-interface-views-legacy/layouts/constraintlayout":{"id":"user-interface-views-legacy/layouts/constraintlayout","title":"ConstraintLayout","description":"ConstraintLayout is a `ViewGroup` that lets you position and size widgets using flexible constraints relative to sibling views and the parent, eliminating the need for deeply nested layouts. It is the recommended layout for complex screens in the Views toolkit because a single flat hierarchy is faster to measure and draw than an equivalent nested hierarchy. Use it whenever your screen requires multiple aligned, chained, or ratio-constrained elements; for trivially simple layouts (one or two views), `FrameLayout` is lighter. **Modern alternative:** Jetpack Compose `Box`, `Row`, and `Column` composables replace layout XML entirely.","resources":[{"type":"Official","title":"Build a responsive UI with ConstraintLayout","url":"https://developer.android.com/develop/ui/views/layout/constraint-layout"},{"type":"Article","title":"ConstraintLayout Performance — GitHub Wiki","url":"https://github.com/androidx/constraintlayout/wiki/ConstraintLayout-Performance"},{"type":"Video","title":"Constraint Layout — Beginner's Guide to Android App Development","url":"https://www.youtube.com/watch?v=o6lQ9YNl4C0"},{"type":"Video","title":"Android ConstraintLayout Tutorials — Playlist","url":"https://www.youtube.com/playlist?list=PL7W-WmzNxofJm0G_lmAH9Vm6PZIdlhwfh"},{"type":"Repo","title":"androidx/constraintlayout — GitHub","url":"https://github.com/androidx/constraintlayout"}]},"user-interface-views-legacy/layouts/motionlayout":{"id":"user-interface-views-legacy/layouts/motionlayout","title":"MotionLayout","description":"`MotionLayout` is a subclass of `ConstraintLayout` that adds fully declarative, keyframe-driven animations between two or more constraint sets defined in a `MotionScene` XML file. It supports touch-controlled, seekable transitions and can interpolate virtually any view attribute (alpha, elevation, rotation, custom properties) without a single line of animation code. Use it when you need coordinated, physics-feel motion tied to gestures or scroll position in a Views-based screen. **Modern alternative:** Jetpack Compose's `AnimatedVisibility`, `animate*AsState`, and `Transition` APIs cover similar use-cases.","resources":[{"type":"Official","title":"Manage motion and widget animation with MotionLayout","url":"https://developer.android.com/develop/ui/views/animations/motionlayout"},{"type":"Article","title":"MotionLayout — Material Design 3 Motion Blog","url":"https://m3.material.io/blog/android-material-motion"},{"type":"Video","title":"Advanced Android in Kotlin 03.2: Animation with MotionLayout — Codelab","url":"https://codelabs.developers.google.com/codelabs/motion-layout"},{"type":"Article","title":"Introduction to MotionLayout (part I) — Google Developers","url":"https://medium.com/google-developers/introduction-to-motionlayout-part-i-29208674b10d"},{"type":"Repo","title":"android/compose-samples — Compose Youtube Motion Layout example","url":"https://github.com/android/compose-samples"}]},"user-interface-views-legacy/layouts/linearlayout":{"id":"user-interface-views-legacy/layouts/linearlayout","title":"LinearLayout","description":"`LinearLayout` stacks child views in a single row or column and distributes space using `layout_weight`. It is simple and predictable but can become slow when nested deeply, because Android may perform multiple measure passes per nesting level. Prefer `ConstraintLayout` for complex screens and `LinearLayout` only for genuinely linear, shallow hierarchies such as a button row or a vertical form. **Modern alternative:** Compose `Row` and `Column` are the direct successors and avoid the nested-weight performance trap.","resources":[{"type":"Official","title":"Create a linear layout","url":"https://developer.android.com/develop/ui/views/layout/linear"},{"type":"Article","title":"Performance and view hierarchies","url":"https://developer.android.com/topic/performance/rendering/optimizing-view-hierarchies"},{"type":"Video","title":"Thinking in Compose — Android Developers","url":"https://www.youtube.com/watch?v=SMOhl9RK0BA"},{"type":"Roadmap","title":"Android Developer Roadmap — roadmap.sh","url":"https://roadmap.sh/android"}]},"user-interface-views-legacy/layouts/framelayout":{"id":"user-interface-views-legacy/layouts/framelayout","title":"FrameLayout","description":"`FrameLayout` is the lightest built-in layout container; it places each child view at the top-left and stacks them in Z order. It is ideal for single-child containers — such as fragment containers, overlay layers, or loading spinners centred over content — and performs better than heavier layout classes when only one child is present. Avoid it for multi-child positioning because `gravity` is the only alignment tool and children will overlap unintentionally. **Modern alternative:** Compose `Box` provides the same stacking semantics with alignment modifiers.","resources":[{"type":"Official","title":"FrameLayout — API reference","url":"https://developer.android.com/reference/android/widget/FrameLayout"},{"type":"Article","title":"How Android draws views","url":"https://developer.android.com/guide/topics/ui/how-android-draws"},{"type":"Video","title":"Thinking in Compose — Android Developers","url":"https://www.youtube.com/watch?v=SMOhl9RK0BA"},{"type":"Course","title":"Android Basics with Compose — Google official free course","url":"https://developer.android.com/courses/android-basics-compose/course"}]},"user-interface-views-legacy/layouts/recyclerview":{"id":"user-interface-views-legacy/layouts/recyclerview","title":"RecyclerView","description":"`RecyclerView` efficiently displays large, scrollable datasets by recycling off-screen item views through a `ViewHolder` pattern. A pluggable `LayoutManager` controls arrangement (linear, grid, staggered), while `DiffUtil` and `ListAdapter` minimise re-binds by computing the minimal set of changes between lists. It is the go-to widget for any scrollable list or grid in the Views toolkit. **Modern alternative:** Jetpack Compose's `LazyColumn`, `LazyRow`, and `LazyVerticalGrid` replace `RecyclerView` without boilerplate adapters.","resources":[{"type":"Official","title":"Create dynamic lists with RecyclerView","url":"https://developer.android.com/develop/ui/views/layout/recyclerview"},{"type":"Article","title":"Best Practices for Efficient RecyclerView Performance in Android","url":"https://medium.com/@fitareq/best-practices-for-efficient-recyclerview-performance-in-android-b405eedc6d34"},{"type":"Video","title":"RecyclerView Android Studio Tutorial 2024","url":"https://www.youtube.com/watch?v=TAEbP_ccjsk"},{"type":"Video","title":"RECYCLERVIEW — Android Fundamentals","url":"https://www.youtube.com/watch?v=HtwDXRWjMcU"},{"type":"Course","title":"Advanced RecyclerView use cases — Android Developers Pathway","url":"https://developer.android.com/courses/pathways/android-development-with-kotlin-10"}]},"user-interface-views-legacy/design/material-3-material-you":{"id":"user-interface-views-legacy/design/material-3-material-you","title":"Material 3 / Material You","description":"Material 3 (M3), also branded Material You, is Google's current design language introduced with Android 12. It brings a richer color system built on five tonal palettes, updated shape expressiveness, and deep personalization through Dynamic Color derived from the user's wallpaper. For Views-based apps, the `com.google.android.material` library provides M3 components; for Compose apps, `androidx.compose.material3` is used. Adopting M3 keeps your app consistent with system UI and other Google apps on Android 12+.","resources":[{"type":"Official","title":"Material Design 3 for MDC-Android","url":"https://m3.material.io/develop/android/mdc-android"},{"type":"Official","title":"Material Design 3 in Compose","url":"https://developer.android.com/develop/ui/compose/designsystems/material3"},{"type":"Video","title":"How to Build Stunning Material 3 Apps with Jetpack Compose — Philipp Lackner","url":"https://www.youtube.com/watch?v=h7K4n9C2jkI"},{"type":"Repo","title":"android/compose-samples — Jetsnack (custom M3 theme example)","url":"https://github.com/android/compose-samples/tree/main/Jetsnack"},{"type":"Repo","title":"android/nowinandroid — full M3 production app","url":"https://github.com/android/nowinandroid"}]},"user-interface-views-legacy/design/material-3-expressive":{"id":"user-interface-views-legacy/design/material-3-expressive","title":"Material 3 Expressive","description":"Material 3 Expressive is the next evolution of M3, announced by Google in 2025, featuring research-backed updates to motion, typography (variable fonts), shapes, and component behavior aimed at making UIs feel more engaging and emotionally resonant. The motion system is powered by the new `MotionScheme` API in Compose material3, and shape tokens have expanded to support more nuanced curvature. It is enabled incrementally through Compose Material 3 1.4+ and the updated MDC-Android library.","resources":[{"type":"Official","title":"Start building with Material 3 Expressive","url":"https://m3.material.io/blog/building-with-m3-expressive"},{"type":"Article","title":"M3 Expressive: New Motion System","url":"https://m3.material.io/blog/m3-expressive-motion-theming"},{"type":"Video","title":"What's new in Jetpack Compose at I/O 2024 — Android Developers Blog","url":"https://www.youtube.com/playlist?list=PLWz5rJ2EKKc8L8WlmqPD6zPEyVSKrL5PJ"},{"type":"Repo","title":"meticha/material-3-expressive-catalog — M3 Expressive components catalog","url":"https://github.com/meticha/material-3-expressive-catalog"}]},"user-interface-views-legacy/design/dynamic-color-monet":{"id":"user-interface-views-legacy/design/dynamic-color-monet","title":"Dynamic Color (Monet)","description":"Dynamic Color (internally codenamed Monet) is an Android 12+ feature that extracts a harmonious five-palette tonal scheme from the user's wallpaper and injects it as system-level color tokens. Apps that adopt Material 3 theming automatically inherit these colors, making every app feel personal without manual theming effort. For Views-based apps, call `DynamicColors.applyToActivitiesIfAvailable(app)` at startup; for Compose, set `dynamicColorScheme()` as your `MaterialTheme` color scheme on supported API levels.","resources":[{"type":"Official","title":"Enable users to personalize their color experience in your app","url":"https://developer.android.com/develop/ui/views/theming/dynamic-colors"},{"type":"Official","title":"Material Design 3 in Compose — Dynamic Color","url":"https://developer.android.com/develop/ui/compose/designsystems/material3"},{"type":"Video","title":"How to Build Stunning Material 3 Apps with Jetpack Compose — Philipp Lackner","url":"https://www.youtube.com/watch?v=h7K4n9C2jkI"},{"type":"Repo","title":"android/nowinandroid — Dynamic Color in production","url":"https://github.com/android/nowinandroid"}]},"user-interface-views-legacy/styles/light-theme":{"id":"user-interface-views-legacy/styles/light-theme","title":"Light Theme","description":"A light theme uses light-colored backgrounds with dark text and iconography, which is the traditional default for Android apps. In the Views toolkit, you define a light theme by inheriting from `Theme.Material3.Light` (or `Theme.MaterialComponents.Light`) in `res/values/themes.xml` and customizing color attributes. Theming is critical because it ensures brand consistency, accessibility contrast ratios, and proper integration with system UI elements such as the status bar. **Modern alternative:** Compose's `MaterialTheme` with a `lightColorScheme()` replaces XML theme files.","resources":[{"type":"Official","title":"Styles and Themes","url":"https://developer.android.com/develop/ui/views/theming/themes"},{"type":"Article","title":"Material Theming with Jetpack Compose — Codelab","url":"https://developer.android.com/codelabs/basic-android-kotlin-compose-material-theming"},{"type":"Video","title":"How to Build Stunning Material 3 Apps with Jetpack Compose — Philipp Lackner","url":"https://www.youtube.com/watch?v=h7K4n9C2jkI"},{"type":"Course","title":"Theming in Compose with Material 3 — Codelab","url":"https://developer.android.com/codelabs/jetpack-compose-theming"}]},"user-interface-views-legacy/styles/dark-theme":{"id":"user-interface-views-legacy/styles/dark-theme","title":"Dark Theme","description":"Dark theme (also called night mode) inverts the luminance of background and surface colors to reduce eye strain in low-light conditions and save power on OLED displays. In the Views toolkit, inherit from `Theme.Material3.DayNight` and provide a `values-night/themes.xml` override; the system switches automatically based on the device setting. Call `AppCompatDelegate.setDefaultNightMode()` to offer an in-app toggle. **Modern alternative:** Compose uses `darkColorScheme()` and system-aware `isSystemInDarkTheme()` to react automatically.","resources":[{"type":"Official","title":"Implement dark theme","url":"https://developer.android.com/develop/ui/views/theming/darktheme"},{"type":"Article","title":"Theming in Compose with Material 3 — Codelab","url":"https://developer.android.com/codelabs/jetpack-compose-theming"},{"type":"Video","title":"How to Build Stunning Material 3 Apps with Jetpack Compose — Philipp Lackner","url":"https://www.youtube.com/watch?v=h7K4n9C2jkI"},{"type":"Repo","title":"android/nowinandroid — dark/light theme implementation","url":"https://github.com/android/nowinandroid"}]},"user-interface-views-legacy/messages/toast":{"id":"user-interface-views-legacy/messages/toast","title":"Toast","description":"A `Toast` displays a brief, non-interactive popup message that auto-dismisses after a short or long delay. It requires no user action and floats above the current activity, making it suitable for simple confirmations like \"Saved\" or \"Copied\". On Android 12+ (API 31+), toasts shown while the app is in the background are suppressed, and visible toasts are limited to two lines with an app icon. For richer feedback with optional actions, prefer `Snackbar`; for background-initiated messages, use a `Notification`.","resources":[{"type":"Official","title":"Toasts overview","url":"https://developer.android.com/guide/topics/ui/notifiers/toasts"},{"type":"Official","title":"Toast — API reference","url":"https://developer.android.com/reference/android/widget/Toast"},{"type":"Video","title":"Thinking in Compose — Android Developers (UI fundamentals)","url":"https://www.youtube.com/watch?v=SMOhl9RK0BA"},{"type":"Course","title":"Android Basics with Compose — Google official free course","url":"https://developer.android.com/courses/android-basics-compose/course"}]},"user-interface-views-legacy/messages/snackbar":{"id":"user-interface-views-legacy/messages/snackbar","title":"Snackbar","description":"`Snackbar` is a Material Design feedback component that appears at the bottom of the screen and can include a single optional action button (e.g., \"Undo\"). Unlike `Toast`, it is tied to a `CoordinatorLayout` or `View` context, allowing automatic repositioning of floating action buttons and swipe-to-dismiss behavior. It is the preferred mechanism for transient messages in foreground apps because it is accessible, dismissible, and actionable. In Compose, the `SnackbarHost` API is used with `SnackbarHostState` inside a `Scaffold`.","resources":[{"type":"Official","title":"Snackbar — API reference (MDC-Android)","url":"https://developer.android.com/reference/com/google/android/material/snackbar/Snackbar"},{"type":"Official","title":"Snackbar in Jetpack Compose","url":"https://developer.android.com/develop/ui/compose/components/snackbar"},{"type":"Video","title":"Advanced state and side effects in Jetpack Compose — Google I/O 2023","url":"https://www.youtube.com/watch?v=TbxCz5AljQk"},{"type":"Repo","title":"android/compose-samples — Scaffold + SnackbarHost usage","url":"https://github.com/android/compose-samples"}]},"user-interface-views-legacy/messages/notification":{"id":"user-interface-views-legacy/messages/notification","title":"Notification","description":"Notifications are system-managed messages that appear in the status bar, notification shade, lock screen, and as heads-up banners, and can also be mirrored to Wear OS. They are the primary communication channel between an app and the user when the app is in the background. Build notifications with `NotificationCompat.Builder`, set at least a small icon, title, and content text, and always assign them to a `NotificationChannel` (required on Android 8.0+). Rich notifications can include images, actions, progress bars, and inline reply.","resources":[{"type":"Official","title":"About notifications","url":"https://developer.android.com/develop/ui/views/notifications"},{"type":"Official","title":"Create a notification","url":"https://developer.android.com/develop/ui/views/notifications/build-notification"},{"type":"Video","title":"Advanced State and Side Effects in Jetpack Compose — Codelab (notification permission flow)","url":"https://www.youtube.com/watch?v=TbxCz5AljQk"},{"type":"Course","title":"Android Basics with Compose — Google official free course","url":"https://developer.android.com/courses/android-basics-compose/course"}]},"user-interface-views-legacy/messages/notification-permission":{"id":"user-interface-views-legacy/messages/notification-permission","title":"Notification Permission","description":"Starting with Android 13 (API 33), apps must declare and request the `POST_NOTIFICATIONS` runtime permission before they can display non-exempt notifications. Users can grant, deny, or permanently dismiss the request; if denied twice the system will no longer show the rationale dialog. Apps targeting API 32 or lower are granted a one-time exemption on upgrade, but must still declare the permission in `AndroidManifest.xml`. Always explain the value of notifications before requesting the permission and gracefully degrade if denied.","resources":[{"type":"Official","title":"Notification runtime permission","url":"https://developer.android.com/develop/ui/views/notifications/notification-permission"},{"type":"Article","title":"Advanced State and Side Effects in Jetpack Compose — Codelab (notification permission flow)","url":"https://developer.android.com/codelabs/jetpack-compose-advanced-state-side-effects"},{"type":"Video","title":"Advanced state and side effects in Jetpack Compose — Google I/O 2023","url":"https://www.youtube.com/watch?v=TbxCz5AljQk"},{"type":"Repo","title":"android/nowinandroid — runtime permission handling","url":"https://github.com/android/nowinandroid"}]},"user-interface-views-legacy/messages/notification-channels":{"id":"user-interface-views-legacy/messages/notification-channels","title":"Notification Channels","description":"Notification channels (introduced in Android 8.0 / API 26) let users control notification behavior per category rather than per app. Each channel carries a default importance level (URGENT → LOW), sound, vibration, and lock-screen visibility setting that the user can override in system settings. Apps must create all relevant channels at startup with `NotificationManager.createNotificationChannel()` and assign every notification a channel ID; posting without a valid channel ID silently drops the notification on API 26+.","resources":[{"type":"Official","title":"Create and manage notification channels","url":"https://developer.android.com/develop/ui/views/notifications/channels"},{"type":"Article","title":"About notifications — importance and channels overview","url":"https://developer.android.com/develop/ui/views/notifications"},{"type":"Video","title":"Android Developers — What's new in Android (notifications overview)","url":"https://www.youtube.com/watch?v=qXhjN66O7Bk"},{"type":"Course","title":"Android Basics with Compose — Google official free course","url":"https://developer.android.com/courses/android-basics-compose/course"}]},"user-interface-views-legacy/animation/valueanimator":{"id":"user-interface-views-legacy/animation/valueanimator","title":"ValueAnimator","description":"`ValueAnimator` is the base class for property animation in the Views system. It animates a value from a start to an end over a specified duration using an interpolator, calling an `AnimatorUpdateListener` on each frame so you can apply the value wherever needed. Unlike `ObjectAnimator`, it does not target a specific object property, giving you full control over what changes. Use it when you need to animate something that has no standard setter, such as a custom canvas drawing or a computed layout value.","resources":[{"type":"Official","title":"Property Animation Overview","url":"https://developer.android.com/develop/ui/views/animations/prop-animation"},{"type":"Official","title":"ValueAnimator — API reference","url":"https://developer.android.com/reference/android/animation/ValueAnimator"},{"type":"Video","title":"Thinking in Compose — declarative animation alternative","url":"https://www.youtube.com/watch?v=SMOhl9RK0BA"},{"type":"Course","title":"Android Basics with Compose — Google official free course","url":"https://developer.android.com/courses/android-basics-compose/course"}]},"user-interface-views-legacy/animation/objectanimator":{"id":"user-interface-views-legacy/animation/objectanimator","title":"ObjectAnimator","description":"`ObjectAnimator` extends `ValueAnimator` and automatically updates a named property on a target object via reflection (e.g., `translationX`, `alpha`, `scaleY`). The target class must expose a matching setter; the animator calls it on every frame, making common view animations trivially concise. Use it for straightforward property tweens on standard `View` attributes; switch to `ValueAnimator` when the setter pattern does not apply or when you need to animate multiple unrelated values together with `AnimatorSet`.","resources":[{"type":"Official","title":"Property Animation Overview — ObjectAnimator section","url":"https://developer.android.com/develop/ui/views/animations/prop-animation"},{"type":"Official","title":"ObjectAnimator — API reference","url":"https://developer.android.com/reference/android/animation/ObjectAnimator"},{"type":"Video","title":"More performance tips for Jetpack Compose — Android Developers","url":"https://www.youtube.com/watch?v=ahXLwg2JYpc"},{"type":"Course","title":"Android Basics with Compose — Google official free course","url":"https://developer.android.com/courses/android-basics-compose/course"}]},"user-interface-views-legacy/animation/lottie":{"id":"user-interface-views-legacy/animation/lottie","title":"Lottie","description":"Lottie is an open-source library by Airbnb that parses Adobe After Effects animations exported as JSON via the Bodymovin plugin and renders them natively on Android (and iOS, Web, React Native). This lets designers hand off production-ready animations without any runtime drawing code, and the JSON format is tiny compared to equivalent video or GIF assets. Add the `com.airbnb.android:lottie` dependency and use `LottieAnimationView` in XML or the Compose variant `LottieAnimation` for full playback control.","resources":[{"type":"Official","title":"Lottie for Android — Official Docs","url":"https://lottie.airbnb.tech/"},{"type":"Repo","title":"airbnb/lottie-android — GitHub","url":"https://github.com/airbnb/lottie-android"},{"type":"Video","title":"Lottie Animations for Android — tutorial","url":"https://www.youtube.com/watch?v=eT7dlLa-a4A"},{"type":"Video","title":"Learn Lottie Animations in Android — Easy & Fun Tutorial","url":"https://www.youtube.com/watch?v=TBi-jwopYZM"}]},"user-interface-views-legacy/animation/material-motion":{"id":"user-interface-views-legacy/animation/material-motion","title":"Material Motion","description":"Material Motion is the MDC-Android library's set of transition patterns — **Container Transform**, **Shared Axis**, **Fade Through**, and **Fade** — that provide semantic, physics-feel animations when navigating between screens or UI elements. These patterns communicate spatial and hierarchical relationships to users, making navigation feel intuitive. Apply them via `MaterialContainerTransform`, `MaterialSharedAxis`, `MaterialFadeThrough`, and `MaterialFade` classes and wire them to activity or fragment transitions.","resources":[{"type":"Official","title":"Transitions — Material Design 3","url":"https://m3.material.io/styles/motion/transitions/applying-transitions"},{"type":"Official","title":"Building Beautiful Transitions with Material Motion for Android — Codelab","url":"https://developer.android.com/codelabs/material-motion-android"},{"type":"Video","title":"More performance tips for Jetpack Compose — Android Developers","url":"https://www.youtube.com/watch?v=ahXLwg2JYpc"},{"type":"Repo","title":"android/compose-samples — motion and animation examples","url":"https://github.com/android/compose-samples"}]},"compose-ui/recomposition/snapshot":{"id":"compose-ui/recomposition/snapshot","title":"Snapshot","description":"The Compose Snapshot system is the lower-level state observation mechanism that underpins all `State\u003cT>` objects. A snapshot is an immutable view of the current state tree; when a `MutableState` changes inside an `apply` call, all registered observers (including the Compose runtime's recomposer) are notified. This MVCC-style design allows state to be read and written safely from multiple threads without locks visible to composable code. Understanding snapshots helps diagnose subtle state bugs and enables advanced use cases such as testing state changes in isolation.","resources":[{"type":"Official","title":"androidx.compose.runtime.snapshots — API reference","url":"https://developer.android.com/reference/kotlin/androidx/compose/runtime/snapshots/package-summary"},{"type":"Article","title":"Introduction to the Compose Snapshot system — Zach Klippenstein","url":"https://blog.zachklipp.com/introduction-to-the-compose-snapshot-system/"},{"type":"Video","title":"Compose runtime and performance — Android Developers Backstage podcast","url":"https://www.youtube.com/watch?v=Fr_e7jwTpk0"},{"type":"Video","title":"A Compose state of mind: automatic state observation — Android Dev Summit 2021","url":"https://www.youtube.com/watch?v=rmv2ug-wW4U"}]},"compose-ui/recomposition/strong-skipping-mode":{"id":"compose-ui/recomposition/strong-skipping-mode","title":"Strong Skipping Mode","description":"Strong Skipping Mode is a Compose compiler optimization (enabled by default since Kotlin 2.0.20) that makes **all** restartable composable functions skippable, even those with unstable parameters. Without it, any composable with an unstable parameter always recomposes when its parent does. It also automatically memoizes lambda captures using `remember`, reducing allocations per recomposition. Use `@NonSkippableComposable` to opt individual composables out, and `@DontMemoize` to prevent lambda memoization where it would cause incorrect behavior.","resources":[{"type":"Official","title":"Strong skipping mode","url":"https://developer.android.com/develop/ui/compose/performance/stability/strongskipping"},{"type":"Article","title":"Jetpack Compose Performance","url":"https://developer.android.com/develop/ui/compose/performance"},{"type":"Video","title":"Performance best practices for Jetpack Compose — Google I/O 2022","url":"https://www.youtube.com/watch?v=EOQB8PTLkpY"},{"type":"Video","title":"How to analyze and improve performance of your Jetpack Compose app — Android Developers","url":"https://www.youtube.com/watch?v=c3gdS42TJmI"},{"type":"Repo","title":"android/nowinandroid — strong skipping applied in production","url":"https://github.com/android/nowinandroid"}]},"compose-ui/recomposition/compose-compiler-reports":{"id":"compose-ui/recomposition/compose-compiler-reports","title":"Compose Compiler Reports","description":"Compose Compiler Reports are output files generated when you enable the `reportsDestination` and `metricsDestination` options in the `composeCompiler` Gradle block. They produce three files per module: a classes stability report, a composables restartability/skippability report, and a CSV version for spreadsheet analysis. Use them to identify which composables are marked as non-skippable or which parameters are inferred as unstable, then fix stability issues to reduce unnecessary recompositions. They should be consulted only when profiling reveals a real performance problem.","resources":[{"type":"Official","title":"Diagnose stability issues — Compose Compiler Reports","url":"https://developer.android.com/develop/ui/compose/performance/stability/diagnose"},{"type":"Article","title":"Practical performance problem solving in Jetpack Compose — Codelab","url":"https://developer.android.com/codelabs/jetpack-compose-performance"},{"type":"Video","title":"Performance best practices for Jetpack Compose — Google I/O 2022","url":"https://www.youtube.com/watch?v=EOQB8PTLkpY"},{"type":"Video","title":"How to analyze and improve performance of your Jetpack Compose app — Android Developers","url":"https://www.youtube.com/watch?v=c3gdS42TJmI"}]},"compose-ui/recomposition/stability-stable-immutable":{"id":"compose-ui/recomposition/stability-stable-immutable","title":"Stability (@Stable, @Immutable)","description":"Compose uses type stability to decide whether a composable can be skipped when its parent recomposes. A type is **stable** if Compose can tell whether its public properties have changed; a type is **immutable** if its properties never change after construction. The `@Stable` annotation promises the compiler that equality checks are reliable; `@Immutable` additionally promises that no property will ever mutate. Annotating your data classes with these markers (or switching to `kotlinx.collections.immutable`) allows the compiler to skip composables that receive them as parameters when the values are equal.","resources":[{"type":"Official","title":"Fix stability issues — @Stable and @Immutable","url":"https://developer.android.com/develop/ui/compose/performance/stability/fix"},{"type":"Official","title":"Stability in Compose","url":"https://developer.android.com/develop/ui/compose/performance/stability"},{"type":"Video","title":"Performance best practices for Jetpack Compose — Google I/O 2022","url":"https://www.youtube.com/watch?v=EOQB8PTLkpY"},{"type":"Video","title":"More performance tips for Jetpack Compose — Android Developers","url":"https://www.youtube.com/watch?v=ahXLwg2JYpc"}]},"compose-ui/recomposition/deferred-reads":{"id":"compose-ui/recomposition/deferred-reads","title":"Deferred reads","description":"Deferred state reads are a technique where you pass a **lambda** that returns state rather than the state value itself, so Compose reads the state only inside the phase (composition, layout, or drawing) that needs it. This confines recomposition or re-layout to the smallest possible scope — for example, wrapping a frequently-changing scroll offset in a lambda-based `Modifier.offset { }` prevents the entire parent composable from recomposing on every scroll frame. It is one of the highest-impact performance patterns in Compose and costs only a small syntax change.","resources":[{"type":"Official","title":"Follow best practices — Defer reads as long as possible","url":"https://developer.android.com/develop/ui/compose/performance/bestpractices"},{"type":"Article","title":"Jetpack Compose Performance — overview","url":"https://developer.android.com/develop/ui/compose/performance"},{"type":"Video","title":"More performance tips for Jetpack Compose — Android Developers","url":"https://www.youtube.com/watch?v=ahXLwg2JYpc"},{"type":"Video","title":"Performance best practices for Jetpack Compose — Google I/O 2022","url":"https://www.youtube.com/watch?v=EOQB8PTLkpY"}]},"compose-ui/state/mutablestate":{"id":"compose-ui/state/mutablestate","title":"MutableState","description":"`MutableState\u003cT>` (created with `mutableStateOf()`) is the core observable state primitive in Compose. Reading a `State` value inside a composable automatically subscribes that composable to changes; when the value changes via the Snapshot system, Compose schedules the minimum set of composables for recomposition. The `by` delegate syntax (`var count by remember { mutableStateOf(0) }`) provides idiomatic read/write access. Compose also ships `mutableStateListOf` and `mutableStateMapOf` for observable collections.","resources":[{"type":"Official","title":"State and Jetpack Compose","url":"https://developer.android.com/develop/ui/compose/state"},{"type":"Official","title":"MutableState — API reference","url":"https://developer.android.com/reference/kotlin/androidx/compose/runtime/MutableState"},{"type":"Video","title":"A Compose state of mind: automatic state observation — Android Dev Summit 2021","url":"https://www.youtube.com/watch?v=rmv2ug-wW4U"},{"type":"Video","title":"How to manage State in Jetpack Compose — Philipp Lackner 2024","url":"https://www.youtube.com/watch?v=ekB0w7tkG7k"},{"type":"Course","title":"Jetpack Compose for Android Developers — Architecture and state pathway","url":"https://developer.android.com/courses/pathways/jetpack-compose-for-android-developers-3"}]},"compose-ui/state/remember":{"id":"compose-ui/state/remember","title":"remember","description":"`remember` is a composable function that stores a value across recompositions by tying it to the composable's position in the Composition tree. Without `remember`, every recomposition would recreate the value from scratch. Pass a calculation lambda to `remember { ... }` for values that are expensive to create, and pass keys (`remember(key) { ... }`) to invalidate the stored value when inputs change. It is the foundation for all stateful composable patterns and works together with `mutableStateOf` for observable state.","resources":[{"type":"Official","title":"State and Jetpack Compose — remember","url":"https://developer.android.com/develop/ui/compose/state"},{"type":"Article","title":"Lifecycle of composables","url":"https://developer.android.com/develop/ui/compose/lifecycle"},{"type":"Video","title":"A Compose state of mind: automatic state observation — Android Dev Summit 2021","url":"https://www.youtube.com/watch?v=rmv2ug-wW4U"},{"type":"Video","title":"How to manage State in Jetpack Compose — Philipp Lackner 2024","url":"https://www.youtube.com/watch?v=ekB0w7tkG7k"},{"type":"Course","title":"Jetpack Compose for Android Developers — Architecture and state pathway","url":"https://developer.android.com/courses/pathways/jetpack-compose-for-android-developers-3"}]},"compose-ui/state/remembersaveable":{"id":"compose-ui/state/remembersaveable","title":"rememberSaveable","description":"`rememberSaveable` works like `remember` but additionally persists the stored value across configuration changes (rotation) and process death by saving it to a `Bundle`. Types that are `Parcelable`, primitives, or annotated with `@Parcelize` are saved automatically; for custom types, supply a `Saver` (via `mapSaver` or `listSaver`). Use `rememberSaveable` whenever UI state — such as scroll position, form input, or selected tab — should survive the activity being recreated.","resources":[{"type":"Official","title":"State and Jetpack Compose — rememberSaveable","url":"https://developer.android.com/develop/ui/compose/state"},{"type":"Article","title":"ViewModel and State in Compose — Codelab","url":"https://developer.android.com/codelabs/basic-android-kotlin-compose-viewmodel-and-state"},{"type":"Video","title":"How to manage State in Jetpack Compose — Philipp Lackner 2024","url":"https://www.youtube.com/watch?v=ekB0w7tkG7k"},{"type":"Video","title":"Advanced state and side effects in Jetpack Compose — Google I/O 2023","url":"https://www.youtube.com/watch?v=TbxCz5AljQk"},{"type":"Course","title":"Jetpack Compose for Android Developers — Architecture and state pathway","url":"https://developer.android.com/courses/pathways/jetpack-compose-for-android-developers-3"}]},"compose-ui/state/derivedstateof":{"id":"compose-ui/state/derivedstateof","title":"derivedStateOf","description":"`derivedStateOf { }` creates a `State` whose value is computed from one or more other `State` objects and is only recalculated — and only triggers recomposition — when the **computed result** changes, even if its input states change more frequently. It is the right tool when you have a high-frequency state (e.g., scroll offset) but only care about a low-frequency derived condition (e.g., \"is the first item visible?\"). Wrapping the derivation in `remember` ensures a single instance is reused across recompositions.","resources":[{"type":"Official","title":"Side-effects in Compose — derivedStateOf","url":"https://developer.android.com/develop/ui/compose/side-effects"},{"type":"Article","title":"Follow best practices — Jetpack Compose","url":"https://developer.android.com/develop/ui/compose/performance/bestpractices"},{"type":"Video","title":"Full Guide to Jetpack Compose Effect Handlers — Philipp Lackner","url":"https://www.youtube.com/watch?v=gxWcfz3V2QE"},{"type":"Video","title":"Advanced state and side effects in Jetpack Compose — Google I/O 2023","url":"https://www.youtube.com/watch?v=TbxCz5AljQk"}]},"compose-ui/state/producestate":{"id":"compose-ui/state/producestate","title":"produceState","description":"`produceState` bridges non-Compose asynchronous sources (callbacks, suspend functions, flows) into a Compose `State\u003cT>`. It launches a coroutine scoped to the composable's lifecycle, and you push new values to the state via `value = ...` inside the producer block. It is equivalent to creating a `LaunchedEffect` that writes to a `mutableStateOf` but is more concise. Common uses include loading a resource from a repository, observing a callback-based sensor, or converting a `Flow` when `collectAsStateWithLifecycle` is not a fit.","resources":[{"type":"Official","title":"Side-effects in Compose — produceState","url":"https://developer.android.com/develop/ui/compose/side-effects"},{"type":"Article","title":"Advanced State and Side Effects in Jetpack Compose — Codelab","url":"https://developer.android.com/codelabs/jetpack-compose-advanced-state-side-effects"},{"type":"Video","title":"Full Guide to Jetpack Compose Effect Handlers — Philipp Lackner","url":"https://www.youtube.com/watch?v=gxWcfz3V2QE"},{"type":"Video","title":"Advanced state and side effects in Jetpack Compose — Google I/O 2023","url":"https://www.youtube.com/watch?v=TbxCz5AljQk"}]},"compose-ui/state/snapshotflow":{"id":"compose-ui/state/snapshotflow","title":"snapshotFlow","description":"`snapshotFlow { }` converts Compose `State` reads inside the lambda into a cold Kotlin `Flow` that emits a new value whenever any of the observed states change. It is useful for bridging Compose state into coroutine-based observation — for example, watching a `LazyListState.firstVisibleItemIndex` to trigger analytics or load more data. Unlike `derivedStateOf`, it produces a `Flow` rather than a `State`, which can be collected, combined with other flows, and cancelled independently.","resources":[{"type":"Official","title":"Side-effects in Compose — snapshotFlow","url":"https://developer.android.com/develop/ui/compose/side-effects"},{"type":"Article","title":"Introduction to the Compose Snapshot system","url":"https://blog.zachklipp.com/introduction-to-the-compose-snapshot-system/"},{"type":"Video","title":"Full Guide to Jetpack Compose Effect Handlers — Philipp Lackner","url":"https://www.youtube.com/watch?v=gxWcfz3V2QE"},{"type":"Video","title":"Advanced state and side effects in Jetpack Compose — Google I/O 2023","url":"https://www.youtube.com/watch?v=TbxCz5AljQk"}]},"compose-ui/state-hoisting/state-holder":{"id":"compose-ui/state-hoisting/state-holder","title":"State Holder","description":"A state holder is a plain class (or `ViewModel` for business logic) that owns and encapsulates state and the logic that mutates it, keeping composables stateless and easier to test. For UI-scoped logic, create a plain class (e.g., `MyScreenState`) instantiated with `remember { MyScreenState() }` inside the composition; for business logic backed by repositories, use `ViewModel`. The rule of thumb: hoist state to the **lowest common ancestor** of all composables that read or write it, and extract it to a state holder when the logic becomes complex.","resources":[{"type":"Official","title":"Where to hoist state","url":"https://developer.android.com/develop/ui/compose/state-hoisting"},{"type":"Article","title":"Guide to Business and UI Logic State Holders in Jetpack Compose","url":"https://medium.com/@ahmet.cavus/guide-to-business-and-ui-logic-state-holders-in-jetpack-compose-6e8c53da0e09"},{"type":"Video","title":"A Compose state of mind: automatic state observation — Android Dev Summit 2021","url":"https://www.youtube.com/watch?v=rmv2ug-wW4U"},{"type":"Video","title":"Advanced state and side effects in Jetpack Compose — Google I/O 2023","url":"https://www.youtube.com/watch?v=TbxCz5AljQk"},{"type":"Repo","title":"android/nowinandroid — state holders and ViewModels in practice","url":"https://github.com/android/nowinandroid"}]},"compose-ui/state-hoisting/remembercoroutinescope":{"id":"compose-ui/state-hoisting/remembercoroutinescope","title":"rememberCoroutineScope","description":"`rememberCoroutineScope()` returns a `CoroutineScope` bound to the current Composition point that is automatically cancelled when the composable leaves the Composition. Unlike `LaunchedEffect`, this scope is not tied to a key — you call it manually from event handlers, button clicks, or callbacks that fire outside the composition phase. Use it when you need to launch a coroutine imperatively in response to user actions (e.g., animating a drawer, scrolling a list to a position) rather than in response to state changes.","resources":[{"type":"Official","title":"Side-effects in Compose — rememberCoroutineScope","url":"https://developer.android.com/develop/ui/compose/side-effects"},{"type":"Official","title":"rememberCoroutineScope — API reference","url":"https://developer.android.com/reference/kotlin/androidx/compose/runtime/rememberCoroutineScope.composable"},{"type":"Video","title":"Full Guide to Jetpack Compose Effect Handlers — Philipp Lackner","url":"https://www.youtube.com/watch?v=gxWcfz3V2QE"},{"type":"Video","title":"Advanced state and side effects in Jetpack Compose — Google I/O 2023","url":"https://www.youtube.com/watch?v=TbxCz5AljQk"}]},"compose-ui/side-effects/launchedeffect":{"id":"compose-ui/side-effects/launchedeffect","title":"LaunchedEffect","description":"`LaunchedEffect(key)` launches a coroutine that is scoped to the composable's lifetime and is automatically restarted whenever its key(s) change. It is the standard way to trigger side effects that need coroutine support — such as loading data when a screen first appears, playing an animation in response to a state change, or showing a `Snackbar` on error. The coroutine is cancelled and restarted if any key changes, and cancelled unconditionally when the composable leaves the Composition.","resources":[{"type":"Official","title":"Side-effects in Compose — LaunchedEffect","url":"https://developer.android.com/develop/ui/compose/side-effects"},{"type":"Article","title":"Advanced State and Side Effects in Jetpack Compose — Codelab","url":"https://developer.android.com/codelabs/jetpack-compose-advanced-state-side-effects"},{"type":"Video","title":"Full Guide to Jetpack Compose Effect Handlers — Philipp Lackner","url":"https://www.youtube.com/watch?v=gxWcfz3V2QE"},{"type":"Video","title":"Advanced state and side effects in Jetpack Compose — Google I/O 2023","url":"https://www.youtube.com/watch?v=TbxCz5AljQk"},{"type":"Repo","title":"android/nowinandroid — LaunchedEffect usage in production","url":"https://github.com/android/nowinandroid"}]},"compose-ui/side-effects/disposableeffect":{"id":"compose-ui/side-effects/disposableeffect","title":"DisposableEffect","description":"`DisposableEffect(key)` is for side effects that need explicit **cleanup** when the composable leaves the Composition or when its key changes — such as registering a `BroadcastReceiver`, attaching a lifecycle observer, or acquiring a camera lock. The effect body runs when the composable enters (or the key changes), and the mandatory `onDispose { }` block runs before the next restart or when the composable is removed. Always pair every resource acquisition inside `DisposableEffect` with its release in `onDispose` to avoid leaks.","resources":[{"type":"Official","title":"Side-effects in Compose — DisposableEffect","url":"https://developer.android.com/develop/ui/compose/side-effects"},{"type":"Article","title":"Advanced State and Side Effects in Jetpack Compose — Codelab","url":"https://developer.android.com/codelabs/jetpack-compose-advanced-state-side-effects"},{"type":"Video","title":"Full Guide to Jetpack Compose Effect Handlers — Philipp Lackner","url":"https://www.youtube.com/watch?v=gxWcfz3V2QE"},{"type":"Video","title":"Advanced state and side effects in Jetpack Compose — Google I/O 2023","url":"https://www.youtube.com/watch?v=TbxCz5AljQk"}]},"compose-ui/side-effects/rememberupdatedstate":{"id":"compose-ui/side-effects/rememberupdatedstate","title":"rememberUpdatedState","description":"`rememberUpdatedState(value)` captures a **current** reference to a value inside a long-running effect (typically `LaunchedEffect`) without causing the effect to restart when that value changes. It solves the stale-closure problem: if you reference a lambda or state value directly inside a `LaunchedEffect(Unit)`, you capture the initial value forever. Wrap it with `rememberUpdatedState` to always read the latest value through a stable `State` reference. This is especially important for callbacks passed as parameters that the parent may swap out.","resources":[{"type":"Official","title":"Side-effects in Compose — rememberUpdatedState","url":"https://developer.android.com/develop/ui/compose/side-effects"},{"type":"Article","title":"Advanced State and Side Effects in Jetpack Compose — Codelab","url":"https://developer.android.com/codelabs/jetpack-compose-advanced-state-side-effects"},{"type":"Video","title":"Full Guide to Jetpack Compose Effect Handlers — Philipp Lackner","url":"https://www.youtube.com/watch?v=gxWcfz3V2QE"},{"type":"Video","title":"Advanced state and side effects in Jetpack Compose — Google I/O 2023","url":"https://www.youtube.com/watch?v=TbxCz5AljQk"}]},"compose-ui/theming-material-3/color":{"id":"compose-ui/theming-material-3/color","title":"Color","description":"Material 3's color system is built on five key tonal palettes (Primary, Secondary, Tertiary, Error, Neutral) each expanded to a 13-tone scale, giving a total of 29 named color roles (e.g., `primary`, `onPrimary`, `primaryContainer`). In Compose, these roles are accessed via `MaterialTheme.colorScheme.primary` and are applied consistently across all M3 components. You generate your palette with the [Material Theme Builder](https://m3.material.io/theme-builder) and pass a `ColorScheme` to `MaterialTheme`. Support for Dynamic Color (wallpaper-extracted palette) is built in on Android 12+.","resources":[{"type":"Official","title":"Material Design 3 in Compose — Color","url":"https://developer.android.com/develop/ui/compose/designsystems/material3"},{"type":"Official","title":"Color — Material Design 3","url":"https://m3.material.io/styles/color/overview"},{"type":"Video","title":"How to Build Stunning Material 3 Apps with Jetpack Compose — Philipp Lackner","url":"https://www.youtube.com/watch?v=h7K4n9C2jkI"},{"type":"Repo","title":"android/nowinandroid — M3 color scheme in production","url":"https://github.com/android/nowinandroid"},{"type":"Course","title":"Theming in Compose with Material 3 — official Codelab","url":"https://developer.android.com/codelabs/jetpack-compose-theming"}]},"compose-ui/theming-material-3/typography":{"id":"compose-ui/theming-material-3/typography","title":"Typography","description":"Material 3 defines a 15-style type scale organized into five categories — Display, Headline, Title, Body, and Label — each in Large, Medium, and Small variants. In Compose, `MaterialTheme.typography` exposes all 15 as `TextStyle` properties (e.g., `bodyLarge`, `titleMedium`). Set your custom fonts and sizes by constructing a `Typography` object and passing it to `MaterialTheme`. M3 Expressive extends this system with variable font axes for more expressiveness while reducing the number of static font files needed.","resources":[{"type":"Official","title":"Material Design 3 in Compose — Typography","url":"https://developer.android.com/develop/ui/compose/designsystems/material3"},{"type":"Official","title":"Typography — Material Design 3","url":"https://m3.material.io/styles/typography/overview"},{"type":"Video","title":"How to Build Stunning Material 3 Apps with Jetpack Compose — Philipp Lackner","url":"https://www.youtube.com/watch?v=h7K4n9C2jkI"},{"type":"Repo","title":"android/nowinandroid — Typography tokens in production","url":"https://github.com/android/nowinandroid"},{"type":"Course","title":"Theming in Compose with Material 3 — official Codelab","url":"https://developer.android.com/codelabs/jetpack-compose-theming"}]},"compose-ui/theming-material-3/shape":{"id":"compose-ui/theming-material-3/shape","title":"Shape","description":"Material 3 uses a shape system with five corner size tokens — Extra Small, Small, Medium, Large, and Extra Large — that components choose from to express hierarchy and interactivity. In Compose, `MaterialTheme.shapes` provides a `Shapes` object with these five levels as `Shape` values. You can override any level (e.g., set `medium = RoundedCornerShape(16.dp)`) to brand your app's corner style globally. Every M3 component references the appropriate shape token, so changing one level updates all components that use it.","resources":[{"type":"Official","title":"Material Design 3 in Compose — Shapes","url":"https://developer.android.com/develop/ui/compose/designsystems/material3"},{"type":"Official","title":"Shape — Material Design 3","url":"https://m3.material.io/styles/shape/overview"},{"type":"Video","title":"How to Build Stunning Material 3 Apps with Jetpack Compose — Philipp Lackner","url":"https://www.youtube.com/watch?v=h7K4n9C2jkI"},{"type":"Repo","title":"android/compose-samples — Jetsnack shape system example","url":"https://github.com/android/compose-samples/tree/main/Jetsnack"},{"type":"Course","title":"Theming in Compose with Material 3 — official Codelab","url":"https://developer.android.com/codelabs/jetpack-compose-theming"}]},"compose-ui/theming-material-3/dimens":{"id":"compose-ui/theming-material-3/dimens","title":"Dimens","description":"Dimensions in Compose are expressed as `Dp` (density-independent pixels) rather than XML `dimen` resources. Best practice is to define a central `Dimens` object (or `object Dimens { val spacingSmall = 8.dp ... }`) and reference it throughout your composables, making spacing consistent and easy to update. While Compose does not have a built-in `MaterialTheme.dimens` slot the way color and typography have, you can expose custom dimension tokens through `CompositionLocalProvider` for app-wide access. Avoid hard-coding `Dp` literals scattered across composables.","resources":[{"type":"Official","title":"Resources in Compose — dimensionResource","url":"https://developer.android.com/develop/ui/compose/resources"},{"type":"Article","title":"Material Theming with Jetpack Compose — Codelab","url":"https://developer.android.com/codelabs/basic-android-kotlin-compose-material-theming"},{"type":"Video","title":"How to Build Stunning Material 3 Apps with Jetpack Compose — Philipp Lackner","url":"https://www.youtube.com/watch?v=h7K4n9C2jkI"},{"type":"Repo","title":"android/nowinandroid — Dimens object and spacing tokens","url":"https://github.com/android/nowinandroid"}]},"compose-ui/theming-material-3/motionscheme":{"id":"compose-ui/theming-material-3/motionscheme","title":"MotionScheme","description":"`MotionScheme` is a Material 3 Compose API (stable in material3 1.4+) that provides a named set of `FiniteAnimationSpec` tokens for spatial and effects animations, analogous to how `ColorScheme` provides color tokens. Access it via `MaterialTheme.motionScheme`; it exposes `defaultSpatialSpec()` for animations that change shape or bounds, and `defaultEffectsSpec()` for color/alpha animations. M3 Expressive adds `MotionScheme.expressive()` for spring-based, physics-feel motion. All M3 components now internally use these specs for consistent, themeable animation.","resources":[{"type":"Official","title":"MotionScheme — API reference","url":"https://developer.android.com/reference/kotlin/androidx/compose/material3/MotionScheme"},{"type":"Article","title":"M3 Expressive: New Motion System","url":"https://m3.material.io/blog/m3-expressive-motion-theming"},{"type":"Video","title":"Modern Android Development at Google I/O 2023 — playlist","url":"https://www.youtube.com/playlist?list=PLWz5rJ2EKKc8L8WlmqPD6zPEyVSKrL5PJ"},{"type":"Repo","title":"meticha/material-3-expressive-catalog — MotionScheme demos","url":"https://github.com/meticha/material-3-expressive-catalog"}]},"compose-ui/theming-material-3/custom-theme":{"id":"compose-ui/theming-material-3/custom-theme","title":"Custom Theme","description":"A custom Material 3 theme in Compose is created by generating a `ColorScheme` (light and dark variants), a `Typography`, and a `Shapes` object — typically with the [Material Theme Builder](https://m3.material.io/theme-builder) — and passing them to the `MaterialTheme` composable that wraps your app's content. You can also extend the theme with your own `CompositionLocal` values (custom dimensions, brand-specific tokens) accessed anywhere in the tree. Every composable in the subtree then reads from `MaterialTheme.colorScheme`, `MaterialTheme.typography`, and `MaterialTheme.shapes` automatically.","resources":[{"type":"Official","title":"Material Design 3 in Compose — Custom Theme","url":"https://developer.android.com/develop/ui/compose/designsystems/material3"},{"type":"Official","title":"Theming in Compose with Material 3 — Codelab","url":"https://developer.android.com/codelabs/jetpack-compose-theming"},{"type":"Video","title":"How to Build Stunning Material 3 Apps with Jetpack Compose — Philipp Lackner","url":"https://www.youtube.com/watch?v=h7K4n9C2jkI"},{"type":"Repo","title":"android/nowinandroid — full custom M3 theme implementation","url":"https://github.com/android/nowinandroid"},{"type":"Repo","title":"android/compose-samples — Jetsnack custom design system","url":"https://github.com/android/compose-samples/tree/main/Jetsnack"}]},"compose-ui/modifier/modifier-order":{"id":"compose-ui/modifier/modifier-order","title":"Modifier Order","description":"In Compose, modifiers are applied sequentially from left to right (or top to bottom in a chain), and order **significantly affects the visual and behavioral result**. For example, `Modifier.padding(16.dp).background(Color.Red)` pads first so the red background is drawn inside the padding, while reversing the order draws red behind the padding. Layout modifiers (size,
