<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Android Developer Roadmap 2026</title>
<meta name="description" content="Interactive Android Developer Roadmap for 2026. Track your progress through Kotlin, Compose, Architecture, KMP, On-Device AI, and more.">
<style>
  :root {
    /* Light page theme to match roadmap.sh */
    --bg: #f6f7fb;
    --panel: #ffffff;
    --border: #e3e5ed;
    --fg: #0f1430;
    --muted: #4b5063;
    --accent: #2563eb;
    --done: #d1d5db;
    --done-stroke: #9ca3af;
    --skipped: #e5e7eb;
    --yellow: #FFF170;
    --yellow-fg: #0f1430;
    /* Drawer (light theme to match roadmap.sh) */
    --d-bg: #ffffff;
    --d-fg: #0f1430;
    --d-muted: #4b5063;
    --d-border: #e3e5ed;
    --d-soft: #f4f5f9;
    --tab-active-bg: #0f1430;
    --tab-active-fg: #ffffff;
    --tab-bg: #f4f5f9;
    --tab-fg: #0f1430;
    --status-bg: #f4f5f9;
    --status-fg: #0f1430;
    --green: #16a34a;
    --green-soft: #dcfce7;
    --official-bg: #2563eb;
    --official-fg: #ffffff;
    --article-bg: #f5d971;
    --article-fg: #4a3a08;
    --video-bg: #ddd6fe;
    --video-fg: #5b21b6;
    --course-bg: #16a34a;
    --course-fg: #ffffff;
    --repo-bg: #6b21a8;
    --repo-fg: #ffffff;
    --book-bg: #6b7280;
    --book-fg: #ffffff;
    --roadmap-bg: #0f1430;
    --roadmap-fg: #ffffff;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; background: var(--bg); color: var(--fg); font-family: "Open Sans Hebrew", Inter, system-ui, -apple-system, sans-serif; }
  header {
    position: sticky; top: 0; z-index: 50;
    background: var(--panel); border-bottom: 1px solid var(--border);
    padding: 10px 20px; display: flex; flex-direction: column; gap: 10px;
  }
  .topbar { display: flex; gap: 12px; align-items: center; flex-wrap: wrap; }
  .topbar .spacer { flex: 1; }
  .topbar h1 { margin: 0; font-size: 16px; font-weight: 700; }
  .page-tabs { display: inline-flex; gap: 4px; border-bottom: 1px solid transparent; }
  .page-tab {
    background: transparent; border: 0; color: var(--muted);
    padding: 8px 12px; font: inherit; font-weight: 600; font-size: 14px;
    cursor: pointer; display: inline-flex; align-items: center; gap: 6px;
    border-bottom: 2px solid transparent;
  }
  .page-tab.active { color: var(--fg); border-bottom-color: var(--fg); }
  .page-tab .ico { font-size: 14px; }

  input[type="search"] {
    background: #fff; color: var(--fg); border: 1px solid var(--border);
    border-radius: 8px; padding: 7px 12px; font: inherit; width: 220px;
  }
  input[type="search"]:focus { outline: none; border-color: var(--accent); }
  button.btn {
    background: #fff; color: var(--fg); border: 1px solid var(--border);
    border-radius: 8px; padding: 7px 12px; font: inherit; font-weight: 600; cursor: pointer;
  }
  button.btn:hover { background: #f4f5f9; }

  /* Segmented stages bar */
  .stages {
    display: flex; gap: 6px; align-items: center;
    background: #fff; border: 1px solid var(--border);
    border-radius: 10px; padding: 6px;
    box-shadow: 0 1px 2px rgba(0,0,0,0.04);
  }
  .stage {
    flex: 1; min-width: 120px;
    background: #f4f5f9; color: var(--muted);
    border: 0; border-radius: 8px; padding: 8px 14px;
    font: inherit; font-weight: 700; font-size: 13px;
    display: inline-flex; align-items: center; gap: 6px; cursor: default;
    white-space: nowrap;
  }
  .stage .ico { font-size: 14px; }
  .stage .pct { margin-left: auto; font-variant-numeric: tabular-nums; }
  .stage.active { background: var(--yellow); color: var(--yellow-fg); }
  .stage-more {
    background: #f4f5f9; color: var(--muted); border: 0; border-radius: 8px;
    padding: 8px 12px; font: inherit; cursor: pointer;
  }

  .canvas { padding: 24px; overflow: auto; min-height: calc(100vh - 120px); background: var(--bg); }
  .canvas svg { display: block; max-width: 100%; height: auto; margin: 0 auto; }

  /* SVG node states — light theme */
  svg [data-kind="node"] { cursor: pointer; transition: opacity .2s; }
  svg [data-kind="node"]:hover rect { stroke-width: 3; }
  svg [data-kind="node"][data-status="done"] rect { fill: var(--done); stroke: var(--done-stroke); }
  svg [data-kind="node"][data-status="done"] text { text-decoration: line-through; opacity: 0.65; }
  svg [data-kind="node"][data-status="in-progress"] rect { fill: #fde68a; stroke: #d97706; }
  svg [data-kind="node"][data-status="skipped"] rect { fill: var(--skipped); stroke: var(--done-stroke); }
  svg [data-kind="node"][data-status="skipped"] text { text-decoration: line-through; opacity: 0.45; }
  svg [data-kind="group"] { cursor: pointer; }
  svg [data-kind="group"]:hover rect { stroke-width: 3; }
  svg [data-kind="section"] { cursor: pointer; }
  svg [data-hidden="true"] { opacity: 0.18; }

  /* Drawer — roadmap.sh-style (light theme) */
  .drawer {
    position: fixed; top: 0; right: 0; bottom: 0; width: 640px; max-width: 96vw;
    background: var(--d-bg); color: var(--d-fg);
    border-left: 1px solid var(--d-border); box-shadow: -8px 0 24px rgba(0,0,0,0.18);
    transform: translateX(100%); transition: transform .25s ease;
    z-index: 60; display: flex; flex-direction: column;
  }
  .drawer.open { transform: translateX(0); }

  .drawer-top {
    display: flex; align-items: center; gap: 8px;
    padding: 14px 20px; border-bottom: 1px solid var(--d-border);
    background: var(--d-bg);
  }
  .tab {
    background: var(--tab-bg); color: var(--tab-fg);
    border: 0; border-radius: 8px; padding: 8px 14px;
    font: inherit; font-weight: 600; font-size: 13px;
    cursor: pointer; display: inline-flex; align-items: center; gap: 6px;
  }
  .tab.active { background: var(--tab-active-bg); color: var(--tab-active-fg); }
  .tab[disabled] { opacity: 0.55; cursor: not-allowed; }
  .tab .ico { font-size: 14px; }

  .status-wrap { position: relative; }
  .status-trigger {
    display: inline-flex; align-items: center; gap: 8px;
    background: #fff; color: var(--d-fg);
    border: 1px solid var(--d-border); border-radius: 10px;
    padding: 7px 12px; font: inherit; font-size: 14px; font-weight: 600;
    cursor: pointer; line-height: 1;
  }
  .status-trigger:hover { background: #fafbfd; }
  .status-trigger .chevron {
    width: 12px; height: 12px; opacity: 0.5;
    background: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 12 12'><path d='M3 4.5L6 7.5L9 4.5' stroke='%230f1430' stroke-width='1.5' fill='none' stroke-linecap='round' stroke-linejoin='round'/></svg>") no-repeat center/12px 12px;
  }
  .status-dot {
    width: 9px; height: 9px; border-radius: 50%; flex: 0 0 9px;
    background: #cdd2dd; /* pending */
  }
  .status-dot[data-value="done"] { background: #22c55e; }
  .status-dot[data-value="in-progress"] { background: #eab308; }
  .status-dot[data-value="skipped"] { background: #0f1430; }

  .status-menu {
    position: absolute; top: calc(100% + 6px); right: 0;
    background: #fff; border: 1px solid var(--d-border); border-radius: 10px;
    box-shadow: 0 6px 20px rgba(15,20,48,0.12);
    padding: 6px; min-width: 220px; z-index: 70;
    display: none;
  }
  .status-menu.open { display: block; }
  .status-option {
    display: flex; align-items: center; gap: 12px;
    width: 100%; padding: 8px 10px; border: 0; background: transparent;
    color: var(--d-fg); font: inherit; font-size: 14px; font-weight: 600;
    border-radius: 6px; cursor: pointer; text-align: left;
  }
  .status-option:hover { background: var(--d-soft); }
  .status-option .label { flex: 1; }
  .status-option .kbd {
    font-family: "SF Mono", Menlo, monospace; font-size: 12px;
    color: var(--d-muted); font-weight: 500;
    border: 0; background: transparent;
  }

  .drawer-close {
    background: var(--d-soft); border: 0; color: var(--d-fg);
    font-size: 18px; line-height: 1; padding: 0;
    width: 36px; height: 36px; border-radius: 8px; cursor: pointer;
  }
  .drawer-close:hover { background: #e9eaf2; }

  .drawer-body { padding: 26px 32px 36px; overflow-y: auto; flex: 1; }
  .drawer-body h1.topic-title { margin: 0 0 18px; font-size: 38px; font-weight: 800; line-height: 1.15; letter-spacing: -0.01em; }
  .topic-desc { color: var(--d-fg); font-size: 17px; line-height: 1.6; }
  .topic-desc p { margin: 0 0 14px; }
  .topic-desc ol { padding-left: 22px; margin: 0 0 16px; }
  .topic-desc ol li { margin-bottom: 12px; }
  .topic-desc ul { padding-left: 22px; margin: 0 0 16px; }
  .topic-desc ul li { margin-bottom: 6px; }
  .topic-desc strong { font-weight: 700; }
  .topic-desc code { background: var(--d-soft); padding: 1px 6px; border-radius: 4px; font-family: "SF Mono", Menlo, monospace; font-size: 0.9em; }
  .topic-desc a { color: var(--official-bg); }

  .resources-section { margin-top: 28px; padding-top: 4px; position: relative; }
  .resources-pill {
    display: inline-flex; align-items: center; gap: 6px;
    color: var(--green);
    border: 1px solid var(--green); background: var(--d-bg);
    border-radius: 999px; padding: 5px 14px; font-size: 12px; font-weight: 700;
    position: relative; z-index: 1;
  }
  .resources-pill .heart { font-size: 11px; }
  .resources-rule { border-bottom: 1px solid var(--green); position: relative; top: -14px; margin-bottom: 14px; }

  .resource-list { list-style: none; padding: 0; margin: 0; display: flex; flex-direction: column; gap: 12px; }
  .resource-row { display: flex; align-items: center; gap: 14px; }
  .resource-row a { color: var(--d-fg); text-decoration: underline; text-underline-offset: 3px; font-size: 16px; word-break: break-word; }
  .resource-row a:hover { color: var(--official-bg); }
  .badge {
    display: inline-flex; align-items: center; justify-content: center;
    border-radius: 4px; padding: 3px 9px; font-size: 11px; font-weight: 700;
    text-transform: capitalize; min-width: 72px; flex: 0 0 auto;
  }
  .badge.official { background: var(--official-bg); color: var(--official-fg); }
  .badge.article  { background: var(--article-bg);  color: var(--article-fg); }
  .badge.video    { background: var(--video-bg);    color: var(--video-fg); }
  .badge.course   { background: var(--course-bg);   color: var(--course-fg); }
  .badge.repo     { background: var(--repo-bg);     color: var(--repo-fg); }
  .badge.book     { background: var(--book-bg);     color: var(--book-fg); }
  .badge.roadmap  { background: var(--roadmap-bg);  color: var(--roadmap-fg); }

  .ai-tab-msg {
    background: var(--d-soft); border-radius: 12px; padding: 18px 20px;
    color: var(--d-muted); font-size: 14px; line-height: 1.5;
  }

  @media (max-width: 600px) {
    header h1 { font-size: 14px; }
    input[type="search"] { width: 140px; }
    .progress-bar { width: 100px; }
    .drawer { width: 100vw; }
    .drawer-body { padding: 18px 18px 28px; }
    .drawer-body h1.topic-title { font-size: 24px; }
  }
</style>
</head>
<body>

<header>
  <div class="topbar">
    <div class="page-tabs">
      <button class="page-tab active" data-page-tab="roadmap"><span class="ico">📍</span> Roadmap</button>
      <button class="page-tab" data-page-tab="ai"><span class="ico">✨</span> AI Tutor</button>
    </div>
    <span class="spacer"></span>
    <input type="search" id="search" placeholder="Search topics…" autocomplete="off">
    <span class="progress-text" style="font-size:13px;color:var(--muted)"><span id="progress-done">0</span>/<span id="progress-total">0</span> done</span>
    <button class="btn" id="backup-btn" title="Download progress as a file">Backup</button>
    <button class="btn" id="restore-btn" title="Load progress from a file">Restore</button>
    <input type="file" id="restore-input" accept="application/json,.json" style="display:none">
    <button class="btn" id="reset" title="Reset all progress">Reset</button>
  </div>
  <div class="stages" id="stages">
    <div class="stage" data-stage="0"><span class="ico">⊕</span> Getting Started <span class="pct" id="pct-0">0%</span></div>
    <div class="stage" data-stage="1"><span class="ico">↗</span> Halfway</div>
    <div class="stage" data-stage="2"><span class="ico">🚀</span> Almost There</div>
    <div class="stage" data-stage="3"><span class="ico">🏆</span> Complete</div>
    <button class="stage-more" title="Coming soon">⋯</button>
  </div>
</header>

(function() {

  const CONTENT = {"application-fundamentals/android-package/apk":{"id":"application-fundamentals/android-package/apk","title":"APK","description":"An **APK (Android Package Kit)** is the binary distribution format used to install and run Android apps on a device or emulator. It is a ZIP archive containing compiled bytecode (DEX files), resources, assets, and the `AndroidManifest.xml`. While APKs are still used for sideloading and local testing, Google Play now prefers the AAB format for production distribution.","resources":[{"type":"Official","title":"Application fundamentals | Android Developers","url":"https://developer.android.com/guide/components/fundamentals"},{"type":"Article","title":"APK vs AAB: Understanding Android app packaging formats","url":"https://medium.com/androiddevelopers/building-your-first-app-bundle-bbcd228bf631"},{"type":"Video","title":"What Is an APK File on Android? | YouTube","url":"https://www.youtube.com/watch?v=_iLLcRjhsPQ"},{"type":"Roadmap","title":"Android Developer Roadmap | roadmap.sh","url":"https://roadmap.sh/android"}]},"application-fundamentals/android-package/aab":{"id":"application-fundamentals/android-package/aab","title":"AAB","description":"An **Android App Bundle (AAB)** is the recommended publishing format for Google Play. Unlike an APK, an AAB defers APK generation and signing to Google Play, which uses **Play Feature Delivery** to serve optimized APKs tailored to each device's screen density, ABI, and language — reducing download sizes significantly. AAB is required for new apps published to Google Play since August 2021.","resources":[{"type":"Official","title":"Android App Bundle overview | Android Developers","url":"https://developer.android.com/guide/app-bundle"},{"type":"Article","title":"Building your first app bundle | Android Developers Blog","url":"https://medium.com/androiddevelopers/building-your-first-app-bundle-bbcd228bf631"},{"type":"Video","title":"App Bundles: Testing bundles with bundletool and the Play Console - MAD Skills | Android Developers","url":"https://www.youtube.com/watch?v=vAEAZPU7w-I"},{"type":"Repo","title":"google/bundletool — Command-line tool to manipulate Android App Bundles | GitHub","url":"https://github.com/google/bundletool"}]},"application-fundamentals/languages/kotlin":{"id":"application-fundamentals/languages/kotlin","title":"Kotlin","description":"**Kotlin** is the primary and officially recommended language for Android development, offering concise syntax, null safety, coroutines for async programming, and full interoperability with Java. Google has been **Kotlin-first** since 2019, meaning new Jetpack APIs and documentation examples prioritize Kotlin. Its features — extension functions, data classes, sealed classes — map naturally to common Android patterns.","resources":[{"type":"Official","title":"Kotlin on Android | Android Developers","url":"https://developer.android.com/kotlin"},{"type":"Official","title":"Kotlin language reference | kotlinlang.org","url":"https://kotlinlang.org/docs/reference/"},{"type":"Article","title":"Kotlin for Android: An Introduction | ProAndroidDev","url":"https://proandroiddev.com/kotlin-for-android-an-introduction-dc7c25e79571"},{"type":"Video","title":"Kotlin Crash Course | Philipp Lackner","url":"https://www.youtube.com/watch?v=5flXf8nuq60"},{"type":"Roadmap","title":"Kotlin Developer Roadmap | roadmap.sh","url":"https://roadmap.sh/kotlin"},{"type":"Course","title":"Developing Android Apps with Kotlin | Udacity (free, by Google)","url":"https://www.udacity.com/course/developing-android-apps-with-kotlin--ud9012"}]},"application-fundamentals/languages/k2-compiler":{"id":"application-fundamentals/languages/k2-compiler","title":"K2 Compiler","description":"The **K2 Compiler** is Kotlin's rewritten frontend compiler, stabilized in Kotlin 2.0, delivering up to **2x faster compilation** compared to the classic compiler. It provides a unified compiler pipeline for all Kotlin targets (JVM, JS, Native, Wasm) and improves smart-cast analysis and type inference accuracy. Android projects using AGP 8.3+ can enable K2 via `kotlin.version=2.0.x` in `gradle.properties`.","resources":[{"type":"Official","title":"K2 compiler | Kotlin 2.0 | kotlinlang.org","url":"https://kotlinlang.org/docs/whatsnew20.html#kotlin-k2-compiler"},{"type":"Article","title":"What's new in Kotlin 2.0 and K2 compiler | Android Developers Blog","url":"https://android-developers.googleblog.com/2024/05/whats-new-in-kotlin-2-0-and-k2-compiler.html"},{"type":"Video","title":"Migrating An Android Project To K2 Compiler | YouTube","url":"https://www.youtube.com/watch?v=VM9DeivsDjg"},{"type":"Article","title":"K2 Compiler migration guide | Kotlin Documentation","url":"https://kotlinlang.org/docs/k2-compiler-migration-guide.html"}]},"application-fundamentals/languages/java-legacy":{"id":"application-fundamentals/languages/java-legacy","title":"Java (legacy)","description":"Java was the original language for Android development and remains fully supported via the Android SDK and toolchain. However, **Kotlin is now the recommended language** for all new Android projects, offering a more concise and safer alternative. Existing Java codebases can interoperate with Kotlin seamlessly, making incremental migration feasible. Java on Android targets the Java 8 language subset with some Java 11 APIs available via desugaring.","resources":[{"type":"Official","title":"Java 8+ APIs available through desugaring | Android Developers","url":"https://developer.android.com/studio/write/java8-support"},{"type":"Article","title":"Migrating from Java to Kotlin in Android | ProAndroidDev","url":"https://proandroiddev.com/migrating-from-java-to-kotlin-in-android-6f7e5dd1fc59"},{"type":"Video","title":"Android Development for Beginners - Full Course (Java) | freeCodeCamp","url":"https://www.youtube.com/watch?v=fis26HvvDII"},{"type":"Roadmap","title":"Java Developer Roadmap | roadmap.sh","url":"https://roadmap.sh/java"}]},"application-fundamentals/languages/c-jni":{"id":"application-fundamentals/languages/c-jni","title":"C++ (JNI)","description":"The **Java Native Interface (JNI)** enables Android apps to call native C or C++ code compiled via the **NDK (Native Development Kit)**. This is used for performance-critical work (codecs, signal processing, physics engines), reusing existing native libraries, or accessing low-level hardware APIs not exposed to the SDK. Use JNI sparingly — it increases complexity and bypasses Android's managed memory model.","resources":[{"type":"Official","title":"Get started with the NDK | Android Developers","url":"https://developer.android.com/ndk/guides"},{"type":"Official","title":"JNI tips | Android Developers","url":"https://developer.android.com/training/articles/perf-jni"},{"type":"Article","title":"Android NDK: Getting started with C++ in Android | ProAndroidDev","url":"https://proandroiddev.com/android-ndk-getting-started-with-c-in-android-9c0c3dc86aed"},{"type":"Repo","title":"android/ndk-samples — Android NDK samples with Android Studio | GitHub","url":"https://github.com/android/ndk-samples"},{"type":"Roadmap","title":"C++ Developer Roadmap | roadmap.sh","url":"https://roadmap.sh/cpp"}]},"android-operating-system/foundations/multi-user-linux":{"id":"android-operating-system/foundations/multi-user-linux","title":"Multi-User Linux","description":"Android is built on Linux and uses its **multi-user security model** to isolate apps from each other. Each installed application is assigned a unique Linux user ID (UID), and the OS enforces that an app's files and processes are inaccessible to other apps by default. This architecture means the security guarantees of Linux's user model underpin the entire Android security model.","resources":[{"type":"Official","title":"Application fundamentals — security sandbox | Android Developers","url":"https://developer.android.com/guide/components/fundamentals"},{"type":"Article","title":"Android Security: Understanding the Linux security model | ProAndroidDev","url":"https://proandroiddev.com/android-security-redefining-the-sandbox-77cb358ea5b5"},{"type":"Video","title":"Security for Android Developers | Android Developers YouTube","url":"https://www.youtube.com/watch?v=4E3gUbBw2Ow"},{"type":"Official","title":"Application Sandbox | Android Open Source Project","url":"https://source.android.com/docs/security/app-sandbox"}]},"android-operating-system/foundations/file-permissions":{"id":"android-operating-system/foundations/file-permissions","title":"File Permissions","description":"Android inherits Linux **discretionary access control (DAC)** for file permissions, using standard `read`, `write`, and `execute` bits tied to each app's UID and GID. App-private files stored under `/data/data/\u003cpackage>` are owned by the app's UID and are unreadable by other apps. Understanding file permissions is essential for securely storing sensitive data and correctly configuring `FileProvider` when sharing files between apps.","resources":[{"type":"Official","title":"Data and file storage overview | Android Developers","url":"https://developer.android.com/training/data-storage"},{"type":"Article","title":"Android File Permissions and Storage | ProAndroidDev","url":"https://proandroiddev.com/understanding-android-file-provider-a2a66a26e4b"},{"type":"Video","title":"Security for Android Developers | Android Developers YouTube","url":"https://www.youtube.com/watch?v=4E3gUbBw2Ow"},{"type":"Official","title":"System and kernel security | Android Open Source Project","url":"https://source.android.com/docs/security/overview/kernel-security"}]},"android-operating-system/foundations/resource-isolations":{"id":"android-operating-system/foundations/resource-isolations","title":"Resource Isolations","description":"Android enforces **resource isolation** so that each app operates within its own security sandbox — with its own process, heap, and file space. Apps cannot directly access memory, CPU time, or files belonging to other apps without explicit IPC mechanisms. This isolation also extends to storage: app-specific directories are inaccessible to other apps, and shared storage is governed by scoped storage rules on Android 10+.","resources":[{"type":"Official","title":"Android security overview | Android Developers","url":"https://developer.android.com/topic/security/best-practices"},{"type":"Article","title":"Android Security: Application Sandbox | ProAndroidDev","url":"https://proandroiddev.com/android-security-redefining-the-sandbox-77cb358ea5b5"},{"type":"Video","title":"Security for Android Developers | Android Developers YouTube","url":"https://www.youtube.com/watch?v=4E3gUbBw2Ow"},{"type":"Official","title":"Application Sandbox | Android Open Source Project","url":"https://source.android.com/docs/security/app-sandbox"}]},"android-operating-system/foundations/process-management":{"id":"android-operating-system/foundations/process-management","title":"Process Management","description":"Each Android app runs in its own **Linux process** with a dedicated Dalvik/ART virtual machine instance, started when a component is launched. The Android system uses a **process importance hierarchy** (foreground, visible, service, cached) to determine which processes to kill when memory is low. Developers should understand this hierarchy to ensure critical work (e.g., in foreground services) survives under memory pressure.","resources":[{"type":"Official","title":"Processes and app lifecycle | Android Developers","url":"https://developer.android.com/guide/components/activities/process-lifecycle"},{"type":"Article","title":"Android process lifecycle and app death | ProAndroidDev","url":"https://proandroiddev.com/processes-and-threads-in-android-f7e56acbd218"},{"type":"Video","title":"Explained — Android UI thread / main thread | YouTube","url":"https://www.youtube.com/watch?v=kpFwxJFYnOo"},{"type":"Official","title":"Processes and threads overview | Android Developers","url":"https://developer.android.com/guide/components/processes-and-threads"}]},"android-operating-system/foundations/sandboxing-selinux":{"id":"android-operating-system/foundations/sandboxing-selinux","title":"Sandboxing & SELinux","description":"Android uses **SELinux (Security-Enhanced Linux)** in enforcing mode to implement mandatory access control (MAC) on top of the standard Linux DAC model. SELinux policies define which processes can access which files, sockets, and system calls — even if a process runs as root. This defense-in-depth approach contains the damage from a compromised process and is a cornerstone of Android's platform security.","resources":[{"type":"Official","title":"Security-Enhanced Linux in Android | Android Developers","url":"https://source.android.com/docs/security/features/selinux"},{"type":"Article","title":"Android Security: SELinux and MAC explained | ProAndroidDev","url":"https://proandroiddev.com/android-security-redefining-the-sandbox-77cb358ea5b5"},{"type":"Video","title":"Security for Android Developers | Android Developers YouTube","url":"https://www.youtube.com/watch?v=4E3gUbBw2Ow"},{"type":"Official","title":"SELinux concepts | Android Open Source Project","url":"https://source.android.com/docs/security/features/selinux/concepts"}]},"android-operating-system/foundations/scoped-storage":{"id":"android-operating-system/foundations/scoped-storage","title":"Scoped Storage","description":"**Scoped Storage**, introduced in Android 10 and enforced in Android 11, restricts apps to their own app-specific directories and well-defined collections (MediaStore, Downloads) without requiring broad storage permissions. Apps must use the **MediaStore API** or the **Storage Access Framework** to access files outside their sandbox. This model protects user privacy by preventing apps from freely browsing the file system.","resources":[{"type":"Official","title":"Storage updates in Android 11 | Android Developers","url":"https://developer.android.com/about/versions/11/privacy/storage"},{"type":"Official","title":"Data and file storage overview | Android Developers","url":"https://developer.android.com/training/data-storage"},{"type":"Article","title":"Scoped Storage in Android 11: Everything you need to know | ProAndroidDev","url":"https://proandroiddev.com/scoped-storage-in-android-11-what-it-means-for-developers-39e8fcbbc226"},{"type":"Video","title":"Preparing for Scoped Storage (Android Dev Summit '19) | Android Developers","url":"https://www.youtube.com/watch?v=UnJ3amzJM94"}]},"android-platform-architecture/layers/the-linux-kernel":{"id":"android-platform-architecture/layers/the-linux-kernel","title":"The Linux Kernel","description":"The **Linux Kernel** forms the foundation of Android's platform architecture, providing core OS services: process management, memory management, networking, and a hardware driver model. Android uses a modified Linux kernel with additional features such as Binder IPC, ashmem (anonymous shared memory), and the Low Memory Killer. All higher Android layers ultimately depend on kernel services for hardware access and process isolation.","resources":[{"type":"Official","title":"Android platform architecture | Android Developers","url":"https://developer.android.com/guide/platform"},{"type":"Article","title":"Understanding Android Architecture: Linux Kernel layer | ProAndroidDev","url":"https://proandroiddev.com/android-architecture-overview-part-1-7b5a3b8e5bce"},{"type":"Video","title":"Security for Android Developers | Android Developers YouTube","url":"https://www.youtube.com/watch?v=4E3gUbBw2Ow"},{"type":"Official","title":"System and kernel security | Android Open Source Project","url":"https://source.android.com/docs/security/overview/kernel-security"}]},"android-platform-architecture/layers/hardware-abstraction-layer":{"id":"android-platform-architecture/layers/hardware-abstraction-layer","title":"Hardware Abstraction Layer","description":"The **Hardware Abstraction Layer (HAL)** defines standard interfaces that hardware vendors implement, allowing the Android framework to call hardware functionality without knowing driver specifics. HALs are packaged as shared libraries (`.so` files) and are loaded at runtime. Modern Android uses **HIDL** (HAL Interface Definition Language) and the newer **AIDL**-based HALs to version these interfaces and enable independent updates via Project Treble.","resources":[{"type":"Official","title":"Hardware Abstraction Layer (HAL) | Android Open Source Project","url":"https://source.android.com/docs/core/architecture/hal"},{"type":"Article","title":"Android HAL: How hardware abstraction works | ProAndroidDev","url":"https://proandroiddev.com/android-hardware-abstraction-layer-hal-explained-a0f9c5a51cfc"},{"type":"Video","title":"Android's HIDL: Treble in the HAL | YouTube","url":"https://www.youtube.com/watch?v=UFaWqdxBW4E"},{"type":"Official","title":"Architecture overview | Android Open Source Project","url":"https://source.android.com/docs/core/architecture"}]},"android-platform-architecture/layers/android-runtime-art":{"id":"android-platform-architecture/layers/android-runtime-art","title":"Android Runtime (ART)","description":"**ART (Android Runtime)** is the managed runtime that executes compiled Android apps, replacing the older Dalvik runtime since Android 5.0. ART uses **Ahead-Of-Time (AOT) compilation**, **Just-In-Time (JIT) compilation**, and **profile-guided optimization** to deliver fast execution and reduced startup times. It also provides garbage collection, debugging support, and profiling infrastructure used throughout the Android ecosystem.","resources":[{"type":"Official","title":"Android Runtime (ART) and Dalvik | Android Open Source Project","url":"https://source.android.com/docs/core/runtime"},{"type":"Article","title":"ART and Dalvik: Android runtime explained | ProAndroidDev","url":"https://proandroiddev.com/art-vs-dalvik-how-android-runtime-works-9e4e6c52a9eb"},{"type":"Video","title":"Understanding Android Runtime (ART) for faster apps (Google I/O '19) | Android Developers","url":"https://www.youtube.com/watch?v=1uLzSXWWfDg"}]},"android-platform-architecture/layers/native-libraries":{"id":"android-platform-architecture/layers/native-libraries","title":"Native Libraries","description":"Android's **Native Libraries** layer consists of C/C++ libraries that provide core functionality to the framework, including **OpenGL ES** (graphics), **SQLite** (database), **WebKit** (web rendering), **libc**, and SSL. These libraries are exposed to apps via the Java API Framework or directly via the NDK. Understanding which native capabilities are available helps when choosing between SDK-level APIs and lower-level native access.","resources":[{"type":"Official","title":"Android platform architecture — Native C/C++ Libraries | Android Developers","url":"https://developer.android.com/guide/platform"},{"type":"Article","title":"Android Native Libraries Overview | ProAndroidDev","url":"https://proandroiddev.com/native-libraries-in-android-platform-architecture-explained-8a22fc3c4a4e"},{"type":"Video","title":"How to create Driver & HAL in Android (AOSP)? | YouTube","url":"https://www.youtube.com/watch?v=pee34QJ2XN0"},{"type":"Repo","title":"android/ndk-samples — Android NDK samples with Android Studio | GitHub","url":"https://github.com/android/ndk-samples"}]},"android-platform-architecture/layers/java-api-framework":{"id":"android-platform-architecture/layers/java-api-framework","title":"Java API Framework","description":"The **Java API Framework** is the set of Android APIs written in Java/Kotlin that app developers use daily — including the Activity Manager, Window Manager, Content Providers, View System, Package Manager, and Notification Manager. It sits atop the native libraries and ART runtime, exposing their capabilities through stable, versioned APIs. This layer is what developers interact with through `android.*` and `androidx.*` packages.","resources":[{"type":"Official","title":"Android platform architecture — Java API Framework | Android Developers","url":"https://developer.android.com/guide/platform"},{"type":"Article","title":"Android Architecture: Java API Framework explained | ProAndroidDev","url":"https://proandroiddev.com/android-architecture-overview-part-1-7b5a3b8e5bce"},{"type":"Video","title":"Understanding Android Runtime (ART) for faster apps (Google I/O '19) | Android Developers","url":"https://www.youtube.com/watch?v=1uLzSXWWfDg"},{"type":"Course","title":"Android Basics with Compose | Free course by Google","url":"https://developer.android.com/courses/android-basics-compose/course"}]},"android-platform-architecture/layers/system-apps":{"id":"android-platform-architecture/layers/system-apps","title":"System Apps","description":"**System Apps** are pre-installed applications (Dialer, SMS, Camera, Settings, Browser) that ship with Android and have elevated permissions not available to third-party apps. They occupy the topmost layer of the Android platform architecture and serve as default handlers for common actions (e.g., `ACTION_DIAL`). Third-party apps can replace some system apps as default handlers, but cannot gain system-level permissions without signing with the platform key.","resources":[{"type":"Official","title":"Android platform architecture — System Apps | Android Developers","url":"https://developer.android.com/guide/platform"},{"type":"Article","title":"Android System Apps vs Regular Apps: Differences explained | ProAndroidDev","url":"https://proandroiddev.com/understanding-android-system-apps-and-their-privileges-b4e8fc5be0d0"},{"type":"Video","title":"Security for Android Developers | Android Developers YouTube","url":"https://www.youtube.com/watch?v=4E3gUbBw2Ow"},{"type":"Repo","title":"aosp-mirror/platform_frameworks_base — AOSP frameworks base mirror | GitHub","url":"https://github.com/aosp-mirror/platform_frameworks_base"}]},"android-platform-architecture/layers/aicore":{"id":"android-platform-architecture/layers/aicore","title":"AICore","description":"**AICore** is an Android system service (introduced with Pixel 8 / Android 14) that manages on-device GenAI foundation model execution, including Gemini Nano. It handles model distribution via Play, hardware-accelerated inference, and safety features — all while adhering to **Private Compute Core** principles so data never leaves the device. Developers access AICore capabilities through the **ML Kit GenAI APIs** for tasks like summarization, proofreading, and prompt generation.","resources":[{"type":"Official","title":"Gemini Nano on Android (AICore) | Android Developers","url":"https://developer.android.com/ai/gemini-nano"},{"type":"Article","title":"Announcing Gemma 4 in the AICore Developer Preview | Android Developers Blog","url":"https://developer.android.com/blog/posts/announcing-gemma-4-in-the-ai-core-developer-preview"},{"type":"Video","title":"Gemini Nano on Android: Building with on-device gen AI | Android Developers","url":"https://www.youtube.com/watch?v=mP9QESmEDls"},{"type":"Official","title":"ML Kit GenAI APIs overview | Google for Developers","url":"https://developers.google.com/ml-kit/genai"}]},"app-manifest/core/package":{"id":"app-manifest/core/package","title":"Package","description":"The `package` attribute in `AndroidManifest.xml` historically served as both the app's unique identifier and the namespace for generated R and BuildConfig classes. Since AGP 7.3+, the **namespace** (in `build.gradle`) handles the code namespace, while `applicationId` in `build.gradle` defines the Play Store identifier. The manifest `package` attribute is still read at build time but is effectively superseded by these two distinct Gradle properties.","resources":[{"type":"Official","title":"App manifest overview | Android Developers","url":"https://developer.android.com/guide/topics/manifest/manifest-intro"},{"type":"Article","title":"Package name vs Application ID in Android | ProAndroidDev","url":"https://proandroiddev.com/package-name-vs-application-id-in-android-bc573282e2b6"},{"type":"Video","title":"Android Basics with Compose — Introduction to Kotlin | Android Developers","url":"https://www.youtube.com/watch?v=SJw3Nu_h8kk"},{"type":"Course","title":"Android Basics with Compose | Free course by Google","url":"https://developer.android.com/courses/android-basics-compose/course"}]},"app-manifest/core/application-id":{"id":"app-manifest/core/application-id","title":"Application ID","description":"The **Application ID** (`applicationId` in `build.gradle`) is the globally unique identifier for your app on the device and on Google Play, following reverse-domain notation (e.g., `com.example.myapp`). It is set independently of the code namespace and cannot be changed after publishing without breaking existing installs and deep links. Build variants can use `applicationIdSuffix` to produce distinct IDs for debug/staging builds.","resources":[{"type":"Official","title":"Set the application ID | Android Studio | Android Developers","url":"https://developer.android.com/studio/build/configure-app-module"},{"type":"Article","title":"Understanding Application ID in Android | ProAndroidDev","url":"https://proandroiddev.com/understanding-applicationid-and-package-name-in-android-d48e3e3cd45a"},{"type":"Video","title":"App Bundles: Testing bundles with bundletool and the Play Console - MAD Skills | Android Developers","url":"https://www.youtube.com/watch?v=vAEAZPU7w-I"},{"type":"Course","title":"Android Basics with Compose | Free course by Google","url":"https://developer.android.com/courses/android-basics-compose/course"}]},"app-manifest/core/permissions-declaration":{"id":"app-manifest/core/permissions-declaration","title":"Permissions Declaration","description":"Apps must declare every permission they need in `AndroidManifest.xml` using `\u003cuses-permission>`. **Dangerous permissions** (camera, location, contacts) additionally require runtime requests via `ActivityResultContracts.RequestPermission` since Android 6.0. The system enforces declared permissions at install time (normal) or at runtime (dangerous), and undeclared permissions are silently denied — making thorough manifest declarations essential for functionality and store compliance.","resources":[{"type":"Official","title":"Permissions on Android | Android Developers","url":"https://developer.android.com/guide/topics/permissions/overview"},{"type":"Article","title":"Android Runtime Permissions: A Guide | ProAndroidDev","url":"https://proandroiddev.com/android-runtime-permissions-the-definitive-guide-3d72c6e3b9ea"},{"type":"Video","title":"How to Request Runtime Permissions in Android | YouTube","url":"https://www.youtube.com/watch?v=OJpceQqXIjY"}]},"app-manifest/core/foreground-service-types":{"id":"app-manifest/core/foreground-service-types","title":"Foreground Service Types","description":"Since **Android 14**, apps targeting API 34+ must declare a `android:foregroundServiceType` attribute on each `\u003cservice>` element in the manifest, or calling `startForeground()` will throw `MissingForegroundServiceTypeException`. Available types include `camera`, `location`, `mediaPlayback`, `dataSync`, `health`, `microphone`, and others. Specifying the correct type also unlocks corresponding runtime permissions (e.g., `FOREGROUND_SERVICE_CAMERA`) required to start that service type.","resources":[{"type":"Official","title":"Foreground service types are required | Android 14 | Android Developers","url":"https://developer.android.com/about/versions/14/changes/fgs-types-required"},{"type":"Article","title":"Foreground Service Types in Android 14: What changed | ProAndroidDev","url":"https://proandroiddev.com/android-14-foreground-services-changes-a-guide-to-required-types-b63cde3f4a21"},{"type":"Video","title":"Foreground Service in Android 14 | YouTube","url":"https://www.youtube.com/watch?v=2x5FABUViMc"},{"type":"Official","title":"Foreground service types reference | Android Developers","url":"https://developer.android.com/develop/background-work/services/fgs/service-types"}]},"app-manifest/core/queries-package-visibility":{"id":"app-manifest/core/queries-package-visibility","title":"Queries / Package Visibility","description":"Starting with **Android 11 (API 30)**, apps targeting API 30+ can no longer see all installed packages by default — protecting user privacy. To interact with another app, your app must declare the target package name, intent filter signature, or content provider authority in a `\u003cqueries>` element in the manifest. This affects any code using `queryIntentActivities()`, `getPackageInfo()`, or `Intent.resolveActivity()` to discover other apps.","resources":[{"type":"Official","title":"Package visibility filtering on Android | Android Developers","url":"https://developer.android.com/training/package-visibility"},{"type":"Official","title":"\u003cqueries> manifest element | Android Developers","url":"https://developer.android.com/guide/topics/manifest/queries-element"},{"type":"Article","title":"Android 11 Package Visibility: Migrating your app | ProAndroidDev","url":"https://proandroiddev.com/android-11-package-visibility-the-new-queries-element-26f15bcde30f"},{"type":"Article","title":"Package visibility in Android 11 | Android Developers Medium","url":"https://medium.com/androiddevelopers/package-visibility-in-android-11-cc857f221cd9"}]},"app-components/components/activity":{"id":"app-components/components/activity","title":"Activity","description":"An **Activity** is the primary UI entry point of an Android app, representing a single screen with a user interface. Activities manage their own lifecycle (`onCreate` → `onStart` → `onResume` → `onPause` → `onStop` → `onDestroy`) and must be declared in the manifest. Modern Android development favors a **single-Activity** architecture using Fragments or Compose navigation destinations, reducing the complexity of managing multiple Activity lifecycles.","resources":[{"type":"Official","title":"Introduction to activities | Android Developers","url":"https://developer.android.com/guide/components/activities/intro-activities"},{"type":"Article","title":"Single Activity: Why, When, and How | Android Developers Blog","url":"https://medium.com/androiddevelopers/a-single-activity-why-when-and-how-video-b1da21b04716"},{"type":"Video","title":"Activities & the Activity Lifecycle - Android Basics 2023 | Philipp Lackner","url":"https://www.youtube.com/watch?v=SJw3Nu_h8kk"},{"type":"Course","title":"Android Basics with Compose | Free course by Google","url":"https://developer.android.com/courses/android-basics-compose/course"}]},"app-components/components/service":{"id":"app-components/components/service","title":"Service","description":"A **Service** is an app component that performs long-running operations in the background without a UI, such as music playback, file downloads, or network sync. Services come in two main forms: **started services** (run until stopped) and **bound services** (run while clients are connected). Since Android 8.0, background service execution is restricted — use **WorkManager** for deferrable background work and **Foreground Services** for user-visible ongoing tasks.","resources":[{"type":"Official","title":"Services overview | Android Developers","url":"https://developer.android.com/guide/components/services"},{"type":"Article","title":"Android Services: Everything you need to know | ProAndroidDev","url":"https://proandroiddev.com/android-services-how-to-use-them-responsibly-and-when-not-to-use-them-at-all-b9e8bf8fbb4f"},{"type":"Video","title":"Foreground Services - Android Basics 2023 | Philipp Lackner","url":"https://www.youtube.com/watch?v=YZL-_XJSClc"},{"type":"Video","title":"WorkManager - Android Basics 2023 | Philipp Lackner","url":"https://www.youtube.com/watch?v=A2JetouoNSc"}]},"app-components/components/broadcast-receiver":{"id":"app-components/components/broadcast-receiver","title":"Broadcast Receiver","description":"A **Broadcast Receiver** allows an app to respond to system-wide or app-specific broadcast messages (e.g., network changes, battery low, custom app events). Receivers can be registered **statically** in the manifest (limited by background restrictions since Android 8.0) or **dynamically** in code via `registerReceiver()`. For ordered or local in-process communication, prefer `LocalBroadcastManager` (deprecated) or a reactive approach using **Flow** or **LiveData**.","resources":[{"type":"Official","title":"Broadcasts overview | Android Developers","url":"https://developer.android.com/guide/components/broadcasts"},{"type":"Article","title":"Android BroadcastReceiver: A practical guide | ProAndroidDev","url":"https://proandroiddev.com/the-complete-guide-to-broadcastreceiver-in-android-2024-a03cf4b98b1d"},{"type":"Video","title":"Broadcasts & Broadcast Receivers - Android Basics 2023 | Philipp Lackner","url":"https://www.youtube.com/watch?v=HDVyFsFUuVg"}]},"app-components/components/content-provider":{"id":"app-components/components/content-provider","title":"Content Provider","description":"A **Content Provider** manages access to a structured set of data and exposes it to other apps via a URI-based interface, backed by SQLite, files, or any data source. It is the standard IPC mechanism for sharing data across app boundaries (e.g., Contacts, MediaStore). **FileProvider** (a subclass) is commonly used to share files between apps safely. Modern apps prefer the Room database for internal storage and only implement a Content Provider when cross-app data sharing is explicitly needed.","resources":[{"type":"Official","title":"Content providers | Android Developers","url":"https://developer.android.com/guide/topics/providers/content-providers"},{"type":"Article","title":"Android Content Providers: A complete guide | ProAndroidDev","url":"https://proandroiddev.com/android-content-providers-explained-a-practical-guide-ccfc57e90818"},{"type":"Video","title":"Content Providers - Android Basics 2023 | Philipp Lackner","url":"https://www.youtube.com/watch?v=IVHZpTyVOxU"}]},"app-components/intent/intent-filters":{"id":"app-components/intent/intent-filters","title":"Intent Filters","description":"**Intent Filters** declared in the manifest specify the types of implicit intents a component can handle, defined by action, category, and data URI scheme. The Android system uses intent filters to resolve which app (or component) should handle an incoming implicit intent, such as `ACTION_VIEW` for a URL or `ACTION_SEND` for sharing. Incorrect or overly broad intent filters can expose components to unintended callers — always validate incoming intent data.","resources":[{"type":"Official","title":"Intents and intent filters | Android Developers","url":"https://developer.android.com/guide/components/intents-filters"},{"type":"Article","title":"Android Intent Filters: A deep dive | ProAndroidDev","url":"https://proandroiddev.com/android-intent-filters-explained-with-examples-4ccbde2cdc2d"},{"type":"Video","title":"Intents & Intent Filters - Android Basics 2023 | Philipp Lackner","url":"https://www.youtube.com/watch?v=2hIY1xuImuQ"}]},"app-components/intent/explicit-intents":{"id":"app-components/intent/explicit-intents","title":"Explicit Intents","description":"An **Explicit Intent** directly names the target component (by class name) that should handle the intent, making it unambiguous. They are used for intra-app navigation (e.g., launching a specific Activity or Service within your own app) and are the preferred approach when the target is known. Explicit intents bypass the system's intent resolution process, making them faster and more secure than implicit intents for internal communication.","resources":[{"type":"Official","title":"Intents and intent filters — Explicit intents | Android Developers","url":"https://developer.android.com/guide/components/intents-filters#ExampleExplicit"},{"type":"Article","title":"Explicit vs Implicit Intents in Android | ProAndroidDev","url":"https://proandroiddev.com/android-intents-explicit-vs-implicit-d30f63e13e7c"},{"type":"Video","title":"Intents & Intent Filters - Android Basics 2023 | Philipp Lackner","url":"https://www.youtube.com/watch?v=2hIY1xuImuQ"}]},"app-components/intent/implicit-intents":{"id":"app-components/intent/implicit-intents","title":"Implicit Intents","description":"An **Implicit Intent** declares a general action to perform (e.g., `ACTION_VIEW`, `ACTION_SEND`) without naming a specific component, letting the system find the best matching app via intent filters. If multiple apps can handle the intent, the user is presented with a chooser. Since Android 11, you must declare the target package in `\u003cqueries>` to resolve implicit intents to specific third-party apps — and always call `resolveActivity()` to check that a handler exists before launching.","resources":[{"type":"Official","title":"Intents and intent filters — Implicit intents | Android Developers","url":"https://developer.android.com/guide/components/intents-filters#Types"},{"type":"Article","title":"Implicit Intents and Android 11 Package Visibility | ProAndroidDev","url":"https://proandroiddev.com/implicit-intents-in-android-11-package-visibility-fbe6b241e7af"},{"type":"Video","title":"Intents & Intent Filters - Android Basics 2023 | Philipp Lackner","url":"https://www.youtube.com/watch?v=2hIY1xuImuQ"}]},"app-components/intent/pendingintent-mutability":{"id":"app-components/intent/pendingintent-mutability","title":"PendingIntent (mutability)","description":"A **PendingIntent** wraps an Intent and grants another app or the system the ability to fire it on your app's behalf at a later time (used with notifications, alarms, and widgets). Since **Android 12 (API 31)**, apps must explicitly declare each PendingIntent as `FLAG_IMMUTABLE` or `FLAG_MUTABLE` — omitting the flag causes a crash. Prefer `FLAG_IMMUTABLE` unless the PendingIntent must be modified by the receiving app (e.g., inline reply actions).","resources":[{"type":"Official","title":"PendingIntent mutability | Android 12 | Android Developers","url":"https://developer.android.com/about/versions/12/behavior-changes-12#pending-intent-mutability"},{"type":"Article","title":"PendingIntent in Android 12: Mutability changes explained | ProAndroidDev","url":"https://proandroiddev.com/android-12-pending-intent-mutability-flags-f48f9f57dab8"},{"type":"Video","title":"Intents & Intent Filters - Android Basics 2023 | Philipp Lackner","url":"https://www.youtube.com/watch?v=2hIY1xuImuQ"}]},"app-entry-points/activities/activity-lifecycles":{"id":"app-entry-points/activities/activity-lifecycles","title":"Activity Lifecycles","description":"The **Activity lifecycle** defines the sequence of states an Activity moves through from creation to destruction: `onCreate()`, `onStart()`, `onResume()`, `onPause()`, `onStop()`, and `onDestroy()`. Each callback is the right place for specific operations — initialize UI in `onCreate`, release heavy resources in `onStop`. Using **LifecycleObserver** and **Jetpack ViewModel** helps avoid placing lifecycle logic directly in the Activity, keeping the class lean.","resources":[{"type":"Official","title":"The activity lifecycle | Android Developers","url":"https://developer.android.com/guide/components/activities/activity-lifecycle"},{"type":"Article","title":"Understanding the Android Activity Lifecycle | ProAndroidDev","url":"https://proandroiddev.com/android-activity-lifecycle-made-simple-2da9e0b62e37"},{"type":"Video","title":"Activities & the Activity Lifecycle - Android Basics 2023 | Philipp Lackner","url":"https://www.youtube.com/watch?v=SJw3Nu_h8kk"}]},"app-entry-points/activities/activity-state-changes":{"id":"app-entry-points/activities/activity-state-changes","title":"Activity State Changes","description":"**Activity state changes** occur in response to user actions (rotating the device, pressing Back, switching apps) or system events (low memory kills, multi-window resizing). Configuration changes like rotation destroy and recreate the Activity by default; use **ViewModel** to survive data across this cycle and `onSaveInstanceState()` for lightweight transient UI state. Understanding when and why the system triggers each lifecycle transition is critical for preventing data loss and UI glitches.","resources":[{"type":"Official","title":"Activity state changes | Android Developers","url":"https://developer.android.com/guide/components/activities/state-changes"},{"type":"Article","title":"Handling Activity State Changes in Android | ProAndroidDev","url":"https://proandroiddev.com/understanding-activity-state-changes-and-saving-ui-state-in-android-62a0e2a7e39b"},{"type":"Video","title":"ViewModels & Configuration Changes - Android Basics 2023 | Philipp Lackner","url":"https://www.youtube.com/watch?v=9sqvBydNJSg"}]},"app-entry-points/activities/task-and-back-stack":{"id":"app-entry-points/activities/task-and-back-stack","title":"Task and Back Stack","description":"A **task** is a collection of activities arranged in a LIFO **back stack**, representing a user's flow through the app. When the user navigates forward, new activities are pushed; pressing Back pops them. Launch modes (`standard`, `singleTop`, `singleTask`, `singleInstance`) and `Intent` flags (`FLAG_ACTIVITY_NEW_TASK`, `FLAG_ACTIVITY_CLEAR_TOP`) control how activities are added to or reused within tasks. Understanding this model is essential for correct deep linking, notification navigation, and multi-app flows.","resources":[{"type":"Official","title":"Tasks and the back stack | Android Developers","url":"https://developer.android.com/guide/components/activities/tasks-and-back-stack"},{"type":"Article","title":"Android Tasks and Back Stack: A complete guide | ProAndroidDev","url":"https://proandroiddev.com/android-task-and-back-stack-review-5017f2c18196"},{"type":"Video","title":"Tasks, Back Stack & Launch Modes - Android Basics 2023 | Philipp Lackner","url":"https://www.youtube.com/watch?v=Z0AzoFOiH9c"}]},"app-entry-points/activities/parcelables-and-bundles":{"id":"app-entry-points/activities/parcelables-and-bundles","title":"Parcelables and Bundles","description":"**Parcelable** is Android's high-performance serialization interface for passing objects between components via `Intent` extras or `Bundle`. Unlike Java's `Serializable`, `Parcelable` is designed for inter-process communication and avoids reflection overhead. **Bundles** are key-value containers that hold Parcelable, primitive, and String data. Kotlin's `@Parcelize` annotation (from `kotlin-parcelize`) auto-generates boilerplate `Parcelable` implementations, making this pattern concise in modern code.","resources":[{"type":"Official","title":"Parcelables and Bundles | Android Developers","url":"https://developer.android.com/guide/components/activities/parcelables-and-bundles"},{"type":"Article","title":"Parcelable vs Serializable in Android | ProAndroidDev","url":"https://proandroiddev.com/parcelable-vs-serializable-which-is-better-for-android-8a6b394dfac8"},{"type":"Video","title":"Parcelable in Kotlin — We had @Parcelize | YouTube","url":"https://www.youtube.com/watch?v=aDbWkb81zZ0"},{"type":"Official","title":"Parcelable implementation generator (@Parcelize) | Android Developers","url":"https://developer.android.com/kotlin/parcelize"}]},"app-entry-points/modern-entry-apis/app-shortcuts":{"id":"app-entry-points/modern-entry-apis/app-shortcuts","title":"App Shortcuts","description":"**App Shortcuts** let users perform common actions in your app directly from the launcher (via long-press) or from Google Assistant. There are three types: **static** (defined in XML, packaged with the app), **dynamic** (pushed at runtime via `ShortcutManager`), and **pinned** (added to the home screen by the user). Shortcuts should represent high-value, frequently used actions and must be kept up to date as the app's state changes.","resources":[{"type":"Official","title":"App shortcuts overview | Android Developers","url":"https://developer.android.com/guide/topics/ui/shortcuts"},{"type":"Article","title":"Android App Shortcuts: Static, Dynamic, and Pinned | ProAndroidDev","url":"https://proandroiddev.com/android-app-shortcuts-static-dynamic-and-pinned-8e33b3ece2f9"},{"type":"Video","title":"Activities & the Activity Lifecycle - Android Basics 2023 | Philipp Lackner","url":"https://www.youtube.com/watch?v=SJw3Nu_h8kk"},{"type":"Repo","title":"android/platform-samples — Android OS platform API samples | GitHub","url":"https://github.com/android/platform-samples"}]},"app-entry-points/modern-entry-apis/splash-screen-api":{"id":"app-entry-points/modern-entry-apis/splash-screen-api","title":"Splash Screen API","description":"The **Splash Screen API** (introduced in Android 12, backported via `androidx.core:core-splashscreen`) provides a standardized app launch animation showing the app icon on a solid background. It replaces the old workaround of using a theme with `windowBackground`. Developers can customize the icon, background color, and exit animation, and optionally delay dismissal using `ViewTreeObserver.OnPreDrawListener` until initial data is loaded.","resources":[{"type":"Official","title":"Splash screens | Android Developers","url":"https://developer.android.com/develop/ui/views/launch/splash-screen"},{"type":"Article","title":"Implementing the Android 12 Splash Screen API | ProAndroidDev","url":"https://proandroiddev.com/implementing-the-android-12-splash-screen-api-54e3bc37bfa3"},{"type":"Video","title":"Easily Implement Splash Screen in Android Using the NEW API! | YouTube","url":"https://www.youtube.com/watch?v=4Dh09c_iWFU"}]},"app-entry-points/modern-entry-apis/activity-result-api":{"id":"app-entry-points/modern-entry-apis/activity-result-api","title":"Activity Result API","description":"The **Activity Result API** (`registerForActivityResult()` + `ActivityResultContract`) is the modern replacement for the deprecated `startActivityForResult()` / `onActivityResult()` pattern. It provides type-safe, lifecycle-aware result handling and ships with built-in contracts for common tasks (take photo, pick contact, request permission). Available via `androidx.activity` and `androidx.fragment`, it works seamlessly with both Fragments and Compose.","resources":[{"type":"Official","title":"Get a result from an activity | Android Developers","url":"https://developer.android.com/training/basics/intents/result"},{"type":"Article","title":"The Activity Result API: A deep dive | ProAndroidDev","url":"https://proandroiddev.com/is-onactivityresult-deprecated-in-2021-lets-talk-about-the-new-activity-result-api-5e74a5b64cff"},{"type":"Video","title":"Easily Pass Data Between Activities Using the NEW Activity Result API! | YouTube","url":"https://www.youtube.com/watch?v=85qQYNWiH-c"}]},"app-entry-points/modern-entry-apis/predictive-back-gesture":{"id":"app-entry-points/modern-entry-apis/predictive-back-gesture","title":"Predictive Back Gesture","description":"The **Predictive Back Gesture** (introduced in Android 13, fully enforced in Android 14+) shows users a preview of where the Back gesture will take them before they complete the swipe — improving navigational clarity. Apps must opt in by setting `android:enableOnBackInvokedCallback=\"true\"` in the manifest and migrating away from the deprecated `onBackPressed()` to `OnBackPressedCallback` (AndroidX) or `OnBackInvokedCallback` (platform API). Compose apps use the `BackHandler` or `PredictiveBackHandler` composable.","resources":[{"type":"Official","title":"Add support for the predictive back gesture | Android Developers","url":"https://developer.android.com/guide/navigation/custom-back/predictive-back-gesture"},{"type":"Article","title":"Predictive Back Gesture in Android 13 and 14 | ProAndroidDev","url":"https://proandroiddev.com/predictive-back-progress-ui-navigation-in-android-13-8d9a9edf65a5"},{"type":"Video","title":"How to Migrate Your App to Support the NEW Predictive Back Gestures On Android | YouTube","url":"https://www.youtube.com/watch?v=WjqRfQu8qO8"}]},"app-navigation/navigation-component/navigation-graph":{"id":"app-navigation/navigation-component/navigation-graph","title":"Navigation Graph","description":"The Navigation Graph is a resource file that contains all navigation-related information in one centralized location, including every destination in your app and the possible paths a user can take. It is the backbone of the Jetpack Navigation Component, linking **NavHostFragment** and **NavController** to manage back-stack and transitions declaratively. Defining your graph in XML (or via the Kotlin DSL) lets Android Studio visualize the entire flow and validate arguments at build time. Use it in any app with more than one destination that uses the Fragment-based Navigation Component.","resources":[{"type":"Official","title":"Design your navigation graph | Android Developers","url":"https://developer.android.com/guide/navigation/design"},{"type":"Article","title":"Navigation Component — The Complete Guide","url":"https://medium.com/@muhamed.riyas/navigation-component-the-complete-guide-c51c9911684"},{"type":"Video","title":"How to Use Navigation Component in Android — YouTube","url":"https://www.youtube.com/watch?v=eS4bsQNqx_c"},{"type":"Repo","title":"android/architecture-components-samples — MADSkillsNavigationSample","url":"https://github.com/android/architecture-components-samples/tree/main/MADSkillsNavigationSample"}]},"app-navigation/navigation-component/type-safe-routes":{"id":"app-navigation/navigation-component/type-safe-routes","title":"Type-safe Routes","description":"Type-safe routes, introduced in Navigation 2.8, replace plain string route identifiers with `@Serializable` Kotlin classes, giving compile-time guarantees that arguments are correctly typed and present. Instead of writing `navController.navigate(\"profile/{id}\")`, you navigate with a data-class instance: `navController.navigate(Profile(id = 42))`. The back-stack entry can be reconstructed via `NavBackStackEntry.toRoute\u003cT>()`. Adopt this API with Navigation Compose 2.8+ and the `kotlinx-serialization-json` plugin.","resources":[{"type":"Official","title":"Type safety in Kotlin DSL and Navigation Compose | Android Developers","url":"https://developer.android.com/guide/navigation/design/type-safety"},{"type":"Article","title":"Navigation Compose meet Type Safety | Android Developers Blog","url":"https://medium.com/androiddevelopers/navigation-compose-meet-type-safety-e081fb3cf2f8"},{"type":"Video","title":"Type-Safe Navigation with the OFFICIAL Compose Navigation Library — Philipp Lackner","url":"https://www.youtube.com/watch?v=AIC_OFQ1r3k"},{"type":"Repo","title":"ndiritumichael/Type-safe-Compose-Navigation — GitHub","url":"https://github.com/ndiritumichael/Type-safe-Compose-Navigation"}]},"app-navigation/navigation-component/navigation-3":{"id":"app-navigation/navigation-component/navigation-3","title":"Navigation 3","description":"Navigation 3 is a ground-up rewrite of the Jetpack navigation library specifically designed for Jetpack Compose. Unlike the original Navigation Compose, Navigation 3 puts the developer in full control of the back stack — represented as a plain `SnapshotStateList\u003cT>` — and ships a flexible scene system that supports adaptive multi-pane layouts out of the box. Key primitives include `NavDisplay`, `NavEntry`, and pluggable `SceneStrategy` objects. As of late 2025 it reached stable; the official announcement blog and recipes repo are the best starting points.","resources":[{"type":"Official","title":"Navigation 3 | App architecture | Android Developers","url":"https://developer.android.com/guide/navigation/navigation-3"},{"type":"Article","title":"Migrating to Jetpack Compose Navigation 3 | ProAndroidDev","url":"https://proandroiddev.com/migrating-to-navigation-3-in-jetpack-compose-34b0389a9aea"},{"type":"Video","title":"Navigating the future with Jetpack Navigation 3 — Core Concepts | Android Developers","url":"https://www.youtube.com/watch?v=opLYavQHBB8"},{"type":"Repo","title":"android/nav3-recipes — Common use cases with Jetpack Navigation 3","url":"https://github.com/android/nav3-recipes"}]},"app-navigation/navigation-component/navigation-compose":{"id":"app-navigation/navigation-component/navigation-compose","title":"Navigation Compose","description":"Navigation Compose integrates the Jetpack Navigation Component with Jetpack Compose, letting you define a `NavHost` that swaps composable destinations in and out of the composition as the user navigates. A single `NavController` (created with `rememberNavController()`) manages the back stack, handles deep links, and supports animated transitions. It is the standard navigation solution for pure-Compose apps; consider migrating to Navigation 3 for projects that need adaptive multi-pane layouts.","resources":[{"type":"Official","title":"Navigation with Compose | Android Developers","url":"https://developer.android.com/develop/ui/compose/navigation"},{"type":"Article","title":"Jetpack Compose Navigation | Type Safe — Full Guide | Kotlin Academy","url":"https://blog.kotlin-academy.com/mastery-navigation-in-jetpack-compose-db00b0a0ef75"},{"type":"Video","title":"Jetpack Compose Navigation for Beginners — Android Studio Tutorial | Philipp Lackner","url":"https://www.youtube.com/watch?v=4gUeyNkGE3g"},{"type":"Repo","title":"android/nowinandroid — Navigation Compose reference implementation","url":"https://github.com/android/nowinandroid"}]},"app-navigation/navigation-component/destinations":{"id":"app-navigation/navigation-component/destinations","title":"Destinations","description":"Compose Destinations is a KSP annotation-processing library that generates type-safe navigation boilerplate on top of official Jetpack Navigation Compose. You annotate composables with `@Destination` and the library generates strongly-typed `Direction` objects, argument classes, and a `NavGraph` — eliminating hand-written route strings entirely. It wraps, rather than replaces, the official Navigation component, so all NavController features (deep links, back-stack APIs) remain available through the generated code.","resources":[{"type":"Official","title":"Compose Destinations — Overview","url":"https://composedestinations.rafaelcosta.xyz/"},{"type":"Repo","title":"raamcosta/compose-destinations — GitHub","url":"https://github.com/raamcosta/compose-destinations"},{"type":"Video","title":"Type-Safe Navigation with the OFFICIAL Compose Navigation Library — Philipp Lackner","url":"https://www.youtube.com/watch?v=AIC_OFQ1r3k"}]},"app-navigation/navigation-component/deeplink":{"id":"app-navigation/navigation-component/deeplink","title":"DeepLink","description":"Deep links allow external URIs, notifications, or widgets to navigate users directly to a specific destination inside your app. The Navigation Component supports both **explicit** deep links (via `PendingIntent`) and **implicit** deep links (URI patterns declared in the nav graph and matched by the Android intent system). Adding a `\u003cnav-graph>` element in the manifest causes the build system to auto-generate the required `\u003cintent-filter>` entries. Use `NavDeepLinkBuilder` or `NavController.createDeepLink()` to construct deep links programmatically.","resources":[{"type":"Official","title":"Create a deep link for a destination | Android Developers","url":"https://developer.android.com/guide/navigation/design/deep-link"},{"type":"Article","title":"Navigating with Deep Links | Android Developers Blog","url":"https://medium.com/androiddevelopers/navigating-with-deep-links-910a4a6588c"},{"type":"Video","title":"Navigation: Deep links — MAD Skills | Android Developers","url":"https://www.youtube.com/watch?v=XJgPIeolJu8"},{"type":"Video","title":"Deep-link Navigation tip — MAD Skills | Android Developers","url":"https://www.youtube.com/watch?v=iBjwyaeX5Ag"}]},"app-navigation/fragments-legacy/fragment-lifecycles":{"id":"app-navigation/fragments-legacy/fragment-lifecycles","title":"Fragment Lifecycles","description":"Every Fragment has its own `Lifecycle` that runs in parallel with — but is distinct from — its host Activity's lifecycle. Callbacks such as `onCreate()`, `onCreateView()`, `onViewCreated()`, `onStart()`, `onResume()`, `onPause()`, `onStop()`, `onDestroyView()`, and `onDestroy()` let you perform setup and teardown at the correct moment. The fragment's **view** has a separate `viewLifecycleOwner` that is created after `onCreateView()` and destroyed before `onDestroyView()`, making it the correct owner to use when observing LiveData or Flow. Fragments remain relevant in legacy codebases, though Jetpack Compose reduces the need for new fragment usage.","resources":[{"type":"Official","title":"Fragment lifecycle | Android Developers","url":"https://developer.android.com/guide/fragments/lifecycle"},{"type":"Article","title":"Fragment Lifecycle in Android | Medium","url":"https://medium.com/@anna972606/fragment-lifecycle-in-android-0af867c6050b"},{"type":"Video","title":"Fragment Lifecycle in Android — Android Studio Tutorial | Stevdza-San","url":"https://www.youtube.com/watch?v=Qf7zhQKgIlA"}]},"app-navigation/fragments-legacy/fragment-state-changes":{"id":"app-navigation/fragments-legacy/fragment-state-changes","title":"Fragment State Changes","description":"Fragment state changes describe the transitions a fragment makes through its lifecycle states — `INITIALIZED`, `CREATED`, `STARTED`, `RESUMED`, and `DESTROYED` — as driven by the `FragmentManager`. Understanding these transitions is essential for restoring UI state across configuration changes and for correctly scoping observers to the fragment's view lifetime. `onSaveInstanceState()` lets you persist small amounts of state that survives process death, while `SavedStateHandle` inside a ViewModel handles larger or more complex state. In modern Compose-first projects, state is managed by composables and ViewModels rather than fragment state bundles.","resources":[{"type":"Official","title":"Fragment lifecycle — State Changes | Android Developers","url":"https://developer.android.com/guide/fragments/lifecycle"},{"type":"Article","title":"Mastering Android Fragments: Managers, Transactions, and Best Practices in Kotlin | Medium","url":"https://medium.com/@Max_Sir/mastering-android-fragments-managers-transactions-and-best-practices-in-kotlin-af00cb9b44ac"},{"type":"Video","title":"Fragment Lifecycle in Android — Android Studio Tutorial | Stevdza-San","url":"https://www.youtube.com/watch?v=Qf7zhQKgIlA"}]},"app-navigation/fragments-legacy/fragment-manager":{"id":"app-navigation/fragments-legacy/fragment-manager","title":"Fragment Manager","description":"The `FragmentManager` is the class responsible for performing actions on your app's fragments, such as adding, removing, replacing, and finding them. Every `Activity` and `Fragment` has its own `FragmentManager` (accessed via `supportFragmentManager` or `childFragmentManager`), and the manager maintains the back stack of fragment transactions. The Navigation Component abstracts most direct `FragmentManager` usage; in legacy code, however, understanding it is essential for correct screen management and avoiding common issues like duplicate fragments on configuration change.","resources":[{"type":"Official","title":"Fragment manager | Android Developers","url":"https://developer.android.com/guide/fragments/fragmentmanager"},{"type":"Article","title":"Mastering Android Fragments: Managers, Transactions, and Best Practices in Kotlin | Medium","url":"https://medium.com/@Max_Sir/mastering-android-fragments-managers-transactions-and-best-practices-in-kotlin-af00cb9b44ac"},{"type":"Video","title":"Fragment Manager — Fragment Transition — Fragment Tutorial | YouTube","url":"https://www.youtube.com/watch?v=n-5T-Gf27gc"}]},"app-navigation/fragments-legacy/fragment-transactions":{"id":"app-navigation/fragments-legacy/fragment-transactions","title":"Fragment Transactions","description":"A `FragmentTransaction` groups one or more fragment operations — `add()`, `replace()`, `remove()`, `show()`, `hide()` — into an atomic unit that the `FragmentManager` executes together. Calling `addToBackStack()` allows the user to reverse the transaction with the system Back button. Always set `setReorderingAllowed(true)` so the system can optimize state changes for correct animation behaviour. The Navigation Component handles transactions internally; prefer it over manual transactions in new code.","resources":[{"type":"Official","title":"Fragment transactions | Android Developers","url":"https://developer.android.com/guide/fragments/transactions"},{"type":"Article","title":"Mastering Android Fragments: Managers, Transactions, and Best Practices in Kotlin | Medium","url":"https://medium.com/@Max_Sir/mastering-android-fragments-managers-transactions-and-best-practices-in-kotlin-af00cb9b44ac"},{"type":"Video","title":"Fragment Manager — Fragment Transition — Fragment Tutorial | YouTube","url":"https://www.youtube.com/watch?v=n-5T-Gf27gc"}]},"app-navigation/fragments-legacy/dialogfragment":{"id":"app-navigation/fragments-legacy/dialogfragment","title":"DialogFragment","description":"`DialogFragment` is a `Fragment` subclass specifically designed for hosting dialogs. By wrapping the dialog in a fragment, the `FragmentManager` automatically saves and restores dialog state across configuration changes — something a plain `AlertDialog` cannot do reliably. Override `onCreateDialog()` to return a `Dialog` (or use `onCreateView()` for fully custom layouts), and handle dismissal in `onDismiss()`. For new Compose projects, prefer Compose `Dialog` or `AlertDialog` composables; `DialogFragment` remains the recommended approach in View-based apps.","resources":[{"type":"Official","title":"Display dialogs with DialogFragment | Android Developers","url":"https://developer.android.com/guide/fragments/dialogs"},{"type":"Article","title":"Android BottomSheetDialogFragment with Callbacks to Parent Fragment | Medium","url":"https://medium.com/@misterandroid/android-bottomsheetdialogfragment-with-callbacks-to-parent-fragment-and-transparent-layer-8b52a13abd65"},{"type":"Video","title":"Fragment Lifecycle in Android — Android Studio Tutorial | Stevdza-San","url":"https://www.youtube.com/watch?v=Qf7zhQKgIlA"}]},"app-navigation/fragments-legacy/bottomsheetdialogfragment":{"id":"app-navigation/fragments-legacy/bottomsheetdialogfragment","title":"BottomSheetDialogFragment","description":"`BottomSheetDialogFragment` is a `DialogFragment` subclass from the Material Components library that presents content in a **modal bottom sheet** — a panel that slides up from the bottom of the screen. It internally uses `BottomSheetDialog` and respects Material motion and peek-height theming. Use it for contextual actions, share sheets, or forms in legacy View-based apps. In Jetpack Compose, the equivalent is `ModalBottomSheet` from `androidx.compose.material3`.","resources":[{"type":"Official","title":"BottomSheetDialogFragment | API reference | Android Developers","url":"https://developer.android.com/reference/com/google/android/material/bottomsheet/BottomSheetDialogFragment"},{"type":"Article","title":"Bottom Sheet Dialog Fragment, Kotlin-Android | Medium","url":"https://medium.com/@mandvi2346verma/bottom-sheet-dialog-fragment-kotlin-android-676c8b222715"},{"type":"Video","title":"Fragment Lifecycle in Android — Android Studio Tutorial | Stevdza-San","url":"https://www.youtube.com/watch?v=Qf7zhQKgIlA"}]},"app-navigation/app-links/tablayout":{"id":"app-navigation/app-links/tablayout","title":"TabLayout","description":"`TabLayout` is a Material Components widget that displays a horizontal row of tabs, commonly paired with `ViewPager2` via `TabLayoutMediator` to synchronise tab selection with page swipes. It supports text labels, icons, and badge indicators, and follows Material Design tab guidelines. Use it in View-based apps where you need a familiar tab-bar navigation pattern; Jetpack Compose apps should instead use the `TabRow` or `ScrollableTabRow` composables from Material 3.","resources":[{"type":"Official","title":"Create swipe views with tabs using ViewPager2 | Android Developers","url":"https://developer.android.com/guide/navigation/navigation-swipe-view-2"},{"type":"Article","title":"Usage of ViewPager2 with TabLayout | Medium","url":"https://medium.com/@ipek.birinci8/usage-of-viewpager2-with-tablayout-72c4a5a1ad64"},{"type":"Video","title":"NavigationBar Jetpack Compose Tutorial — Android 2024 | YouTube","url":"https://www.youtube.com/watch?v=jcKxC6SK4Us"}]},"app-navigation/app-links/viewpager2-legacy":{"id":"app-navigation/app-links/viewpager2-legacy","title":"ViewPager2 (legacy)","description":"`ViewPager2` is the successor to the original `ViewPager`, built on `RecyclerView` to support vertical paging, right-to-left layouts, and `DiffUtil` for efficient updates. It works with both `Fragment`-backed and `RecyclerView.Adapter`-backed pages, and pairs with `TabLayoutMediator` for tab navigation. While still maintained, `ViewPager2` is considered legacy for new projects: Jetpack Compose provides `HorizontalPager` and `VerticalPager` from the `accompanist-pager` or native Compose `foundation` APIs as modern replacements.","resources":[{"type":"Official","title":"Migrate from ViewPager to ViewPager2 | Android Developers","url":"https://developer.android.com/develop/ui/views/animations/vp2-migration"},{"type":"Article","title":"How to Create Custom Tabs in Android Using ViewPager2 and TabLayout | Medium","url":"https://medium.com/@myofficework000/how-to-create-custom-tabs-in-android-using-viewpager2-and-tablayout-e26476d146c2"},{"type":"Video","title":"NavigationBar Jetpack Compose Tutorial — Android 2024 | YouTube","url":"https://www.youtube.com/watch?v=jcKxC6SK4Us"}]},"app-navigation/app-links/custom-back-navigation":{"id":"app-navigation/app-links/custom-back-n
