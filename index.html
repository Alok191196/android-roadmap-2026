avigation","title":"Custom Back Navigation","description":"Custom back navigation lets you intercept the system Back gesture or button press and run your own logic — for example, collapsing a search bar, dismissing a selection mode, or confirming an exit. Register an `OnBackPressedCallback` with the Activity's `OnBackPressedDispatcher` and enable/disable it based on state. Android 13+ introduced the **predictive back gesture** API that provides an animated preview of where the Back action leads; supporting it requires opting in via the manifest and implementing `BackHandler` (Compose) or the new `OnBackPressedCallback` APIs.","resources":[{"type":"Official","title":"Provide custom back navigation | Android Developers","url":"https://developer.android.com/guide/navigation/custom-back"},{"type":"Article","title":"Goodbye to onBackPressed(): A Guide to Modern Back Press Handling in Android | Medium","url":"https://medium.com/@manishkumar_75473/goodbye-to-onbackpressed-a-modern-back-handling-in-android-690c8941e9fd"},{"type":"Official","title":"Add support for the predictive back gesture | Android Developers","url":"https://developer.android.com/guide/navigation/custom-back/predictive-back-gesture"}]},"app-navigation/app-links/app-links-verification":{"id":"app-navigation/app-links/app-links-verification","title":"App Links verification","description":"Android App Links are a type of deep link that opens your app directly — without a disambiguation dialog — when the user taps a matching HTTPS URL. This requires the OS to **verify** that you own the domain by fetching a Digital Asset Links JSON file from `https://yourdomain/.well-known/assetlinks.json`. On Android 12 and higher, the system automatically verifies App Links at install time; apps that pass verification own all matched URLs unconditionally. Testing uses `adb shell pm get-app-links` and the Digital Asset Links API.","resources":[{"type":"Official","title":"Verify App Links | Android Developers","url":"https://developer.android.com/training/app-links/verify-applinks"},{"type":"Article","title":"Verify App Links on Android 12 and Higher | Medium","url":"https://medium.com/@lanltn/about-verify-app-links-on-android-12-and-higher-e53e9bb2f7bb"},{"type":"Official","title":"Configure, implement, and verify Android App Links | Codelab","url":"https://developer.android.com/codelabs/android-app-links-introduction"}]},"app-navigation/app-links/digital-asset-links":{"id":"app-navigation/app-links/digital-asset-links","title":"Digital Asset Links","description":"Digital Asset Links (DAL) is a Google-hosted protocol that lets a website declare a trusted relationship with an Android app (or another website) by publishing a JSON file at `/.well-known/assetlinks.json`. The file lists the app's package name and SHA-256 certificate fingerprint; Android reads this file during App Links verification to confirm ownership. The DAL API (`digitalassetlinks.googleapis.com`) can be used to programmatically test whether a statement is valid before shipping. Correct DAL configuration is required for App Links, Google Sign-In without browser redirects, and Credential Manager integrations.","resources":[{"type":"Official","title":"Getting Started | Google Digital Asset Links","url":"https://developers.google.com/digital-asset-links/v1/getting-started"},{"type":"Official","title":"Add Android App Links | Android Studio | Android Developers","url":"https://developer.android.com/studio/write/app-link-indexing"},{"type":"Video","title":"Implement Deep Linking in Android — YouTube","url":"https://www.youtube.com/watch?v=f4E1S7M3e3o"}]},"app-startup-performance/startup/jetpack-app-startup":{"id":"app-startup-performance/startup/jetpack-app-startup","title":"Jetpack App Startup","description":"The Jetpack App Startup library provides a single `ContentProvider` that initializes multiple components in a declared dependency order, replacing the anti-pattern of shipping one `ContentProvider` per library. Implement the `Initializer\u003cT>` interface — with `create()` for initialization logic and `dependencies()` for ordering — then register your initializer in the manifest under `InitializationProvider`. Libraries can lazy-initialize by removing their entry from the manifest and calling `AppInitializer.getInstance(context).initializeComponent(MyInitializer::class.java)` on demand.","resources":[{"type":"Official","title":"App Startup | Android Developers","url":"https://developer.android.com/topic/libraries/app-startup"},{"type":"Article","title":"App Startup in Android: Simplify the Startup of Your Android Application | Medium","url":"https://medium.com/@santimattius/app-startup-in-android-simplify-the-startup-of-your-android-application-c84e18618b58"},{"type":"Video","title":"How to decrease your Android app startup time with the Jetpack Startup library — YouTube","url":"https://www.youtube.com/watch?v=1x5oqddZYKM"}]},"app-startup-performance/startup/cold-warm-hot-start":{"id":"app-startup-performance/startup/cold-warm-hot-start","title":"Cold / Warm / Hot Start","description":"Android defines three startup states based on what the OS must recreate: **Cold start** — the app process does not exist; the system creates a new process, loads classes, and launches the first Activity. **Warm start** — the process exists but the Activity was destroyed (e.g. back-pressed); the system re-creates the Activity using saved state. **Hot start** — the process and Activity both exist in memory; the system simply brings them to the foreground. Android Vitals flags cold starts ≥ 5 s, warm starts ≥ 2 s, and hot starts ≥ 1.5 s as poor. Always optimise for cold start — improvements there carry over to the other states.","resources":[{"type":"Official","title":"App startup time | Android Developers","url":"https://developer.android.com/topic/performance/vitals/launch-time"},{"type":"Article","title":"Android Cold Start, Warm Start and Hot Start in simple words | Medium","url":"https://medium.com/@tharindu.damintha/android-cold-start-warm-start-and-hot-start-states-in-simple-words-8dc7031a9f2b"},{"type":"Video","title":"Making apps blazing fast with Baseline Profiles | Android Developers","url":"https://www.youtube.com/watch?v=yJm5On5Gp4c"}]},"app-startup-performance/performance/baseline-profiles":{"id":"app-startup-performance/performance/baseline-profiles","title":"Baseline Profiles","description":"Baseline Profiles are human-readable lists of class and method patterns that tell the Android Runtime (ART) which code to compile ahead-of-time (AOT) at install time, instead of waiting for JIT compilation during the first run. Google Play packages the compiled profile alongside the APK, so users benefit immediately. Typical gains are **30% faster cold startup** and reduced jank during the first interaction. Generate profiles with `BaselineProfileRule` from the Macrobenchmark library and include them in your release build via the `baselineProfile` Gradle plugin.","resources":[{"type":"Official","title":"Baseline Profiles overview | Android Developers","url":"https://developer.android.com/topic/performance/baselineprofiles/overview"},{"type":"Article","title":"Improving App Performance with Baseline Profiles | Android Developers Blog","url":"https://android-developers.googleblog.com/2022/01/improving-app-performance-with-baseline.html"},{"type":"Video","title":"Making apps blazing fast with Baseline Profiles | Android Developers","url":"https://www.youtube.com/watch?v=yJm5On5Gp4c"},{"type":"Repo","title":"android/performance-samples — MacrobenchmarkSample with Baseline Profiles","url":"https://github.com/android/performance-samples"}]},"app-startup-performance/performance/macrobenchmark":{"id":"app-startup-performance/performance/macrobenchmark","title":"Macrobenchmark","description":"The Jetpack Macrobenchmark library measures large-scale, end-user-visible performance metrics — startup time, frame rendering, scroll smoothness, and traced code sections — by driving your actual app in a separate test module. It provides precise control over compilation mode (`None`, `Partial`, `Full`) to simulate real-world first-launch conditions. Metrics include `StartupTimingMetric`, `FrameTimingMetric`, and `TraceSectionMetric`. Tests must run on a **physical device**, not an emulator. Macrobenchmark is also the standard tool for generating Baseline Profiles.","resources":[{"type":"Official","title":"Write a Macrobenchmark | Android Developers","url":"https://developer.android.com/topic/performance/benchmarking/macrobenchmark-overview"},{"type":"Article","title":"Measure and Improve Performance with Macrobenchmark | Android Developers Blog","url":"https://medium.com/androiddevelopers/measure-and-improve-performance-with-macrobenchmark-560abd0aa5bb"},{"type":"Video","title":"Making apps blazing fast with Baseline Profiles | Android Developers","url":"https://www.youtube.com/watch?v=yJm5On5Gp4c"},{"type":"Repo","title":"android/performance-samples — MacrobenchmarkSample","url":"https://github.com/android/performance-samples/tree/main/MacrobenchmarkSample"}]},"app-startup-performance/performance/startup-tracing-perfetto":{"id":"app-startup-performance/performance/startup-tracing-perfetto","title":"Startup Tracing (Perfetto)","description":"Perfetto is Android's platform-wide, open-source tracing system (available since Android 10) that replaces the older Systrace tool. For startup analysis, it captures detailed timelines of process creation, class loading, `bindApplication`, `activityStart`, and the first rendered frame. The **Perfetto UI** (ui.perfetto.dev) and **Android Studio Profiler** can both open `.perfetto-trace` files. The `StartupTimingMetric` in Macrobenchmark automatically records a Perfetto trace, and the `Android App Startups` derived metric provides a ready-made summary row. Use startup tracing to identify bottlenecks in `Application.onCreate()`, content providers, and early UI composition.","resources":[{"type":"Official","title":"App startup analysis and optimization | Android Developers","url":"https://developer.android.com/topic/performance/appstartup/analysis-optimization"},{"type":"Official","title":"Perfetto — Android tracing quickstart","url":"https://perfetto.dev/docs/quickstart/android-tracing"},{"type":"Video","title":"Advanced System Profiling, Tracing and Trace Analysis with Perfetto — YouTube","url":"https://www.youtube.com/watch?v=Ca2a-3H8PWI"},{"type":"Repo","title":"google/perfetto — Production-grade tracing and analysis","url":"https://github.com/google/perfetto"}]},"architecture-components/ui-layer/viewbinding":{"id":"architecture-components/ui-layer/viewbinding","title":"ViewBinding","description":"View Binding generates a strongly-typed binding class for each XML layout file, replacing `findViewById` calls with direct, null-safe property references to every view that has an `android:id`. Enable it per-module with `viewBinding = true` in `build.gradle` and inflate with `ActivityMainBinding.inflate(layoutInflater)` (or the Fragment equivalent with `onDestroyView` cleanup). Unlike Data Binding, it requires no XML layout tags or annotation processing, so it is faster to compile and simpler to adopt. Prefer it over Kotlin synthetic accessors (which are removed from recent Kotlin releases) in any View-based codebase.","resources":[{"type":"Official","title":"View binding | Android Developers","url":"https://developer.android.com/topic/libraries/view-binding"},{"type":"Article","title":"Use View Binding to Replace findViewById | Android Developers Blog","url":"https://medium.com/androiddevelopers/use-view-binding-to-replace-findviewbyid-c83942471fc"},{"type":"Video","title":"ViewBinding in Android Kotlin: Efficient View Access Made Simple — YouTube","url":"https://www.youtube.com/watch?v=hYh4ICjsz1Q"}]},"architecture-components/ui-layer/databinding-legacy":{"id":"architecture-components/ui-layer/databinding-legacy","title":"DataBinding (legacy)","description":"The Data Binding Library lets you bind UI components directly to data sources in XML using `@{}` and `@={}` expressions, and supports two-way binding for editable fields. It also integrates with `ViewModel` and `LiveData` to auto-update the UI when data changes, eliminating some boilerplate. However, it requires annotation processing, increases build time, and makes XML layouts harder to read and test. Google now recommends **View Binding** for simple `findViewById` replacement and **Jetpack Compose** for reactive UI; Data Binding is considered legacy for new projects.","resources":[{"type":"Official","title":"Data Binding Library | Android Developers","url":"https://developer.android.com/topic/libraries/data-binding"},{"type":"Article","title":"Bind layout views to Architecture Components | Android Developers","url":"https://developer.android.com/topic/libraries/data-binding/architecture"},{"type":"Video","title":"How to do View Binding & Data Binding in Android — YouTube","url":"https://www.youtube.com/watch?v=W0ID4Y_QKUU"}]},"architecture-components/ui-layer/lifecycle":{"id":"architecture-components/ui-layer/lifecycle","title":"Lifecycle","description":"The `androidx.lifecycle` library provides a set of classes and interfaces — `Lifecycle`, `LifecycleOwner`, `LifecycleObserver`, `DefaultLifecycleObserver` — that let components observe and react to Activity and Fragment lifecycle changes without coupling directly to those classes. Any class implementing `LifecycleOwner` (Activities, Fragments, custom owners) exposes its lifecycle, and observers can subscribe to receive `ON_CREATE`, `ON_START`, `ON_RESUME`, `ON_PAUSE`, `ON_STOP`, and `ON_DESTROY` events. This is the foundation on which `LiveData`, `ViewModel`, `repeatOnLifecycle`, and Compose's `LocalLifecycleOwner` are built.","resources":[{"type":"Official","title":"Lifecycle in Jetpack Compose | Android Developers","url":"https://developer.android.com/topic/libraries/architecture/lifecycle"},{"type":"Article","title":"Android Architecture Components: LifeCycle | Medium","url":"https://medium.com/@MinaSamy/android-architecture-components-lifecycle-433ace1ec05d"},{"type":"Video","title":"Android Developer Essential Skills — Lifecycle | Android Developers","url":"https://www.youtube.com/watch?v=zwhmLCfIkq0"}]},"architecture-components/ui-layer/viewmodel":{"id":"architecture-components/ui-layer/viewmodel","title":"ViewModel","description":"`ViewModel` is an architecture component that stores and manages UI-related data in a lifecycle-conscious way, surviving configuration changes such as screen rotations. It lives until its `ViewModelStoreOwner` (Activity, Fragment, or Navigation destination) is permanently destroyed, making it the right place to hold UI state, trigger data operations, and expose state to the UI via `StateFlow` or `LiveData`. ViewModels should not hold references to Views or the Activity context to avoid memory leaks. Inject dependencies using `ViewModelProvider.Factory` or Hilt's `@HiltViewModel`.","resources":[{"type":"Official","title":"ViewModel overview | Android Developers","url":"https://developer.android.com/topic/libraries/architecture/viewmodel"},{"type":"Article","title":"ViewModels: A Simple Example | Android Developers Blog","url":"https://medium.com/androiddevelopers/viewmodels-a-simple-example-ed5ac416317e"},{"type":"Video","title":"ViewModel Explained — Android Architecture Component | Tutorial","url":"https://www.youtube.com/watch?v=orH4K6qBzvE"},{"type":"Repo","title":"android/nowinandroid — ViewModel + UiState reference implementation","url":"https://github.com/android/nowinandroid"}]},"architecture-components/ui-layer/livedata-legacy":{"id":"architecture-components/ui-layer/livedata-legacy","title":"LiveData (legacy)","description":"`LiveData` is a lifecycle-aware observable data holder that automatically stops delivering updates to observers that are in the `STOPPED` or `DESTROYED` state, preventing common null-pointer crashes and memory leaks. It is straightforward to use and integrates tightly with `ViewModel` and Data Binding. However, it is Kotlin-unaware, does not support operators or transformations as richly as Kotlin Flow, and can deliver stale events on re-subscription. For new code, Google recommends replacing `LiveData` with **`StateFlow`** (for state) and **`SharedFlow`** (for events), using `repeatOnLifecycle` to safely collect from the UI.","resources":[{"type":"Official","title":"LiveData overview | Android Developers","url":"https://developer.android.com/topic/libraries/architecture/livedata"},{"type":"Article","title":"Migrating from LiveData to Kotlin's Flow | Android Developers Blog","url":"https://medium.com/androiddevelopers/migrating-from-livedata-to-kotlins-flow-379292f419fb"},{"type":"Video","title":"StateFlow vs. Flow vs. SharedFlow vs. LiveData — When to Use What?! | Philipp Lackner","url":"https://www.youtube.com/watch?v=6Jc6-INantQ"}]},"architecture-components/ui-layer/paging-3":{"id":"architecture-components/ui-layer/paging-3","title":"Paging 3","description":"The Paging 3 library helps you load and display large datasets from a network or database in pages, improving memory usage and reducing unnecessary network requests. The core components are `PagingSource` (loads one page of data), `Pager` (coordinates loading), and `PagingData` (a stream of paginated data consumed by `PagingDataAdapter` in RecyclerView, or `collectAsLazyPagingItems()` in Compose). It has first-class support for Kotlin coroutines and Flow, handles retry/refresh, and includes a `RemoteMediator` for the network-plus-database paging pattern.","resources":[{"type":"Official","title":"Paging library overview | Android Developers","url":"https://developer.android.com/topic/libraries/architecture/paging/v3-overview"},{"type":"Article","title":"Paging 3 — Easier Way to Pagination | ProAndroidDev","url":"https://proandroiddev.com/paging-3-easier-way-to-pagination-part-1-584cad1f4f61"},{"type":"Video","title":"Introduction to Paging — MAD Skills | Android Developers","url":"https://www.youtube.com/watch?v=WfRe87SfcUc"}]},"architecture-components/ui-layer/savedstatehandle":{"id":"architecture-components/ui-layer/savedstatehandle","title":"SavedStateHandle","description":"`SavedStateHandle` is a key-value map injected into a `ViewModel` that persists data not just through configuration changes (which ViewModel already handles), but also across **process recreation** caused by the system killing the app in the background. Access it via constructor injection (Hilt automatically provides it to `@HiltViewModel` classes) and read/write values with `get\u003cT>(key)` / `set(key, value)`. It also exposes keys as `StateFlow\u003cT>` via `getStateFlow()`, and can read Navigation arguments directly when using Navigation Compose.","resources":[{"type":"Official","title":"Saved State module for ViewModel | Android Developers","url":"https://developer.android.com/topic/libraries/architecture/viewmodel/viewmodel-savedstate"},{"type":"Article","title":"What is SavedStateHandle in Android? | Medium","url":"https://medium.com/@sandeepkella23/what-is-savedstatehandle-in-android-306861b5c348"},{"type":"Video","title":"ViewModels & Configuration Changes — Android Basics 2023 | Philipp Lackner","url":"https://www.youtube.com/watch?v=9sqvBydNJSg"}]},"architecture-components/ui-layer/repeatonlifecycle":{"id":"architecture-components/ui-layer/repeatonlifecycle","title":"repeatOnLifecycle","description":"`repeatOnLifecycle` is a suspend extension function on `Lifecycle` that **relaunches** a given suspend block every time the lifecycle reaches or exceeds a target state (typically `STARTED`), and **cancels** it when the lifecycle falls below that state. This makes it the correct and safe way to collect `StateFlow` or `SharedFlow` from an Activity or Fragment: the collection automatically stops when the app goes to the background and resumes when it returns to the foreground, preventing wasted work and UI crashes. Always call it from `lifecycleScope.launch { }` and prefer it over the deprecated `launchWhenStarted` APIs.","resources":[{"type":"Official","title":"Use Kotlin coroutines with lifecycle-aware components | Android Developers","url":"https://developer.android.com/topic/libraries/architecture/coroutines"},{"type":"Article","title":"repeatOnLifecycle API design story | Android Developers Blog","url":"https://medium.com/androiddevelopers/repeatonlifecycle-api-design-story-8670d1a7d333"},{"type":"Video","title":"StateFlow vs. Flow vs. SharedFlow vs. LiveData — When to Use What?! | Philipp Lackner","url":"https://www.youtube.com/watch?v=6Jc6-INantQ"}]},"architecture-components/data-layer/datastore":{"id":"architecture-components/data-layer/datastore","title":"DataStore","description":"Jetpack DataStore is the modern replacement for `SharedPreferences`, providing a fully asynchronous, coroutine- and Flow-based API with built-in data-consistency guarantees. It comes in two flavours: **Preferences DataStore** (key-value pairs, no schema needed, similar API to SharedPreferences but without its thread-safety issues) and **Proto DataStore** (typed objects defined by Protocol Buffers, with schema enforcement and better performance). DataStore handles data migration, corruption recovery, and safe concurrent access — making it the recommended choice for persisting small amounts of app data on disk.","resources":[{"type":"Official","title":"DataStore | Android Developers","url":"https://developer.android.com/topic/libraries/architecture/datastore"},{"type":"Article","title":"Prefer Storing Data with Jetpack DataStore | Android Developers Blog","url":"https://android-developers.googleblog.com/2020/09/prefer-storing-data-with-jetpack.html"},{"type":"Video","title":"Introduction to DataStore — MAD Skills | Android Developers","url":"https://www.youtube.com/watch?v=mdQjuZbLv9Y"}]},"architecture-components/data-layer/workmanager":{"id":"architecture-components/data-layer/workmanager","title":"WorkManager","description":"WorkManager is the recommended Jetpack library for **deferrable, persistent background work** that must complete even if the app exits or the device restarts. Define work by subclassing `Worker` (or `CoroutineWorker` for suspend functions), set constraints (network, charging, storage), and enqueue with `WorkManager.getInstance(context).enqueue()`. It supports one-time and periodic tasks, chained work graphs, retry policies, and progress observation via `LiveData\u003cWorkInfo>`. WorkManager chooses the appropriate underlying mechanism (JobScheduler, AlarmManager) based on API level automatically.","resources":[{"type":"Official","title":"Getting started with WorkManager | Android Developers","url":"https://developer.android.com/develop/background-work/background-tasks/persistent/getting-started"},{"type":"Article","title":"Working with WorkManager in Android: Implementing with Jetpack Compose and Kotlin Coroutines Flow | Medium","url":"https://medium.com/@YodgorbekKomilo/working-with-workmanager-in-android-implementing-with-jetpack-compose-and-kotlin-coroutines-flow-7e8de4a20a30"},{"type":"Video","title":"WorkManager: Basics — MAD Skills | Android Developers","url":"https://www.youtube.com/watch?v=_SQM-10TB4k"}]},"architecture-components/data-layer/repository-pattern":{"id":"architecture-components/data-layer/repository-pattern","title":"Repository Pattern","description":"The Repository pattern is the recommended way to structure the data layer in Android apps: a repository class abstracts the origin of data (network, database, cache) behind a clean API that the rest of the app consumes. ViewModels and use cases call the repository without knowing whether data comes from Room, Retrofit, DataStore, or an in-memory cache — the repository decides which source to use and how to merge them. This separation makes data-fetching logic independently testable by swapping real data sources for fakes. Create one repository per data domain (e.g. `UserRepository`, `OrderRepository`).","resources":[{"type":"Official","title":"Data layer | Android Developers","url":"https://developer.android.com/topic/architecture/data-layer"},{"type":"Article","title":"The Real Repository Pattern in Android | ProAndroidDev","url":"https://proandroiddev.com/the-real-repository-pattern-in-android-efba8662b754"},{"type":"Video","title":"Full guide to Android App Architecture — MVVM + Clean Architecture + Jetpack Compose | YouTube","url":"https://www.youtube.com/watch?v=TosPS55y_IY"},{"type":"Repo","title":"android/architecture-samples — Repository pattern reference (TODO app)","url":"https://github.com/android/architecture-samples"}]},"architecture-components/data-layer/domain-usecase":{"id":"architecture-components/data-layer/domain-usecase","title":"Domain / UseCase","description":"Use cases (also called interactors) live in the optional **domain layer** and encapsulate a single, reusable piece of business logic that would otherwise be duplicated across multiple ViewModels. By convention they are named with a verb + noun + `UseCase` suffix (e.g. `GetLatestNewsUseCase`). They sit between the UI layer (ViewModel) and the data layer (Repository), must be **main-safe**, and are scoped to their caller's lifetime rather than maintaining their own lifecycle. Use the domain layer when business logic is complex, shared across multiple ViewModels, or needs to be independently unit-tested.","resources":[{"type":"Official","title":"Domain layer | Android Developers","url":"https://developer.android.com/topic/architecture/domain-layer"},{"type":"Article","title":"Adding a domain layer | Android Developers Blog","url":"https://medium.com/androiddevelopers/adding-a-domain-layer-bc5a708a96da"},{"type":"Video","title":"Full guide to Android App Architecture — MVVM + Clean Architecture + Jetpack Compose | YouTube","url":"https://www.youtube.com/watch?v=TosPS55y_IY"},{"type":"Repo","title":"android/nowinandroid — Domain layer with UseCases reference","url":"https://github.com/android/nowinandroid"}]},"design-patterns/creational/builder-pattern":{"id":"design-patterns/creational/builder-pattern","title":"Builder Pattern","description":"The Builder pattern is a creational design pattern that constructs complex objects step by step, separating construction from representation. In Android, it appears prominently in `AlertDialog.Builder`, `Notification.Builder`, `OkHttpClient.Builder`, and `Retrofit.Builder`. In Kotlin, **named parameters and default values** often make a formal Builder class unnecessary for your own types, but the pattern remains essential when consuming Java APIs or configuring objects that have many optional parameters and must be immutable once built.","resources":[{"type":"Article","title":"Creational Design Patterns in Kotlin: Builder | Baeldung","url":"https://www.baeldung.com/kotlin/builder-pattern"},{"type":"Article","title":"Builder Design Pattern in Kotlin | ProAndroidDev","url":"https://proandroiddev.com/builder-design-pattern-in-kotlin-c52e41bd6020"},{"type":"Video","title":"Full guide to Android App Architecture — MVVM + Clean Architecture + Jetpack Compose | YouTube","url":"https://www.youtube.com/watch?v=TosPS55y_IY"},{"type":"Roadmap","title":"Android Developer Roadmap — roadmap.sh","url":"https://roadmap.sh/android"}]},"design-patterns/creational/factory-pattern":{"id":"design-patterns/creational/factory-pattern","title":"Factory Pattern","description":"The Factory pattern is a creational design pattern that delegates object creation to a factory method or class, allowing the exact type to be determined at runtime without the caller knowing which concrete class is instantiated. In Android, `ViewModelProvider.Factory`, Room's `RoomDatabase.create()`, and Retrofit instance builders all use this pattern. It improves testability (swap real factories for test factories) and extensibility (add new product types without changing client code). Kotlin's `companion object` functions and `sealed class` hierarchies are idiomatic ways to implement factories.","resources":[{"type":"Article","title":"Factory Pattern in Kotlin | DZone","url":"https://dzone.com/articles/factory-pattern-in-kotlin"},{"type":"Article","title":"Zero to Hero in Android Kotlin Creational Design Patterns | ProAndroidDev","url":"https://proandroiddev.com/zero-to-hero-in-android-kotlin-creational-design-patterns-a972375c352a"},{"type":"Video","title":"Full guide to Android App Architecture — MVVM + Clean Architecture + Jetpack Compose | YouTube","url":"https://www.youtube.com/watch?v=TosPS55y_IY"},{"type":"Roadmap","title":"Android Developer Roadmap — roadmap.sh","url":"https://roadmap.sh/android"}]},"design-patterns/observer-pattern/flow":{"id":"design-patterns/observer-pattern/flow","title":"Flow","description":"Kotlin `Flow` is a cold, asynchronous stream that emits multiple values sequentially using coroutines. Unlike `suspend` functions (which return one value), a Flow can emit zero or more values over time — making it ideal for database change streams, sensor data, paginated loads, and UI state. Being **cold** means each collector triggers an independent execution of the producer. Operators such as `map`, `filter`, `flatMapLatest`, `combine`, and `debounce` let you transform and compose streams. Collect in a lifecycle-safe way using `repeatOnLifecycle` or `flowWithLifecycle` on Android.","resources":[{"type":"Official","title":"Kotlin flows on Android | Android Developers","url":"https://developer.android.com/kotlin/flow"},{"type":"Article","title":"Kotlin Flows — Fundamentals | ProAndroidDev","url":"https://proandroiddev.com/kotlin-flows-fundamentals-7d9b984f12bb"},{"type":"Video","title":"StateFlow vs. Flow vs. SharedFlow vs. LiveData — When to Use What?! | Philipp Lackner","url":"https://www.youtube.com/watch?v=6Jc6-INantQ"},{"type":"Course","title":"Kotlin Coroutines and Flow for Android Development | Udemy","url":"https://www.udemy.com/course/coroutines-on-android/"}]},"design-patterns/observer-pattern/stateflow-sharedflow":{"id":"design-patterns/observer-pattern/stateflow-sharedflow","title":"StateFlow / SharedFlow","description":"`StateFlow` and `SharedFlow` are **hot** Flow implementations that exist independently of collectors. `StateFlow` always holds a current value (equivalent to RxJava's `BehaviorSubject`) and is the recommended way to expose UI state from a ViewModel; it replaces `LiveData` in Kotlin codebases. `SharedFlow` emits to all active collectors simultaneously and supports configurable replay and buffering (equivalent to `PublishSubject`); it is used for one-shot events like navigation commands or snackbars. Expose as the read-only interface (`StateFlow`/`SharedFlow`) and hold a private `MutableStateFlow`/`MutableSharedFlow` internally.","resources":[{"type":"Official","title":"StateFlow and SharedFlow | Android Developers","url":"https://developer.android.com/kotlin/flow/stateflow-and-sharedflow"},{"type":"Article","title":"Kotlin Flow, StateFlow and SharedFlow Android | ProAndroidDev","url":"https://proandroiddev.com/kotlin-flow-stateflow-and-sharedflow-android-6737bd79bbd2"},{"type":"Video","title":"StateFlow vs. Flow vs. SharedFlow vs. LiveData — When to Use What?! | Philipp Lackner","url":"https://www.youtube.com/watch?v=6Jc6-INantQ"},{"type":"Course","title":"Kotlin Coroutines and Flow for Android Development | Udemy","url":"https://www.udemy.com/course/coroutines-on-android/"}]},"design-patterns/observer-pattern/channels":{"id":"design-patterns/observer-pattern/channels","title":"Channels","description":"Kotlin `Channel` is a coroutine primitive for **point-to-point** communication between coroutines: one or more senders write to the channel, one or more receivers consume from it, and each value is delivered to exactly one receiver. Conceptually it is a non-blocking replacement for `java.util.concurrent.BlockingQueue`. Channels support different capacity modes: `RENDEZVOUS` (no buffer), `BUFFERED`, `CONFLATED` (keeps only the latest), and `UNLIMITED`. In Android, prefer `SharedFlow` for UI event streams; channels are more appropriate for producer-consumer pipelines or when exactly-once delivery semantics are needed.","resources":[{"type":"Official","title":"Channels | Kotlin Documentation","url":"https://kotlinlang.org/docs/channels.html"},{"type":"Article","title":"Kotlin Coroutines in Android — Channel | Medium","url":"https://medium.com/swlh/kotlin-coroutines-in-android-channel-fb9b3b65e0b"},{"type":"Video","title":"Complete Guide on Kotlin Channels (Coroutines) — Android Studio Tutorial | Philipp Lackner","url":"https://www.youtube.com/watch?v=unkgAYV9SpI"}]},"design-patterns/observer-pattern/rxjava-legacy":{"id":"design-patterns/observer-pattern/rxjava-legacy","title":"RxJava (legacy)","description":"RxJava brought Reactive Extensions (ReactiveX) to the JVM and was the dominant asynchronous programming library for Android for several years. It introduced composable stream types (`Observable`, `Flowable`, `Single`, `Maybe`, `Completable`), a rich operator set, and schedulers for threading. It remains in large legacy codebases and some third-party libraries. **Kotlin Coroutines and Flow** are now the recommended modern replacement, offering simpler semantics, structured concurrency, and first-class Kotlin support. The `kotlinx-coroutines-rx3` interop library eases incremental migration from RxJava to Flow.","resources":[{"type":"Official","title":"RxJava — GitHub","url":"https://github.com/ReactiveX/RxJava"},{"type":"Article","title":"The Real Kotlin Flow Benefits over RxJava | ProAndroidDev","url":"https://proandroiddev.com/the-real-kotlin-flow-benefits-over-rxjava-c19b99ba6eb9"},{"type":"Video","title":"KotlinConf 2019: Migrating a Library from RxJava to Coroutines | YouTube","url":"https://www.youtube.com/watch?v=raWdIwsDe-g"}]},"design-patterns/observer-pattern/livedata-legacy":{"id":"design-patterns/observer-pattern/livedata-legacy","title":"LiveData (legacy)","description":"`LiveData` is a lifecycle-aware observable that automatically manages subscriptions, stopping emission to observers in the background and resuming when they return to the foreground. While it was ground-breaking when introduced as part of Android Architecture Components, it is now considered legacy: it lacks coroutine integration, does not support operators well, and its event-delivery semantics can be surprising on re-subscription. **`StateFlow`** and **`SharedFlow`** collected with `repeatOnLifecycle` are the recommended replacements in modern Kotlin-first codebases. `LiveData` is still usable in Java projects or where Kotlin coroutines cannot be adopted.","resources":[{"type":"Official","title":"LiveData overview | Android Developers","url":"https://developer.android.com/topic/libraries/architecture/livedata"},{"type":"Article","title":"Migrating from LiveData to Kotlin's Flow | Android Developers Blog","url":"https://medium.com/androiddevelopers/migrating-from-livedata-to-kotlins-flow-379292f419fb"},{"type":"Video","title":"StateFlow vs. Flow vs. SharedFlow vs. LiveData — When to Use What?! | Philipp Lackner","url":"https://www.youtube.com/watch?v=6Jc6-INantQ"}]},"design-patterns/dependency-injection/hilt":{"id":"design-patterns/dependency-injection/hilt","title":"Hilt","description":"Hilt is Google's recommended dependency injection library for Android, built on top of Dagger 2. It dramatically reduces DI boilerplate by providing pre-built components scoped to standard Android classes (`@HiltAndroidApp`, `@AndroidEntryPoint`, `@HiltViewModel`). Hilt uses compile-time code generation to validate the dependency graph, catching missing bindings as build errors rather than runtime crashes. It integrates with Jetpack Navigation, WorkManager, and Compose, and provides first-class support for testing via `@HiltAndroidTest` and `TestInstallIn`. Hilt is the successor to the older `dagger.android` extension.","resources":[{"type":"Official","title":"Dependency injection with Hilt | Android Developers","url":"https://developer.android.com/training/dependency-injection/hilt-android"},{"type":"Article","title":"Dependency injection with Hilt in Android development | Medium","url":"https://tomas-repcik.medium.com/dependency-injection-with-hilt-in-android-development-e23fc636d65c"},{"type":"Video","title":"Introduction to Hilt — MAD Skills | Android Developers","url":"https://www.youtube.com/watch?v=mnMCgjuMJPA"},{"type":"Video","title":"The Ultimate Dagger-Hilt Guide (Dependency Injection) | Philipp Lackner","url":"https://www.youtube.com/watch?v=bbMsuI2p1DQ"}]},"design-patterns/dependency-injection/dagger-legacy":{"id":"design-patterns/dependency-injection/dagger-legacy","title":"Dagger (legacy)","description":"Dagger 2 is a compile-time, annotation-based dependency injection framework for Java and Kotlin that generates fully-traced, type-safe injection code with no reflection. It introduced concepts such as `@Component`, `@Module`, `@Provides`, `@Inject`, and `@Scope` that remain the foundation of Hilt. The `dagger.android` extension that simplified Activity/Fragment injection is now in **maintenance mode** — no new features will be added. For new Android projects, use **Hilt** (which wraps Dagger) instead. Understanding Dagger is still valuable for large projects that predate Hilt or that require custom component hierarchies Hilt does not expose.","resources":[{"type":"Official","title":"Dagger basics | Android Developers","url":"https://developer.android.com/training/dependency-injection/dagger-basics"},{"type":"Official","title":"Using Dagger in Android apps | Android Developers","url":"https://developer.android.com/training/dependency-injection/dagger-android"},{"type":"Video","title":"The Ultimate Dagger-Hilt Guide (Dependency Injection) | Philipp Lackner","url":"https://www.youtube.com/watch?v=bbMsuI2p1DQ"}]},"design-patterns/dependency-injection/koin":{"id":"design-patterns/dependency-injection/koin","title":"Koin","description":"Koin is a lightweight, pure-Kotlin DI framework that resolves dependencies at **runtime** using a DSL rather than compile-time code generation. This means zero annotation processing, faster incremental builds, and a gentle learning curve. You declare modules with `module { single { } factory { } viewModel { } }` and retrieve dependencies with `by inject()` or `by viewModel()`. Koin 3+ supports Kotlin Multiplatform and provides Compose integration. The trade-off versus Hilt/Dagger is that graph errors surface at runtime rather than build time, requiring thorough test coverage to catch missing bindings.","resources":[{"type":"Official","title":"Koin — The Kotlin Dependency Injection Framework","url":"https://insert-koin.io/"},{"type":"Article","title":"Dependency Injection with Kotlin and Koin | Auth0 Blog","url":"https://auth0.com/blog/dependency-injection-with-kotlin-and-koin/"},{"type":"Video","title":"Dependency Injection with Koin — Android Tutorial | YouTube","url":"https://www.youtube.com/watch?v=RA3zWRjodHY"},{"type":"Repo","title":"InsertKoinIO/koin — GitHub","url":"https://github.com/InsertKoinIO/koin"}]},"design-patterns/dependency-injection/kotlin-inject":{"id":"design-patterns/dependency-injection/kotlin-inject","title":"kotlin-inject","description":"`kotlin-inject` is a **compile-time** dependency injection library for Kotlin that uses KSP (Kotlin Symbol Processing) for code generation, offering fast build performance compared to KAPT-based frameworks. It supports constructor injection via `@Inject`, abstract components, scopes, and Kotlin Multiplatform (JVM, Android, Native, JS). The API is inspired by Dagger but is idiomatic Kotlin — components are defined as abstract classes or interfaces and created through generated implementations. The KAPT backend has been removed; KSP is now required.","resources":[{"type":"Repo","title":"evant/kotlin-inject — GitHub","url":"https://github.com/evant/kotlin-inject"},{"type":"Article","title":"Introduction to Channels in Kotlin (Baeldung kotlin-inject overview)","url":"https://www.baeldung.com/kotlin/channels"},{"type":"Video","title":"Koin Annotations Tutorial: Dependency Injection in Kotlin for Android | YouTube","url":"https://www.youtube.com/watch?v=3OfHnhTHpG0"}]},"design-patterns/dependency-injection/metro":{"id":"design-patterns/dependency-injection/metro","title":"Metro","description":"Metro is a compile-time, multiplatform DI framework implemented as a **Kotlin compiler plugin**, combining ideas from Dagger, Anvil, and kotlin-inject into one cohesive solution. It validates the dependency graph at compile time like Dagger, supports aggregation/contribution patterns similar to Anvil, and provides a familiar `@Inject` / `@Provides` API. Because it is a compiler plugin rather than an annotation processor, it adds minimal build-time overhead. Metro reached 1.0.0 in April 2026 and is already used in production by the Cash App Android team, reporting a 60% improvement in incremental build speeds after migrating from Dagger.","resources":[{"type":"Repo","title":"ZacSweers/metro — GitHub","url":"https://github.com/ZacSweers/metro"},{"type":"Article","title":"Cash Android Moves to Metro | Cash App Code Blog","url":"https://code.cash.app/cash-android-moves-to-metro"},{"type":"Video","title":"The Ultimate Dagger-Hilt Guide (Dependency Injection) | Philipp Lackner","url":"https://www.youtube.com/watch?v=bbMsuI2p1DQ"}]},"architecture/patterns/mvvm":{"id":"architecture/patterns/mvvm","title":"MVVM","description":"Model-View-ViewModel (MVVM) separates concerns into three roles: **Model** (data and business logic), **View** (Activity/Fragment or Composable that renders UI), and **ViewModel** (exposes observable UI state and handles user events, surviving configuration changes). The View observes state exposed by the ViewModel as `StateFlow` or `LiveData` and sends user interactions back as events. MVVM is the architecture pattern that Google's official Jetpack guidance is built around, and it pairs naturally with the Repository pattern for the data layer and Clean Architecture layers for the domain layer.","resources":[{"type":"Official","title":"Guide to app architecture | Android Developers","url":"https://developer.android.com/topic/architecture"},{"type":"Article","title":"MVVM (Model View ViewModel) Architecture Pattern in Android | GeeksforGeeks","url":"https://www.geeksforgeeks.org/android/mvvm-model-view-viewmodel-architecture-pattern-in-android/"},{"type":"Video","title":"Full guide to Android App Architecture — MVVM + Clean Architecture + Jetpack Compose | YouTube","url":"https://www.youtube.com/watch?v=TosPS55y_IY"},{"type":"Roadmap","title":"Android Developer Roadmap — roadmap.sh","url":"https://roadmap.sh/android"},{"type":"Repo","title":"android/nowinandroid — Production MVVM + Clean Architecture reference","url":"https://github.com/android/nowinandroid"}]},"architecture/patterns/mvi":{"id":"architecture/patterns/mvi","title":"MVI","description":"Model-View-Intent (MVI) is an architecture pattern that enforces **strict unidirectional data flow** and immutable state. The **Intent** captures user actions or external events, a **Reducer** processes them to produce a new immutable **State** (the Model), and the **View** renders that state. Because state transitions are pure functions, the entire UI behaviour is deterministic and easy to test and reproduce. In Android, MVI is typically implemented with `ViewModel` + `StateFlow` (state) + `Channel`/`SharedFlow` (side effects) + a sealed class hierarchy for intents and states. It excels for screens with complex, multi-step interaction flows.","resources":[{"type":"Article","title":"MVI Architecture Pattern in Android | Medium","url":"https://medium.com/@mohammedkhudair57/mvi-architecture-pattern-in-android-0046bf9b8a2e"},{"type":"Article","title":"Mastering Android MVI: A Comprehensive Guide with Best Practices | Medium","url":"https://medium.com/@sharmapraveen91/mastering-android-mvi-a-comprehensive-guide-with-best-practices-and-common-pitfalls-2f6d78ce3266"},{"type":"Video","title":"The Ultimate guide to MVI in Android | YouTube","url":"https://www.youtube.com/watch?v=T4NGT9DL3qw"},{"type":"Roadmap","title":"Android Developer Roadmap — roadmap.sh","url":"https://roadmap.sh/android"}]},"architecture/patterns/clean-architecture":{"id":"architecture/patterns/clean-architecture","title":"Clean Architecture","description":"Clean Architecture, popularised by Robert C. Martin (Uncle Bob), organises code into concentric layers where dependencies always point **inward** toward the domain. For Android this typically maps to: **Presentation layer** (ViewModel, UI/Compose), **Domain layer** (use cases, domain models — pure Kotlin, no Android dependencies), and **Data layer** (repositories, data sources, Room, Retrofit). This strict separation makes the domain independently unit-testable, allows swapping data sources without touching the UI, and keeps each class focused on a single responsibility. It is often combined with MVVM or MVI at the presentation layer.","resources":[{"type":"Article","title":"The Clean Architecture | Clean Code Blog (Uncle Bob)","url":"https://blog.cleancoder.com/uncle-bob/2012/08/13/the-clean-architecture.html"},{"type":"Article","title":"Clean Architecture in Android Kotlin: A Complete Guide | Medium","url":"https://medium.com/@hussein0115300/clean-architecture-in-android-kotlin-a-complete-guide-13de3f51ab9b"},{"type":"Video","title":"How to Make a Clean Architecture Note App (MVVM / CRUD / Jetpack Compose) | Philipp Lackner","url":"https://www.youtube.com/watch?v=8YPXv7xKh2w"},{"type":"Course","title":"Android Developer = Compose + MVVM + Clean Architecture | Udemy","url":"https://www.udemy.com/course/android-developer-compose-mvvm-clean-architecture/"},{"type":"Repo","title":"android/nowinandroid — Clean Architecture reference app","url":"https://github.com/android/nowinandroid"}]},"architecture/patterns/unidirectional-data-flow-udf":{"id":"architecture/patterns/unidirectional-data-flow-udf","title":"Unidirectional Data Flow (UDF)","description":"Unidirectional Data Flow (UDF) is a design principle where **state flows down** the component tree and **events flow up**. In Android: the ViewModel holds and transforms state into a `UiState` object, the UI observes that state and renders it, and user interactions are forwarded back to the ViewModel as events — completing the loop. This pattern eliminates two-way binding bugs, makes state changes predictable and auditable, and simplifies testing by reducing coupling. UDF is the core design principle behind Jetpack Compose's state model (`remember`, `State\u003cT>`, hoisting) and is central to both MVVM and MVI implementations.","resources":[{"type":"Official","title":"UI layer | Android Developers","url":"https://developer.android.com/topic/architecture/ui-layer"},{"type":"Article","title":"Unidirectional data flow in Jetpack Compose | Medium","url":"https://medium.com/@mahmoud.alkateb22/unidirectional-data-flow-in-jetpack-compose-android-jetpack-compose-a47024f9a8f1"},{"type":"Video","title":"Full guide to Android App Architecture — MVVM + Clean Architecture + Jetpack Compose | YouTube","url":"https://www.youtube.com/watch?v=TosPS55y_IY"},{"type":"Repo","title":"android/nowinandroid — UDF + UiState reference implementation","url":"https://github.com/android/nowinandroid"}]},"architecture/modern-app-architecture/ui-layer":{"id":"architecture/modern-app-architecture/ui-layer","title":"UI Layer","description":"The UI layer (presentation layer) is responsible for displaying application data on screen and handling user interactions. It consists of **UI elements** (composables or Views) that render state, and **state holders** (typically `ViewModel`) that produce `UiState` and process events. The ViewModel fetches data from the domain or data layer, transforms it for display, and exposes it as a `StateFlow\u003cUiState>`. Following UDF in this layer ensures the UI is always a pure function of state — making it predictable, testable, and compatible with Android's Compose UI model.","resources":[{"type":"Official","title":"UI layer | Android Developers","url":"https://developer.android.com/topic/architecture/ui-layer"},{"type":"Article","title":"A flexible, modern Android app architecture: complete step-by-step | ProAndroidDev","url":"https://proandroiddev.com/a-flexible-modern-android-app-architecture-complete-step-by-step-d76901e29993"},{"type":"Video","title":"Full guide to Android App Architecture — MVVM + Clean Architecture + Jetpack Compose | YouTube","url":"https://www.youtube.com/watch?v=TosPS55y_IY"},{"type":"Repo","title":"android/nowinandroid — UI layer with Compose + ViewModel + StateFlow","url":"https://github.com/android/nowinandroid"}]},"architecture/modern-app-architecture/domain-layer":{"id":"architecture/modern-app-architecture/domain-layer","title":"Domain Layer","description":"The domain layer is an **optional** middle layer that sits between the UI layer and the data layer, housing reusable business logic that would otherwise be duplicated across multiple ViewModels. It contains **use case** classes (one use case per operation), pure domain model classes, and repository interfaces. Because it has no Android framework dependencies, it is the easiest layer to unit-test. Add a domain layer when you find yourself copying logic between ViewModels, when business rules are complex enough to warrant their own tests, or when you want to decouple the presentation from data-fetching concerns.","resources":[{"type":"Official","title":"Domain layer | Android Developers","url":"https://developer.android.com/topic/architecture/domain-layer"},{"type":"Article","title":"Adding a domain layer | Android Developers Blog","url":"https://medium.com/androiddevelopers/adding-a-domain-layer-bc5a708a96da"},{"type":"Video","title":"Full guide to Android App Architecture — MVVM + Clean Architecture + Jetpack Compose | YouTube","url":"https://www.youtube.com/watch?v=TosPS55y_IY"},{"type":"Repo","title":"android/nowinandroid — Domain layer with UseCases reference","url":"https://github.com/android/nowinandroid"}]},"architecture/modern-app-architecture/data-layer":{"id":"architecture/modern-app-architecture/data-layer","title":"Data Layer","description":"The data layer contains the **business data and data-access logic** of the app, made up of repositories and data sources. Repositories expose a unified data API to the rest of the app, arbitrating between remote (Retrofit), local (Room, DataStore), and in-memory sources. Each repository follows the **single source of truth** principle: it decides which source is authoritative and exposes a single observable stream (typically a `Flow`) for the UI to consume. The data layer should be the only place that knows about data origins, network protocols, or database schemas.","resources":[{"type":"Official","title":"Data layer | Android Developers","url":"https://developer.android.com/topic/architecture/data-layer"},{"type":"Article","title":"Android Clean Architecture: Understanding the Data Layer | ASOS Tech Blog","url":"https://medium.com/asos-techblog/android-clean-architecture-understanding-the-data-layer-a8df03b508c2"},{"type":"Video","title":"Full guide to Android App Architecture — MVVM + Clean Architecture + Jetpack Compose | YouTube","url":"https://www.youtube.com/watch?v=TosPS55y_IY"},{"type":"Repo","title":"android/nowinandroid — Data layer with Repository + Room + DataStore","url":"https://github.com/android/nowinandroid"}]},"architecture/modern-app-architecture/state-holders-uistate":{"id":"architecture/modern-app-architecture/state-holders-uistate","title":"State Holders / UiState","description":"A **state holder** is any class responsible for owning, producing, and exposing UI state. At screen level, `ViewModel` is the canonical state holder — it survives configuration changes and exposes state as `StateFlow\u003cUiState>`. For simpler, scoped UI logic (a form, a custom component) a plain class or Compose `rememberSaveable`-backed holder may suffice. **`UiState`** is typically a data class or sealed interface that bundles all data a screen needs to render, following UDF: one source of truth, immutable snapshots, and unidirectional updates. Distinguishing screen state from UI-element state keeps the architecture clean and testable.","resources":[{"type":"Official","title":"State holders and UI state | Android Developers","url":"https://developer.android.com/topic/architecture/ui-layer/stateholders"},{"type":"Article","title":"Crash Course on the Android UI Layer | Part 1 | Manuel Vivo","url":"https://manuelvivo.dev/crash-course-ui-layer-part-1"},{"type":"Video","title":"Full guide to Android App Architecture — MVVM + Clean Architecture + Jetpack Compose | YouTube","url":"https://www.youtube.com/watch?v=TosPS55y_IY"},{"type":"Repo","title":"android/nowinandroid — UiState with sealed interfaces reference","url":"https://github.com/android/nowinandroid"}]},"modularization-build-logic/build/gradle-kotlin-dsl":{"id":"modularization-build-logic/build/gradle-kotlin-dsl","title":"Gradle Kotlin DSL","description":"Gradle Kotlin DSL lets you write `build.gradle.kts` files in Kotlin instead of Groovy, giving you **compile-time type safety**, IDE autocompletion, and refactoring support. It became the default for new Android projects in Android Studio Giraffe (2023). Use it for all new projects; existing Groovy builds can be migrated file by file since both DSLs coexist within a single project.","resources":[{"type":"Official","title":"Gradle Kotlin DSL Primer","url":"https://docs.gradle.org/current/userguide/kotlin_dsl.html"},{"type":"Official","title":"Migrate your build configuration from Groovy to Kotlin | Android Developers","url":"https://developer.android.com/build/migrate-to-kotlin-dsl"},{"type":"Article","title":"Kotlin DSL Is Now the Default for New Gradle Builds | The Kotlin Blog","url":"https://blog.jetbrains.com/kotlin/2023/04/kotlin-dsl-is-the-default-for-new-gradle-builds/"},{"type":"Video","title":"The Ultimate Gradle Kotlin Beginner's Crash Course For 2025 | Philipp Lackner","url":"https://www.youtube.com/watch?v=RCRQlz78wCg"},{"type":"Roadmap","title":"Android Developer Roadmap | roadmap.sh","url":"https://roadmap.sh/android"}]},"modularization-build-logic/build/version-catalogs":{"id":"modularization-build-logic/build/version-catalogs","title":"Version Catalogs","description":"Version Catalogs centralize all dependency coordinates and versions in a single `libs.versions.toml` file at the root of the project. Gradle generates **type-safe accessors** (e.g., `libs.retrofit`) that are shared across all subprojects and visible in IDE autocompletion. This eliminates duplicated version strings and makes upgrading a dependency a one-line change. They became the default for new Android projects starting with Android Studio Hedgehog.","resources":[{"type":"Official","title":"Version Catalogs | Gradle Documentation","url":"https://docs.gradle.org/current/userguide/version_catalogs.html"},{"type":"Official","title":"Migrate your build to version catalogs | Android Developers","url":"https://developer.android.com/build/migrate-to-catalogs"},{"type":"Article","title":"Gradle Version Catalog | Ryan W – Medium","url":"https://callmeryan.medium.com/gradle-version-catalog-728111fa210f"},{"type":"Video","title":"Modern Dependency Management With Version Catalogs - Android Studio Tutorial | YouTube","url":"https://www.youtube.com/watch?v=MWw1jcwPK3Q"},{"type":"Roadmap","title":"Android Developer Roadmap | roadmap.sh","url":"https://roadmap.sh/android"}]},"modularization-build-logic/build/convention-plugins-build-logic":{"id":"modularization-build-logic/build/convention-plugins-build-logic","title":"Convention Plugins (build-logic)","description":"Convention plugins are precompiled script plugins that capture organization-wide Gradle configuration once and apply it consistently across all submodules. They live in an included build called `build-logic` (or `buildSrc`) under `src/main/kotlin/`, and their filename becomes the plugin ID. This pattern eliminates copy-pasting plugin blocks across feature modules and is the approach used by the official **Now in Android** sample.","resources":[{"type":"Official","title":"Convention Plugins | Gradle Documentation","url":"https://docs.gradle.org/current/userguide/implementing_gradle_plugins_convention.html"},{"type":"Official","title":"Sharing build logic between subprojects Sample | Gradle","url":"https://docs.gradle.org/current/samples/sample_convention_plugins.html"},{"type":"Article","title":"Simplify Your Android Builds: A Guide to Convention Plugins | Medium","url":"https://medium.com/@sridhar-sp/simplify-your-android-builds-a-guide-to-convention-plugins-b9fea8c5e117"},{"type":"Video","title":"Composable Build Logic - Adopting Convention Plugins For Android | MDL Meetup","url":"https://www.youtube.com/watch?v=2oYjAD1xxvo"},{"type":"Repo","title":"Now in Android – Convention Plugins (build-logic) | GitHub","url":"https://github.com/android/nowinandroid"}]},"modularization-build-logic/build/ksp":{"id":"modularization-build-logic/build/ksp","title":"KSP","description":"Kotlin Symbol Processing (KSP) is a lightweight compiler-plugin API for writing **annotation processors** in Kotlin. It is up to 2× faster than the older KAPT (which wraps Java APT) because it works directly on Kotlin's representation of source code without generating Java stubs. Libraries such as Room, Hilt, Moshi, and Ktorfit all provide KSP processors. KSP2, the default since KSP 2.0.0, is even faster and simpler to use.","resources":[{"type":"Official","title":"Kotlin Symbol Processing API | Kotlin Documentation","url":"https://kotlinlang.org/docs/ksp-overview.html"},{"type":"Official","title":"Getting started with KSP | Kotlin Documentation","url":"https://kotlinlang.org/docs/ksp-quickstart.html"},{"type":"Article","title":"Kotlin Symbol Processing (KSP): A Comprehensive Guide | Medium","url":"https://medium.com/@SrimanthChowdary/kotlin-symbol-processing-ksp-a-comprehensive-guide-to-modern-annotation-processing-in-kotlin-0200d4ac53e4"},{"type":"Video","title":"Kotlin Symbol Processing (KSP) for Android Developers - Introduction | YouTube","url":"https://www.youtube.com/watch?v=j6bRayP2L7M"},{"type":"Repo","title":"KSP – Kotlin Symbol Processing API | GitHub (google/ksp)","url":"https://github.com/google/ksp"}]},"modularization-build-logic/build/dependency-analysis-plugin":{"id":"modularization-build-logic/build/dependency-analysis-plugin","title":"Dependency Analysis Plugin","description":"The **Dependency Analysis Gradle Plugin** (`com.autonomousapps.dependency-analysis`) statically analyzes your project and reports which declared dependencies are unused, which transitive dependencies you use directly but have not declared, and which applied Gradle plugins contribute nothing. Running `./gradlew buildHealth` across the whole project helps keep module dependency graphs lean and build times fast.","resources":[{"type":"Official","title":"dependency-analysis-gradle-plugin | GitHub (autonomousapps)","url":"https://github.com/autonomousapps/dependency-analysis-gradle-plugin"},{"type":"Official","title":"com.autonomousapps.dependency-analysis | Gradle Plugin Portal","url":"https://plugins.gradle.org/plugin/com.autonomousapps.dependency-analysis"},{"type":"Article","title":"Dependency Analysis Plugin Wiki | GitHub","url":"https://github.com/autonomousapps/dependency-analysis-android-gradle-plugin/wiki"},{"type":"Video","title":"Speeding up your Android Gradle Builds (Google I/O '17) | Android Developers (YouTube)","url":"https://www.youtube.com/watch?v=7ll-rkLCtyk"}]},"modularization-build-logic/module-structure/app":{"id":"modularization-build-logic/module-structure/app","title":":app","description":"The `:app` module is the **entry point** of the application—it produces the installable APK or AAB. Its only job is to wire together feature and core modules through root navigation and dependency injection setup; it should contain as little business logic as possible. Because everything depends on `:app`, it is the most expensive module to compile, so keeping it thin directly improves incremental build times.","resources":[{"type":"Official","title":"Guide to Android app modularization | Android Developers","url":"https://developer.android.com/topic/modularization"},{"type":"Official","title":"Common modularization patterns | Android Developers","url":"https://developer.android.com/topic/modularization/patterns"},{"type":"Article","title":"Now in Android – Modularization Learning Journey | GitHub","url":"https://github.com/android/nowinandroid/blob/main/docs/ModularizationLearningJourney.md"},{"type":"Video","title":"Leveraging Gradle Convention Plugins to Enhance Your Build Configuration | YouTube","url":"https://www.youtube.com/watch?v=Fx46ttEfZk8"},{"type":"Repo","title":"Now in Android – Fully Modularized Android Sample | GitHub","url":"https://github.com/android/nowinandroid"}]},"modularization-build-logic/module-structure/feature":{"id":"modularization-build-logic/module-structure/feature","title":":feature:*","description":"Feature modules (`:feature:home`, `:feature:settings`, etc.) each own **a single user-facing screen or flow**—its UI, ViewModel, and navigation routes. Feature modules depend on `:core:*` modules for shared infrastructure but **never depend on other feature modules**, which prevents circular dependencies and enables parallel compilation. Splitting features into separate modules also enables Jetpack Navigation's Dynamic Feature support for on-demand delivery.","resources":[{"type":"Official","title":"Common modularization patterns | Android Developers","url":"https://developer.android.com/topic/modularization/patterns"},{"type":"Official","title":"Overview of Play Feature Delivery | Android Developers","url":"https://developer.android.com/guide/playcore/feature-delivery"},{"type":"Article","title":"Now in Android – Modularization Learning Journey | GitHub","url":"https://github.com/android/nowinandroid/blob/main/docs/ModularizationLearningJourney.md"},{"type":"Video","title":"Migrate to Gradle Version Catalog and Convention Plugins | Android Makers (YouTube)","url":"https://www.youtube.com/watch?v=2oYjAD1xxvo"},{"type":"Roadmap","title":"Android Developer Roadmap | roadmap.sh","url":"https://roadmap.sh/android"}]},"modularization-build-logic/module-structure/core":{"id":"modularization-build-logic/module-structure/core","title":":core:*","description":"Core modules (`:core:ui`, `:core:network`, `:core:testing`, etc.) hold **cross-cutting infrastructure** that is shared across many feature and data modules. They do not represent any specific screen or business domain. Core modules may depend on each other (e.g., `:core:network` depends on `:core:model`) but should never depend on feature modules, maintaining a strict acyclic dependency graph.","resources":[{"type":"Official","title":"Guide to Android app modularization | Android Developers","url":"https://developer.android.com/topic/modularization"},{"type":"Official","title":"Common modularization patterns | Android Developers","url":"https://developer.android.com/topic/modularization/patterns"},{"type":"Article","title":"Now in Android – Modularization Learning Journey | GitHub","url":"https://github.com/android/nowinandroid/blob/main/docs/ModularizationLearningJourney.md"},{"type":"Repo","title":"Now in Android – Fully Modularized Android Sample | GitHub","url":"https://github.com/android/nowinandroid"},{"type":"Video","title":"Composable Build Logic - Adopting Convention Plugins For Android | MDL Meetup (YouTube)","url":"https://www.youtube.com/watch?v=2oYjAD1xxvo"}]},"modularization-build-logic/module-structure/data":{"id":"modularization-build-logic/module-structure/data","title":":data:*","description":"Data modules (`:data:user`, `:data:news`, etc.) encapsulate the **repository layer**: they expose repository interfaces to feature modules while hiding data sources (network, database, cache). A data module typically depends on `:core:network` and `:core:database` core modules; feature modules depend on data modules to fetch domain objects. This separation keeps features testable by swapping repository implementations with fakes.","resources":[{"type":"Official","title":"Common modularization patterns | Android Developers","url":"https://developer.android.com/topic/modularization/patterns"},{"type":"Official","title":"Data layer | App architecture | Android Developers","url":"https://developer.android.com/topic/architecture/data-layer"},{"type":"Article","title":"Now in Android – Modularization Learning Journey | GitHub","url":"https://github.com/android/nowinandroid/blob/main/docs/ModularizationLearningJourney.md"},{"type":"Repo","title":"Now in Android – Fully Modularized Android Sample | GitHub","url":"https://github.com/android/nowinandroid"},{"type":"Video","title":"Composable Build Logic - Adopting Convention Plugins For Android | MDL Meetup (YouTube)","url":"https://www.youtube.com/watch?v=2oYjAD1xxvo"}]},"modularization-build-logic/module-structure/domain":{"id":"modularization-build-logic/module-structure/domain","title":":domain:*","description":"Domain modules (`:domain:user`, `:domain:search`, etc.) are an **optional** layer that sits between data and feature modules, holding use-case classes and pure business-logic models. They are plain Kotlin/Java modules with no Android dependencies, making them trivially unit-testable. Use domain modules when multiple feature modules share the same non-trivial business logic, and skip them for simple CRUD screens where a repository call suffices.","resources":[{"type":"Official","title":"Domain layer | App architecture | Android Developers","url":"https://developer.android.com/topic/architecture/domain-layer"},{"type":"Official","title":"Common modularization patterns | Android Developers","url":"https://developer.android.com/topic/modularization/patterns"},{"type":"Article","title":"Now in Android – Modularization Learning Journey | GitHub","url":"https://github.com/android/nowinandroid/blob/main/docs/ModularizationLearningJourney.md"},{"type":"Repo","title":"Now in Android – Fully Modularized Android Sample | GitHub","url":"https://github.com/android/nowinandroid"},{"type":"Video","title":"Composable Build Logic - Adopting Convention Plugins For Android | MDL Meetup (YouTube)","url":"https://www.youtube.com/watch?v=2oYjAD1xxvo"}]},"network/clients-i-o/okhttp":{"id":"network/clients-i-o/okhttp","title":"OkHttp","description":"OkHttp is Square's meticulous HTTP client for Android, JVM, and GraalVM. It defaults to HTTP/2 (sharing a single socket per host), connection pooling, transparent GZIP, and response caching. OkHttp handles network problems automatically with silent recovery, and supports modern TLS including TLS 1.3. It is the networking engine that powers Retrofit and is required by Coil for network image loading.","resources":[{"type":"Official","title":"OkHttp Overview | square.github.io","url":"https://square.github.io/okhttp/"},{"type":"Official","title":"OkHttp Recipes | square.github.io","url":"https://square.github.io/okhttp/recipes/"},{"type":"Article","title":"OkHttp Tutorial | Vogella","url":"https://www.vogella.com/tutorials/JavaLibrary-OkHttp/article.html"},{"type":"Video","title":"How to use the OkHttp library in Android Studio | YouTube","url":"https://www.youtube.com/watch?v=uSY2RqdBL04"},{"type":"Repo","title":"OkHttp GitHub Repository | square/okhttp","url":"https://github.com/square/okhttp"}]},"network/clients-i-o/interceptor":{"id":"network/clients-i-o/interceptor","title":"Interceptor","description":"OkHttp Interceptors are middleware components that can **monitor, rewrite, and retry** HTTP calls. **Application interceptors** fire once per logical call (even when the response is cached) and are ideal for adding auth headers or logging high-level requests. **Network interceptors** sit closer to the wire and can observe redirects and retries. The built-in `HttpLoggingInterceptor` artifact is the standard way to log request/response bodies during development.","resources":[{"type":"Official","title":"Interceptors | OkHttp Documentation","url":"https://square.github.io/okhttp/features/interceptors/"},{"type":"Article","title":"OkHttp Interceptor in Android | Medium","url":"https://medium.com/@anna972606/okhttp-interceptor-in-android-cf63675482af"},{"type":"Video","title":"Building Secure APIs with JWT and Token Refresh using OkHttp Interceptors | YouTube","url":"https://www.youtube.com/watch?v=zx9GUaKH2Ew"},{"type":"Video","title":"Retrofit Tutorial — Manage Request Headers in OkHttp Interceptor | YouTube","url":"https://www.youtube.com/watch?v=dh86zr4C2zg"}]},"network/clients-i-o/retrofit":{"id":"network/clients-i-o/retrofit","title":"Retrofit","description":"Retrofit turns a Java/Kotlin interface annotated with HTTP annotations (`@GET`, `@POST`, `@Path`, etc.) into a fully functional, **type-safe HTTP client**. It delegates I/O to OkHttp and delegates serialization to a pluggable converter (Gson, Moshi, kotlinx.serialization). Retrofit supports suspend functions natively, making it the de-facto standard REST client for Android. Version 3.x requires Java 8+ / Android API 21+.","resources":[{"type":"Official","title":"Retrofit Introduction | square.github.io","url":"https://square.github.io/retrofit/"},{"type":"Official","title":"Retrofit Configuration | square.github.io","url":"https://square.github.io/retrofit/configuration/"},{"type":"Article","title":"Retrofit in Android | Medium","url":"https://medium.com/@KaushalVasava/retrofit-in-android-5a28c8e988ce"},{"type":"Video","title":"The Ultimate Retrofit Crash Course | Philipp Lackner (YouTube)","url":"https://www.youtube.com/watch?v=t6Sql3WMAnk"},{"type":"Repo","title":"Retrofit GitHub Repository | square/retrofit","url":"https://github.com/square/retrofit"}]},"network/clients-i-o/okio":{"id":"network/clients-i-o/okio","title":"Okio","description":"Okio is Square's I/O library that complements `java.io` and `java.nio` with simpler, more powerful abstractions. Its two core types—**`ByteString`** (immutable byte sequence) and **`Buffer`** (mutable, auto-sizing byte sequence)—form the foundation OkHttp builds on. `Source` and `Sink` replace `InputStream`/`OutputStream` and include built-in timeout support. Okio also supports Kotlin Multiplatform, making it useful beyond Android.","resources":[{"type":"Official","title":"Okio Overview | square.github.io","url":"https://square.github.io/okio/"},{"type":"Official","title":"Okio Recipes | square.github.io","url":"https://square.github.io/okio/recipes/"},{"type":"Article","title":"Okio Multiplatform | square.github.io","url":"https://square.github.io/okio/multiplatform/"},{"type":"Repo","title":"Okio GitHub Repository | square/okio","url":"https://github.com/square/okio"},{"type":"Video","title":"The Ultimate Retrofit Crash Course (covers OkHttp/Okio pipeline) | Philipp Lackner (YouTube)","url":"https://www.youtube.com/watch?v=t6Sql3WMAnk"}]},"network/clients-i-o/ktor":{"id":"network/clients-i-o/ktor","title":"Ktor","description":"Ktor Client is JetBrains' **Kotlin Multiplatform HTTP client** that runs on Android (via OkHttp engine), iOS (Darwin), JVM (CIO), and JS. It is plugin-based: you opt in to content negotiation, auth, logging, and WebSocket support. For KMP projects targeting Android and iOS, Ktor is the recommended network client because it shares the same code across platforms using a common `HttpClient` configuration.","resources":[{"type":"Official","title":"Create a Ktor client application | Ktor Documentation","url":"https://ktor.io/docs/client-create-new-application.html"},{"type":"Official","title":"Client engines | Ktor Documentation","url":"https://ktor.io/docs/client-engines.html"},{"type":"Article","title":"Making an HTTP request using Ktor Client | Medium","url":"https://mubaraknative.medium.com/making-an-http-request-using-ktor-client-a87c2593ed25"},{"type":"Video","title":"Ktor Tutorial for Android & Kotlin Multiplatform - Make HTTP Calls | YouTube","url":"https://www.youtube.com/watch?v=NILH5pIehbM"},{"type":"Video","title":"How to Build a Simple REST API With Ktor and Android App | Philipp Lackner (YouTube)","url":"https://www.youtube.com/watch?v=Z4W4aqXpE1w"}]},"network/clients-i-o/ktorfit":{"id":"network/clients-i-o/ktorfit","title":"Ktorfit","description":"Ktorfit is a **Retrofit-inspired HTTP client generator for Kotlin Multiplatform**, built on top of Ktor Client and KSP. You define an interface with annotations like `@GET` and `@POST`, and Ktorfit's KSP plugin generates the implementation at compile time. It targets Android, iOS, JVM, JS, and WasmJs, making it the KMP equivalent of Retrofit for projects that cannot use Retrofit's JVM-only reflection approach.","resources":[{"type":"Official","title":"Ktorfit Documentation | foso.github.io","url":"https://foso.github.io/Ktorfit/"},{"type":"Official","title":"Ktorfit GitHub Repository | Foso","url":"https://github.com/Foso/Ktorfit"},{"type":"Article","title":"Ktorfit Requests | foso.github.io","url":"https://foso.github.io/Ktorfit/requests/"},{"type":"Repo","title":"Ktorfit GitHub Repository | Foso/Ktorfit","url":"https://github.com/Foso/Ktorfit"},{"type":"Video","title":"Ktor Tutorial for Android & Kotlin Multiplatform - Make HTTP Calls (YouTube)","url":"https://www.youtube.com/watch?v=NILH5pIehbM"}]},"network/data-formats/kotlinx-serialization":{"id":"network/data-formats/kotlinx-serialization","title":"kotlinx.serialization","description":"kotlinx.serialization is JetBrains' official **Kotlin Multiplatform serialization library** supporting JSON, CBOR, Protocol Buffers, and more. Adding the `@Serializable` annotation to a class is all that's needed; the Gradle plugin generates serializers at compile time without reflection. It is the preferred serialization approach in KMP projects because Gson and Moshi rely on JVM reflection unavailable on Kotlin/Native.","resources":[{"type":"Official","title":"Serialization | Kotlin Documentation","url":"https://kotlinlang.org/docs/serialization.html"},{"type":"Official","title":"kotlinx.serialization GitHub Repository","url":"https://github.com/Kotlin/kotlinx.serialization"},{"type":"Article","title":"Kotlinx.Serialization Part 1 | Medium","url":"https://medium.com/swlh/kotlinx-serialization-part1-4407893132c2"},{"type":"Course","title":"Get data from the internet (uses kotlinx.serialization) | Android Developers Codelab","url":"https://developer.android.com/codelabs/basic-android-kotlin-compose-getting-data-internet"},{"type":"Video","title":"How to Deserialize Inconsistent JSON Data With a Custom Kotlinx Serializer | Philipp Lackner (YouTube)","url":"https://www.youtube.com/watch?v=_KQBp5pwUO0"}]},"network/data-formats/moshi":{"id":"network/data-formats/moshi","title":"Moshi","description":"Moshi is Square's modern JSON library for Kotlin and Java. Its Kotlin codegen support (via KSP) generates small, fast adapters at compile time, avoiding reflection. Moshi integrates naturally with OkHttp through Okio's `BufferedSource`/`BufferedSink` APIs. For new Android-only projects Moshi remains a solid alternative to kotlinx.serialization; for KMP projects, kotlinx.serialization is generally preferred.","resources":[{"type":"Official","title":"Moshi GitHub Repository | Square","url":"https://github.com/square/moshi"},{"type":"Article","title":"Moshi API Reference | square.github.io","url":"https://square.github.io/moshi/1.x/moshi/"},{"type":"Repo","title":"Moshi GitHub Repository | square/moshi","url":"https://github.com/square/moshi"},{"type":"Video","title":"Android Bootcamp - JSON Parsing Using Moshi Library (YouTube)","url":"https://www.youtube.com/watch?v=H3DQgZqjkGo"}]},"network/data-formats/apollo-kotlin-graphql":{"id":"network/data-formats/apollo-kotlin-graphql","title":"Apollo Kotlin (GraphQL)","description":"Apollo Kotlin is a **strongly-typed, caching GraphQL client** for Android and Kotlin Multiplatform. It generates Kotlin types for every GraphQL operation you write, eliminating JSON parsing boilerplate and type casting. It supports normalized caching (memory + SQLite), subscriptions over WebSocket, and integrates with Android Studio via a dedicated plugin. Version 4.x is the current stable release targeting KMP.","resources":[{"type":"Official","title":"Introduction to Apollo Kotlin | Apollo GraphQL Docs","url":"https://www.apollographql.com/docs/kotlin"},{"type":"Official","title":"Apollo Kotlin GitHub Repository","url":"https://github.com/apollographql/apollo-kotlin"},{"type":"Article","title":"GraphQL in Android: A Step-by-Step Guide Using Kotlin and Apollo | Medium","url":"https://medium.com/@pranav.patel2001/graphql-in-android-a-step-by-step-guide-using-kotlin-and-apollo-ba3dc1ef4b79"},{"type":"Course","title":"Apollo Kotlin Android Tutorial – Odyssey Learning Platform | Apollo GraphQL","url":"https://www.apollographql.com/tutorials/apollo-kotlin-android-part1"},{"type":"Video","title":"GraphQL in Android with Apollo Kotlin | pl_coding (YouTube)","url":"https://www.youtube.com/watch?v=ME3LH2bib3g"}]},"image-loading/libraries/coil-3-kmp":{"id":"image-loading/libraries/coil-3-kmp","title":"Coil 3 (KMP)","description":"Coil 3 is a **Kotlin Multiplatform image loading library** supporting Android, JVM, iOS, macOS, JS, and WASM. It is written entirely in Kotlin and uses coroutines for async image loading. Coil 3 uses Ktor (not OkHttp) as its network engine on non-Android targets, enabling true KMP code sharing. The `coil-compose` artifact provides the `AsyncImage` composable for Jetpack Compose and Compose Multiplatform.","resources":[{"type":"Official","title":"Coil Documentation | coil-kt.github.io","url":"https://coil-kt.github.io/coil/"},{"type":"Official","title":"Getting Started – Coil | coil-kt.github.io","url":"https://coil-kt.github.io/coil/getting_started/"},{"type":"Article","title":"Loading Images with Coil in Compose Multiplatform | Medium","url":"https://medium.com/@domen.lanisnik/loading-images-with-coil-in-compose-multiplatform-4c94e16a06d7"},{"type":"Video","title":"Coil - Modern Image Loading Library | Android Studio Tutorial (YouTube)","url":"https://www.youtube.com/watch?v=Ciab3R641YM"},{"type":"Repo","title":"Coil GitHub Repository | coil-kt/coil","url":"https://github.com/coil-kt/coil"}]},"image-loading/libraries/glide":{"id":"image-loading/libraries/glide","title":"Glide","description":"Glide is Bumptech's battle-tested image loading and caching library for Android, optimized for **smooth scrolling** in lists. It supports GIFs, video thumbnails, and animated WebP in addition to static images, and manages an internal bitmap pool to minimize GC pressure. Glide is Android-only (no KMP support), so for new KMP or Compose Multiplatform projects Coil 3 is typically preferred.","resources":[{"type":"Official","title":"Glide v4: Fast and Efficient Image Loading for Android | bumptech.github.io","url":"https://bumptech.github.io/glide/"},{"type":"Official","title":"Glide Getting Started | bumptech.github.io","url":"https://bumptech.github.io/glide/doc/getting-started.html"},{"type":"Article","title":"How to Use Glide Image Loader Library in Android Apps | GeeksforGeeks","url":"https://www.geeksforgeeks.org/android/image-loading-caching-library-android-set-2/"},{"type":"Video","title":"Glide Tutorial – Working with Images in your Android App | YouTube","url":"https://www.youtube.com/watch?v=_huNIBQ_jLQ"},{"type":"Repo","title":"Glide GitHub Repository | bumptech/glide","url":"https://github.com/bumptech/glide"}]},"image-loading/libraries/coil-compose":{"id":"image-loading/libraries/coil-compose","title":"coil-compose","description":"The `coil-compose` artifact provides fi
