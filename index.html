mBar`, `floatingActionButton`, `snackbarHost`, and a `content` area that receives `PaddingValues` to avoid overlap with bars. It handles window-insets consumption so nested content is not obscured by system bars. Use `Scaffold` as the root composable of every full-screen destination in a Material app.","resources":[{"type":"Official","title":"Scaffold | Jetpack Compose | Android Developers","url":"https://developer.android.com/develop/ui/compose/components/scaffold"},{"type":"Article","title":"Bottom Navigation and Navigation Drawer Using Scaffold from Jetpack Compose – ProAndroidDev","url":"https://proandroiddev.com/bottom-navigation-and-navigation-drawer-using-scaffold-from-jetpack-compose-e2167440e7a9"},{"type":"Video","title":"Edge-to-edge and insets | Compose Tips – Android Developers","url":"https://www.youtube.com/watch?v=QRzepC9gHj4"},{"type":"Repo","title":"android/nowinandroid (Scaffold with NavigationBar and TopAppBar)","url":"https://github.com/android/nowinandroid"},{"type":"Course","title":"Jetpack Compose for Android Developers – Pathway 2: Layouts, theming, and animation","url":"https://developer.android.com/courses/pathways/jetpack-compose-for-android-developers-2"}]},"compose-ui/performance/stable-params":{"id":"compose-ui/performance/stable-params","title":"Stable params","description":"**Stability** determines whether Compose can safely skip recomposing a composable when its inputs have not changed. A composable is *skippable* only when all its parameters are stable — primitives, `String`, lambdas, and value classes with all-val fields qualify automatically. Unstable types (mutable classes, `List`, `Map`) force recomposition on every parent recompose. Annotate with `@Stable` or `@Immutable`, or use Kotlinx immutable collections, to make custom types stable.","resources":[{"type":"Official","title":"Stability in Compose | Jetpack Compose | Android Developers","url":"https://developer.android.com/develop/ui/compose/performance/stability"},{"type":"Article","title":"Improve your Android App Performance by 10X with Compose Stability – ProAndroidDev","url":"https://proandroiddev.com/improve-your-android-app-performance-by-10x-with-compose-stability-jetpack-compose-vikas-soni-dcde62b177d0"},{"type":"Video","title":"How to analyze and improve performance of your Jetpack Compose app – Google I/O 2024","url":"https://www.youtube.com/watch?v=c3gdS42TJmI"},{"type":"Repo","title":"android/nowinandroid (@Stable / @Immutable annotations throughout UI layer)","url":"https://github.com/android/nowinandroid"},{"type":"Course","title":"Jetpack Compose for Android Developers – Pathway 4: Accessibility and performance","url":"https://developer.android.com/courses/pathways/jetpack-compose-for-android-developers-4"}]},"compose-ui/performance/movablecontentof":{"id":"compose-ui/performance/movablecontentof","title":"movableContentOf","description":"**`movableContentOf`** wraps a composable lambda so that its remembered state and internal composition are preserved when the lambda is moved to a different location in the composition tree, rather than being destroyed and recreated. This is valuable for adaptive layouts (e.g., rearranging cards between a list and a grid on orientation change) where expensive composables — video players, camera previews — would otherwise reset on relocation.","resources":[{"type":"Official","title":"MovableContent | API reference | Android Developers","url":"https://developer.android.com/reference/kotlin/androidx/compose/runtime/MovableContent"},{"type":"Article","title":"Exploring MovableContentOf in Jetpack Compose – Medium / Better Programming","url":"https://medium.com/better-programming/exploring-movablecontentof-in-jetpack-compose-6807a43047cd"},{"type":"Video","title":"How to analyze and improve performance of your Jetpack Compose app – Google I/O 2024","url":"https://www.youtube.com/watch?v=c3gdS42TJmI"},{"type":"Repo","title":"android/compose-samples – Reply (adaptive layout with movable content patterns)","url":"https://github.com/android/compose-samples/tree/main/Reply"},{"type":"Course","title":"Jetpack Compose for Android Developers – Pathway 4: Accessibility and performance","url":"https://developer.android.com/courses/pathways/jetpack-compose-for-android-developers-4"}]},"compose-ui/performance/baseline-profiles":{"id":"compose-ui/performance/baseline-profiles","title":"Baseline Profiles","description":"**Baseline Profiles** ship with a binary rule file that instructs Android Runtime to AOT-compile critical code paths before the user first launches the app, avoiding JIT interpretation overhead. Because Compose is distributed as a library (not part of the platform), it benefits greatly from profiles — Google reports ~30% faster execution from first launch. Generate an app-specific profile with Macrobenchmark to cover your key user journeys in addition to the Compose library's bundled profile.","resources":[{"type":"Official","title":"Use a baseline profile | Jetpack Compose | Android Developers","url":"https://developer.android.com/develop/ui/compose/performance/baseline-profiles"},{"type":"Article","title":"Baseline Profiles overview | App quality | Android Developers","url":"https://developer.android.com/topic/performance/baselineprofiles/overview"},{"type":"Video","title":"How to analyze and improve performance of your Jetpack Compose app – Google I/O 2024","url":"https://www.youtube.com/watch?v=c3gdS42TJmI"},{"type":"Repo","title":"android/nowinandroid (Baseline Profile generation with Macrobenchmark)","url":"https://github.com/android/nowinandroid"},{"type":"Course","title":"Jetpack Compose for Android Developers – Pathway 4: Accessibility and performance","url":"https://developer.android.com/courses/pathways/jetpack-compose-for-android-developers-4"}]},"compose-ui/testing-preview/createcomposerule":{"id":"compose-ui/testing-preview/createcomposerule","title":"createComposeRule","description":"**`createComposeRule()`** creates a JUnit 4 `TestRule` that hosts an isolated Compose UI environment without requiring a real Activity. Use `composeTestRule.setContent { ... }` to inject composables, then drive the UI with `onNode`, `performClick`, and `assert*` APIs. When you need Activity context (e.g., to test resources or intents), use `createAndroidComposeRule\u003cYourActivity>()` instead.","resources":[{"type":"Official","title":"Test your Compose layout | Jetpack Compose | Android Developers","url":"https://developer.android.com/develop/ui/compose/testing"},{"type":"Article","title":"Exploring Compose Test Rules – Joe Birch","url":"https://joebirch.co/android/exploring-compose-test-rules/"},{"type":"Video","title":"Testing | Jetpack Compose Tips – Android Developers","url":"https://www.youtube.com/watch?v=Y9GWnwi9D0I"},{"type":"Repo","title":"android/nowinandroid (createComposeRule across UI tests)","url":"https://github.com/android/nowinandroid"},{"type":"Course","title":"Jetpack Compose for Android Developers – Pathway 5: Testing","url":"https://developer.android.com/courses/pathways/jetpack-compose-for-android-developers-5"}]},"compose-ui/testing-preview/semantics":{"id":"compose-ui/testing-preview/semantics","title":"Semantics","description":"**Semantics** attach machine-readable meaning to composables, powering both the Compose testing framework and Accessibility Services. The semantics tree is generated alongside the layout tree; composables like `Text` and `Button` populate it automatically. Use `Modifier.semantics { contentDescription = \"...\" }` to add or override properties, and `Modifier.clearAndSetSemantics {}` to take full control. Tests find nodes via semantic matchers such as `hasText()`, `hasContentDescription()`, and `isEnabled()`.","resources":[{"type":"Official","title":"Semantics | Jetpack Compose | Android Developers","url":"https://developer.android.com/develop/ui/compose/testing/semantics"},{"type":"Article","title":"How to test Jetpack Compose – ProAndroidDev","url":"https://proandroiddev.com/how-to-test-jetpack-compose-f62ce23694b2"},{"type":"Video","title":"Testing | Jetpack Compose Tips – Android Developers","url":"https://www.youtube.com/watch?v=Y9GWnwi9D0I"},{"type":"Repo","title":"android/nowinandroid (comprehensive semantics usage in tests)","url":"https://github.com/android/nowinandroid"},{"type":"Course","title":"Jetpack Compose for Android Developers – Pathway 5: Testing","url":"https://developer.android.com/courses/pathways/jetpack-compose-for-android-developers-5"}]},"compose-ui/testing-preview/preview":{"id":"compose-ui/testing-preview/preview","title":"@Preview","description":"**`@Preview`** annotates a `@Composable` function so Android Studio renders a live visual preview in the IDE without building or running an app. Preview parameters control the `widthDp`, `heightDp`, `fontScale`, `uiMode` (dark/light), `locale`, `device`, and whether to show the system UI chrome. Multiple `@Preview` annotations can be stacked on one composable to see it in several configurations simultaneously.","resources":[{"type":"Official","title":"Preview your UI with composable previews | Jetpack Compose | Android Developers","url":"https://developer.android.com/develop/ui/compose/tooling/previews"},{"type":"Article","title":"Jetpack Compose Basics – ProAndroidDev","url":"https://proandroiddev.com/jetpack-compose-basics-26b62999ea9d"},{"type":"Video","title":"Testing | Jetpack Compose Tips – Android Developers","url":"https://www.youtube.com/watch?v=Y9GWnwi9D0I"},{"type":"Repo","title":"android/nowinandroid (@Preview annotations throughout UI components)","url":"https://github.com/android/nowinandroid"},{"type":"Course","title":"Jetpack Compose for Android Developers – Pathway 1: Compose essentials","url":"https://developer.android.com/courses/pathways/jetpack-compose-for-android-developers-1"}]},"compose-ui/testing-preview/previewparameter":{"id":"compose-ui/testing-preview/previewparameter","title":"@PreviewParameter","description":"**`@PreviewParameter`** populates a `@Preview` composable with sample data from a `PreviewParameterProvider\u003cT>` implementation that returns a `Sequence\u003cT>`. Each value in the sequence generates a separate preview panel in Android Studio, making it easy to visually verify the same composable with multiple data states (loading, empty, error, populated) without writing separate preview functions.","resources":[{"type":"Official","title":"Preview your UI with composable previews | Jetpack Compose | Android Developers","url":"https://developer.android.com/develop/ui/compose/tooling/previews"},{"type":"Article","title":"PreviewParameter | API reference | Android Developers","url":"https://developer.android.com/reference/kotlin/androidx/compose/ui/tooling/preview/PreviewParameter"},{"type":"Video","title":"Testing | Jetpack Compose Tips – Android Developers","url":"https://www.youtube.com/watch?v=Y9GWnwi9D0I"},{"type":"Repo","title":"android/nowinandroid (@PreviewParameter for multi-state composable previews)","url":"https://github.com/android/nowinandroid"},{"type":"Course","title":"Jetpack Compose for Android Developers – Pathway 5: Testing","url":"https://developer.android.com/courses/pathways/jetpack-compose-for-android-developers-5"}]},"compose-ui/testing-preview/multipreview":{"id":"compose-ui/testing-preview/multipreview","title":"Multipreview","description":"**Multipreview** lets you define a custom annotation that is itself annotated with multiple `@Preview` annotations, so that a single `@MyPreviewAnnotation` on a composable generates previews for all the bundled configurations at once. Built-in templates (`@PreviewScreenSizes`, `@PreviewFontScales`, `@PreviewLightDark`, `@PreviewDynamicColors`) are available from `ui-tooling-preview` 1.6+. Use multipreview to enforce consistent visual coverage across devices, font scales, and themes without boilerplate.","resources":[{"type":"Official","title":"Preview your UI with composable previews | Jetpack Compose | Android Developers","url":"https://developer.android.com/develop/ui/compose/tooling/previews"},{"type":"Article","title":"Jetpack Compose & best practices you must always remember – ProAndroidDev","url":"https://proandroiddev.com/jetpack-compose-best-practices-you-must-always-remember-98382b132d44"},{"type":"Video","title":"Testing | Jetpack Compose Tips – Android Developers","url":"https://www.youtube.com/watch?v=Y9GWnwi9D0I"},{"type":"Repo","title":"android/nowinandroid (Multipreview annotations for dark/light and size variants)","url":"https://github.com/android/nowinandroid"},{"type":"Course","title":"Jetpack Compose for Android Developers – Pathway 5: Testing","url":"https://developer.android.com/courses/pathways/jetpack-compose-for-android-developers-5"}]},"adaptive-ui-form-factors/adaptive/windowsizeclass":{"id":"adaptive-ui-form-factors/adaptive/windowsizeclass","title":"WindowSizeClass","description":"**WindowSizeClass** is an opinionated set of viewport breakpoints (Compact, Medium, Expanded, Large, Extra-large) that categorise the available window space your app occupies. Use `currentWindowAdaptiveInfo().windowSizeClass` to read the current class inside a composable and react to it with different layouts. It is the recommended starting point for any adaptive-layout work because it decouples layout decisions from specific device types or orientations.","resources":[{"type":"Official","title":"Use window size classes | Jetpack Compose | Android Developers","url":"https://developer.android.com/develop/ui/compose/layouts/adaptive/use-window-size-classes"},{"type":"Article","title":"Material 3 Adaptive: Implementing Window Size Classes in Kotlin Compose","url":"https://dev.to/marlonlom/material-3-adaptive-implementing-window-size-classes-in-kotlin-compose-40po"},{"type":"Video","title":"Building UI with the Material 3 adaptive library (Google I/O 2024)","url":"https://www.youtube.com/watch?v=xPUZENis4gc"},{"type":"Repo","title":"android/adaptive-apps-samples — official adaptive layout samples","url":"https://github.com/android/adaptive-apps-samples"},{"type":"Course","title":"Build adaptive apps with Jetpack Compose | Google Codelabs","url":"https://codelabs.developers.google.com/jetpack-compose-adaptability"}]},"adaptive-ui-form-factors/adaptive/material-3-adaptive":{"id":"adaptive-ui-form-factors/adaptive/material-3-adaptive","title":"Material 3 Adaptive","description":"**Material 3 Adaptive** is a suite of Jetpack libraries (`compose-material3-adaptive`, `adaptive-layout`, `adaptive-navigation`) that provide ready-made scaffold composables for building multi-pane, responsive UIs aligned with Material You guidelines. It sits on top of WindowSizeClass and abstracts the logic of showing one or two panes based on available space. Use it whenever you want canonical adaptive layouts—list-detail, supporting pane, or feed—without reimplementing the pane-switching state machine yourself.","resources":[{"type":"Official","title":"About adaptive layouts | Jetpack Compose | Android Developers","url":"https://developer.android.com/develop/ui/compose/layouts/adaptive"},{"type":"Official","title":"Compose Material 3 Adaptive | Jetpack | Android Developers","url":"https://developer.android.com/jetpack/androidx/releases/compose-material3-adaptive"},{"type":"Video","title":"Building UI with the Material 3 adaptive library (Google I/O 2024)","url":"https://www.youtube.com/watch?v=xPUZENis4gc"},{"type":"Repo","title":"android/socialite — production sample using Material 3 Adaptive","url":"https://github.com/android/socialite"},{"type":"Course","title":"Build adaptive apps with Jetpack Compose | Google Codelabs","url":"https://codelabs.developers.google.com/jetpack-compose-adaptability"}]},"adaptive-ui-form-factors/adaptive/navigationsuitescaffold":{"id":"adaptive-ui-form-factors/adaptive/navigationsuitescaffold","title":"NavigationSuiteScaffold","description":"**NavigationSuiteScaffold** automatically switches between a bottom navigation bar (compact windows) and a navigation rail or permanent drawer (larger windows) based on the current WindowSizeClass. Add it from the `material3-adaptive-navigation-suite` artifact, supply `navigationSuiteItems`, and let the scaffold handle the layout transition. It is the simplest way to implement adaptive top-level navigation in Compose without manual state management.","resources":[{"type":"Official","title":"Build adaptive navigation | Jetpack Compose | Android Developers","url":"https://developer.android.com/develop/ui/compose/layouts/adaptive/build-adaptive-navigation"},{"type":"Official","title":"androidx.compose.material3.adaptive.navigationsuite | API reference | Android Developers","url":"https://developer.android.com/reference/kotlin/androidx/compose/material3/adaptive/navigationsuite/package-summary"},{"type":"Video","title":"Automatically Adjust Navigation Based On Screen Size With NavigationSuiteScaffold","url":"https://www.youtube.com/watch?v=u8vQgmgf3X4"},{"type":"Video","title":"Navigation Suite Scaffold In Jetpack Compose | Auto Adaptive UI | Material 3","url":"https://www.youtube.com/watch?v=s-iCWOG5F6g"},{"type":"Repo","title":"android/adaptive-apps-samples — NavigationSuiteScaffold usage","url":"https://github.com/android/adaptive-apps-samples"}]},"adaptive-ui-form-factors/adaptive/listdetailpanescaffold":{"id":"adaptive-ui-form-factors/adaptive/listdetailpanescaffold","title":"ListDetailPaneScaffold","description":"**ListDetailPaneScaffold** (used via `NavigableListDetailPaneScaffold`) implements the canonical list-detail pattern: on large windows both panes appear side by side; on compact windows only one is visible at a time with built-in back-navigation and predictive-back animation support. It is the right choice for master-detail flows such as email, contacts, or settings screens that must adapt across phone, tablet, and foldable form factors.","resources":[{"type":"Official","title":"Build a list-detail layout | Jetpack Compose | Android Developers","url":"https://developer.android.com/develop/ui/compose/layouts/adaptive/list-detail"},{"type":"Official","title":"Canonical layouts | Jetpack Compose | Android Developers","url":"https://developer.android.com/develop/ui/compose/layouts/adaptive/canonical-layouts"},{"type":"Video","title":"Create Adaptive designs with Pane Layouts in Jetpack Compose: ListDetailPane, SupportingPaneScaffold","url":"https://www.youtube.com/watch?v=lcpRyhDyvso"},{"type":"Video","title":"Building UI with the Material 3 adaptive library (Google I/O 2024)","url":"https://www.youtube.com/watch?v=xPUZENis4gc"},{"type":"Repo","title":"android/socialite — list-detail adaptive layout in production","url":"https://github.com/android/socialite"}]},"adaptive-ui-form-factors/adaptive/supportingpanescaffold":{"id":"adaptive-ui-form-factors/adaptive/supportingpanescaffold","title":"SupportingPaneScaffold","description":"**SupportingPaneScaffold** (used via `NavigableSupportingPaneScaffold`) divides the window into a primary content area (roughly two-thirds) and a supporting pane that provides contextual or supplementary information. On compact screens only the main pane is shown; on expanded screens both panes appear together. It suits use cases such as a document editor with a properties panel or a map with a details sheet.","resources":[{"type":"Official","title":"Build a supporting pane layout | Jetpack Compose | Android Developers","url":"https://developer.android.com/develop/ui/compose/layouts/adaptive/build-a-supporting-pane-layout"},{"type":"Official","title":"SupportingPaneScaffoldRole | API reference | Android Developers","url":"https://developer.android.com/reference/kotlin/androidx/compose/material3/adaptive/layout/SupportingPaneScaffoldRole"},{"type":"Video","title":"Create Adaptive designs with Pane Layouts in Jetpack Compose: ListDetailPane, SupportingPaneScaffold","url":"https://www.youtube.com/watch?v=lcpRyhDyvso"},{"type":"Video","title":"Building UI with the Material 3 adaptive library (Google I/O 2024)","url":"https://www.youtube.com/watch?v=xPUZENis4gc"},{"type":"Repo","title":"android/adaptive-apps-samples — supporting pane patterns","url":"https://github.com/android/adaptive-apps-samples"}]},"adaptive-ui-form-factors/form-factors/foldables-foldingfeature":{"id":"adaptive-ui-form-factors/form-factors/foldables-foldingfeature","title":"Foldables (FoldingFeature)","description":"**FoldingFeature** (from Jetpack WindowManager) exposes the state, orientation, occlusion type, and `isSeparating` flag of a foldable hinge so your app can adapt to tabletop, book, or flat postures. Query it via `WindowInfoTracker.windowLayoutInfo` and filter for `FoldingFeature` instances. Apps that react to fold state can rearrange their content around the hinge to avoid placing interactive elements on a crease.","resources":[{"type":"Official","title":"Make your app fold aware | Jetpack Compose | Android Developers","url":"https://developer.android.com/develop/ui/compose/layouts/adaptive/foldables/make-your-app-fold-aware"},{"type":"Official","title":"Learn about foldables | Jetpack Compose | Android Developers","url":"https://developer.android.com/develop/ui/compose/layouts/adaptive/foldables/learn-about-foldables"},{"type":"Video","title":"Exploring Android's Jetpack WindowManager to Support Foldable Devices","url":"https://www.youtube.com/watch?v=6NHs0n8wNsA"},{"type":"Course","title":"Support foldable and dual-screen devices with Jetpack WindowManager | Codelab","url":"https://developer.android.com/codelabs/android-window-manager-dual-screen-foldables"},{"type":"Repo","title":"android/adaptive-apps-samples — foldable-aware layout samples","url":"https://github.com/android/adaptive-apps-samples"}]},"adaptive-ui-form-factors/form-factors/large-screens-tablet":{"id":"adaptive-ui-form-factors/form-factors/large-screens-tablet","title":"Large Screens / Tablet","description":"Large-screen and tablet design requires apps to exploit the additional space through multi-pane layouts, increased touch targets, and edge-to-edge content rather than simply stretching a phone UI. The Android large-screen quality guidelines define three tiers of readiness that apps should meet. Starting with Android 16, the system ignores fixed orientation and resizability restrictions for windows with `smallestWidth ≥ 600dp`, so apps must handle any window size gracefully.","resources":[{"type":"Official","title":"Build adaptive apps | Jetpack Compose | Android Developers","url":"https://developer.android.com/develop/ui/compose/build-adaptive-apps"},{"type":"Official","title":"Adaptive apps | Multidevice | Android Developers","url":"https://developer.android.com/large-screens"},{"type":"Video","title":"Building UI with the Material 3 adaptive library (Google I/O 2024)","url":"https://www.youtube.com/watch?v=xPUZENis4gc"},{"type":"Repo","title":"android/nowinandroid — production app with large-screen adaptive layouts","url":"https://github.com/android/nowinandroid"},{"type":"Course","title":"Build adaptive apps with Jetpack Compose | Google Codelabs","url":"https://codelabs.developers.google.com/jetpack-compose-adaptability"}]},"adaptive-ui-form-factors/form-factors/compose-for-wear-os":{"id":"adaptive-ui-form-factors/form-factors/compose-for-wear-os","title":"Compose for Wear OS","description":"**Compose for Wear OS** brings the Jetpack Compose programming model to round watch faces, circular lists, and wrist-optimised components from the `androidx.wear.compose` libraries. It mirrors the standard Compose API but replaces components with Wear-aware equivalents (e.g. `ScalingLazyColumn`, `SwipeDismissableNavHost`). Use it for any new Wear OS app to benefit from declarative UI and Material Expressive for Wear.","resources":[{"type":"Official","title":"Use Jetpack Compose on Wear OS | Android Developers","url":"https://developer.android.com/training/wearables/compose"},{"type":"Official","title":"Compose for Wear OS Codelab | Android Developers","url":"https://developer.android.com/codelabs/compose-for-wear-os"},{"type":"Video","title":"Compose for Wear OS code-along | Android Developers","url":"https://www.youtube.com/watch?v=7U3FwzuqgRE"},{"type":"Video","title":"From mobile to Wear OS: Learn how to create a Compose app for the wrist","url":"https://www.youtube.com/watch?v=B7D3G6tC9n0"},{"type":"Repo","title":"android/wear-os-samples — official Wear OS Compose samples","url":"https://github.com/android/wear-os-samples"}]},"adaptive-ui-form-factors/form-factors/compose-for-tv":{"id":"adaptive-ui-form-factors/form-factors/compose-for-tv","title":"Compose for TV","description":"**Compose for TV** (the `androidx.tv` libraries) adapts Jetpack Compose for the 10-foot TV experience: D-pad focus management, immersive browsing rows, and TV-optimised Material components like `ImmersiveList` and `Carousel`. It replaces the Leanback library and integrates natively with the Compose ecosystem. Use it for Android TV apps that require focus-driven navigation and lean-back media browsing.","resources":[{"type":"Official","title":"Use Jetpack Compose on Android TV | Android Developers","url":"https://developer.android.com/training/tv/playback/compose"},{"type":"Official","title":"Introduction to Compose for TV | Android Developers","url":"https://developer.android.com/codelabs/compose-for-tv-introduction"},{"type":"Video","title":"What's new in TV and intro to Compose (Google I/O 2023)","url":"https://io.google/2023/program/24ef7b93-7823-412e-99b7-b97a615f3334/"},{"type":"Repo","title":"android/tv-samples — JetStreamCompose and TvMaterialCatalog","url":"https://github.com/android/tv-samples"},{"type":"Official","title":"androidx.tv | Jetpack releases | Android Developers","url":"https://developer.android.com/jetpack/androidx/releases/tv"}]},"adaptive-ui-form-factors/form-factors/android-xr":{"id":"adaptive-ui-form-factors/form-factors/android-xr","title":"Android XR","description":"**Android XR** is Google's platform for building spatial and immersive experiences on XR headsets and glasses using the Jetpack XR SDK, OpenXR, or WebXR. Apps can present content in spatial panels, create fully immersive 3D environments, or blend AR overlays into the real world. This is an emerging form factor; the Jetpack XR SDK is currently in Developer Preview and evolving rapidly.","resources":[{"type":"Official","title":"Build for Android XR | Android Developers","url":"https://developer.android.com/develop/xr/get-started"},{"type":"Official","title":"Get started with the Jetpack XR SDK | Android XR | Android Developers","url":"https://developer.android.com/develop/xr/jetpack-xr-sdk/getting-started"},{"type":"Video","title":"Android XR | I/O 2025 Keynote","url":"https://www.youtube.com/watch?v=7nv1snJRCEI"},{"type":"Video","title":"The future is now, with Compose and AI on Android XR (Google I/O 2025)","url":"https://io.google/2025/explore/technical-session-2"},{"type":"Repo","title":"GetStream/android-xr-video — real-world Android XR app with Compose","url":"https://github.com/GetStream/android-xr-video"}]},"adaptive-ui-form-factors/insets/edge-to-edge":{"id":"adaptive-ui-form-factors/insets/edge-to-edge","title":"Edge-to-edge","description":"**Edge-to-edge** display means your app draws behind the status bar and navigation bar so content extends to the full screen. Android 15 enforces this for all apps targeting API 35+, making adoption non-optional. Use `enableEdgeToEdge()` in your Activity and then consume `WindowInsets` in Compose to ensure interactive content is never hidden behind system bars.","resources":[{"type":"Official","title":"Set up Edge-to-edge | Jetpack Compose | Android Developers","url":"https://developer.android.com/develop/ui/compose/system/setup-e2e"},{"type":"Official","title":"Display content edge-to-edge in views | Android Developers","url":"https://developer.android.com/develop/ui/views/layout/edge-to-edge"},{"type":"Video","title":"Android 15 Edge to Edge | Complete Guide to WindowInsets & System Bars","url":"https://www.youtube.com/watch?v=kz_r4HAHqmw"},{"type":"Course","title":"Handle edge-to-edge enforcements in Android 15 | Codelab","url":"https://developer.android.com/codelabs/edge-to-edge"},{"type":"Article","title":"Insets handling tips for Android 15's edge-to-edge enforcement | Android Developers","url":"https://medium.com/androiddevelopers/insets-handling-tips-for-android-15s-edge-to-edge-enforcement-872774e8839b"}]},"adaptive-ui-form-factors/insets/windowinsets":{"id":"adaptive-ui-form-factors/insets/windowinsets","title":"WindowInsets","description":"**WindowInsets** provide information about system UI areas—status bar, navigation bar, IME (soft keyboard), display cutouts—that your layout must avoid or respond to. In Compose, use inset-aware padding modifiers (`safeDrawing`, `safeContent`, `ime`) or `WindowInsets.*` size modifiers to shift content away from system UI automatically. Correct inset handling is a prerequisite for both edge-to-edge layouts and keyboard-aware screens.","resources":[{"type":"Official","title":"About window insets | Jetpack Compose | Android Developers","url":"https://developer.android.com/develop/ui/compose/system/insets"},{"type":"Official","title":"Set up window insets | Jetpack Compose | Android Developers","url":"https://developer.android.com/develop/ui/compose/system/insets-ui"},{"type":"Video","title":"Insets: Compose edition | Android Developers","url":"https://www.youtube.com/watch?v=mlL6H-s0nF0"},{"type":"Video","title":"Animating your keyboard using WindowInsets | Android Developers","url":"https://www.youtube.com/watch?v=acC7SR1EXsI"},{"type":"Video","title":"Understanding WindowInsets with Subhrajyoti Sen | Android Worldwide","url":"https://www.youtube.com/watch?v=RG8OQ9M05n0"}]},"widgets-glance/glance/glanceappwidget":{"id":"widgets-glance/glance/glanceappwidget","title":"GlanceAppWidget","description":"**GlanceAppWidget** is the core Jetpack Glance class you subclass to define an app widget using Compose-like syntax. Override `provideGlance` to emit a `@Composable` layout built from Glance primitives (`Box`, `Row`, `Text`, `Button`, etc.). Pair it with `GlanceAppWidgetReceiver` in the manifest to register the widget with the system. Note that Glance composables are not interoperable with standard Jetpack Compose UI—they translate to `RemoteViews` at runtime.","resources":[{"type":"Official","title":"Create an app widget with Glance | Jetpack Compose | Android Developers","url":"https://developer.android.com/develop/ui/compose/glance/create-app-widget"},{"type":"Article","title":"Demystifying Jetpack Glance for app widgets | Android Developers Medium","url":"https://medium.com/androiddevelopers/demystifying-jetpack-glance-for-app-widgets-8fbc7041955c"},{"type":"Video","title":"Build beautiful Android widgets with Jetpack Glance (Google I/O 2024)","url":"https://www.youtube.com/watch?v=jI1LKN7jBVk"},{"type":"Course","title":"Create a widget with Glance | Codelab | Android Developers","url":"https://developer.android.com/codelabs/glance"},{"type":"Repo","title":"android/user-interface-samples — AppWidget/glance sample","url":"https://github.com/android/user-interface-samples/tree/main/AppWidget"}]},"widgets-glance/glance/glancestatedefinition":{"id":"widgets-glance/glance/glancestatedefinition","title":"GlanceStateDefinition","description":"**GlanceStateDefinition** is the interface that tells Glance how to persist and read widget-specific state between updates. Because the Glance composition is recreated on every widget update, standard Compose `remember` does not work; you must supply a `GlanceStateDefinition` (e.g. `PreferencesGlanceStateDefinition` for DataStore Preferences) to hold transient widget state like a counter value or a selected option. Override `stateDefinition` in your `GlanceAppWidget` subclass to activate it.","resources":[{"type":"Official","title":"Manage and update GlanceAppWidget | Jetpack Compose | Android Developers","url":"https://developer.android.com/develop/ui/compose/glance/glance-app-widget"},{"type":"Official","title":"PreferencesGlanceStateDefinition | API reference | Android Developers","url":"https://developer.android.com/reference/kotlin/androidx/glance/state/PreferencesGlanceStateDefinition"},{"type":"Video","title":"Build beautiful Android widgets with Jetpack Glance (Google I/O 2024)","url":"https://www.youtube.com/watch?v=jI1LKN7jBVk"},{"type":"Article","title":"Demystifying Jetpack Glance for app widgets | Android Developers Medium","url":"https://medium.com/androiddevelopers/demystifying-jetpack-glance-for-app-widgets-8fbc7041955c"},{"type":"Repo","title":"android/user-interface-samples — AppWidget/glance state examples","url":"https://github.com/android/user-interface-samples/tree/main/AppWidget"}]},"widgets-glance/glance/glance-material-3":{"id":"widgets-glance/glance/glance-material-3","title":"Glance + Material 3","description":"The `androidx.glance:glance-material3` artifact adds `GlanceTheme` and `ColorProviders` so your widget can use Material You dynamic colours that adapt to the user's wallpaper on supported devices (Android 12+). Wrap your Glance composables in `GlanceTheme(colors = GlanceTheme.colors)` and reference `GlanceTheme.colors.*` tokens to automatically switch between light and dark schemes. This is the recommended approach for keeping widgets visually consistent with Material 3 app surfaces.","resources":[{"type":"Official","title":"Implement a Glance theme | Jetpack Compose | Android Developers","url":"https://developer.android.com/develop/ui/compose/glance/theme"},{"type":"Official","title":"androidx.glance.material3 | API reference | Android Developers","url":"https://developer.android.com/reference/kotlin/androidx/glance/material3/package-summary"},{"type":"Video","title":"Use Dynamic Colors from Wallpaper in Widget GlanceTheme using Jetpack Glance","url":"https://www.youtube.com/watch?v=AE4of56YvcU"},{"type":"Video","title":"Build beautiful Android widgets with Jetpack Glance (Google I/O 2024)","url":"https://www.youtube.com/watch?v=jI1LKN7jBVk"},{"type":"Repo","title":"android/user-interface-samples — GlanceTheme.kt reference implementation","url":"https://github.com/android/user-interface-samples/blob/main/AppWidget/app/src/main/java/com/example/android/appwidget/glance/GlanceTheme.kt"}]},"camera-media/camera/camerax":{"id":"camera-media/camera/camerax","title":"CameraX","description":"**CameraX** is the recommended Jetpack camera library that abstracts Camera2 into four simple use cases: `Preview`, `ImageCapture`, `ImageAnalysis`, and `VideoCapture`. It handles device-specific quirks automatically, integrates with the Activity lifecycle, and supports the new `camera-compose` artifact for Compose-native viewfinders. Start with CameraX for any new camera feature; drop to Camera2 only when you need fine-grained hardware controls not exposed by CameraX.","resources":[{"type":"Official","title":"CameraX overview | Android media | Android Developers","url":"https://developer.android.com/media/camera/camerax"},{"type":"Article","title":"Getting Started with CameraX in Jetpack Compose | Android Developers Medium","url":"https://medium.com/androiddevelopers/getting-started-with-camerax-in-jetpack-compose-781c722ca0c4"},{"type":"Video","title":"Building modern Android media and camera experiences (Google I/O 2024)","url":"https://io.google/2024/explore/25ff7e80-ca0b-4b3b-aa89-aa796618b3af/"},{"type":"Repo","title":"android/camera-samples — CameraXBasic, CameraXVideo, CameraXExtensions","url":"https://github.com/android/camera-samples"},{"type":"Course","title":"Getting started with CameraX | Codelab | Android Developers","url":"https://developer.android.com/codelabs/camerax-getting-started"}]},"camera-media/camera/camera2":{"id":"camera-media/camera/camera2","title":"Camera2","description":"**Camera2** is the low-level platform camera API (`android.hardware.camera2`) that replaced the deprecated `Camera` class. It gives direct access to per-frame capture parameters, RAW sensor output, multi-camera streams, and advanced hardware features like HDR capture. Because of its complexity, most apps should prefer CameraX; use Camera2 directly only when you need capabilities such as manual sensor control, zero-shutter-lag burst capture, or multi-camera logical streams.","resources":[{"type":"Official","title":"Camera2 overview | Android media | Android Developers","url":"https://developer.android.com/media/camera/camera2"},{"type":"Official","title":"android.hardware.camera2 | API reference | Android Developers","url":"https://developer.android.com/reference/android/hardware/camera2/package-summary"},{"type":"Video","title":"Building high quality Android camera experiences (Google I/O 2023)","url":"https://io.google/2023/program/b276c79d-2b68-4e87-93a6-44df1a24be38/"},{"type":"Repo","title":"android/camera-samples — Camera2Basic and Camera2Video","url":"https://github.com/android/camera-samples"},{"type":"Course","title":"Camera2Extensions API | Android media | Android Developers","url":"https://developer.android.com/media/camera/camera2/extensions-api"}]},"camera-media/media/media3-exoplayer":{"id":"camera-media/media/media3-exoplayer","title":"Media3 / ExoPlayer","description":"**Jetpack Media3** is the unified media playback library consolidating ExoPlayer, MediaSession, and UI components under the `androidx.media3` namespace. `ExoPlayer` implements the `Player` interface and supports adaptive streaming (HLS, DASH, SmoothStreaming), DRM, and custom renderers out of the box. Use Media3 for all new media playback work; the standalone `com.google.android.exoplayer2` library is discontinued.","resources":[{"type":"Official","title":"Media3 ExoPlayer | Android media | Android Developers","url":"https://developer.android.com/media/media3/exoplayer"},{"type":"Article","title":"From AndroidView to PlayerSurface: Modernizing ExoPlayer with Media3's Compose UI | ProAndroidDev","url":"https://proandroiddev.com/from-androidview-to-playersurface-modernizing-exoplayer-with-media3s-compose-ui-74e40ce81f94"},{"type":"Video","title":"Building modern Android media and camera experiences (Google I/O 2024)","url":"https://io.google/2024/explore/25ff7e80-ca0b-4b3b-aa89-aa796618b3af/"},{"type":"Video","title":"How to Play Audio & Video on Android with ExoPlayer / Media3 | 2024","url":"https://www.youtube.com/watch?v=0dun8xS-Pqg"},{"type":"Repo","title":"androidx/media — official Jetpack Media3 / ExoPlayer repository","url":"https://github.com/androidx/media"}]},"camera-media/media/photo-picker":{"id":"camera-media/media/photo-picker","title":"Photo Picker","description":"The **Android Photo Picker** is a privacy-safe, system-provided UI that lets users grant an app access to specific photos and videos without requiring broad `READ_EXTERNAL_STORAGE` permission. Launch it with the `PickVisualMedia` contract via Activity Result APIs. It is available back to API 19 via the Jetpack `photopicker` library (Google Play Services backport) and is the recommended approach for all new media-selection flows.","resources":[{"type":"Official","title":"Photo picker | App data and files | Android Developers","url":"https://developer.android.com/training/data-storage/shared/photo-picker"},{"type":"Official","title":"photopicker | Jetpack | Android Developers","url":"https://developer.android.com/jetpack/androidx/releases/photopicker"},{"type":"Article","title":"Photo Picker Everywhere | Android Developers Blog","url":"https://android-developers.googleblog.com/2023/04/photo-picker-everywhere.html"},{"type":"Video","title":"Building modern Android media and camera experiences (Google I/O 2024)","url":"https://io.google/2024/explore/25ff7e80-ca0b-4b3b-aa89-aa796618b3af/"},{"type":"Repo","title":"android/platform-samples — photo picker usage example","url":"https://github.com/android/platform-samples"}]},"camera-media/media/mediastore-scoped":{"id":"camera-media/media/mediastore-scoped","title":"MediaStore (scoped)","description":"**MediaStore** is the system content provider for querying and writing shared media files (images, videos, audio, downloads). Under scoped storage (enforced from API 29+) each app can only see its own contributed files and well-known collections without requiring `READ_MEDIA_*` permissions. Use MediaStore for accessing media beyond the Photo Picker's selection model—for example, to enumerate music tracks, contribute a captured video to the shared gallery, or query file metadata.","resources":[{"type":"Official","title":"Access media files from shared storage | App data and files | Android Developers","url":"https://developer.android.com/training/data-storage/shared/media"},{"type":"Official","title":"MediaStore | API reference | Android Developers","url":"https://developer.android.com/reference/android/provider/MediaStore"},{"type":"Video","title":"Scoped Storage Android 11: Open and Save file with MediaStore","url":"https://www.youtube.com/watch?v=sWtKSeS86zQ"},{"type":"Article","title":"Scoped Storage: All in One File Handling using MediaStore","url":"https://medium.com/@lakshyasukhralia/scoped-storage-all-in-one-file-handling-using-mediastore-e895a0beddac"},{"type":"Repo","title":"android/platform-samples — shared storage and MediaStore samples","url":"https://github.com/android/platform-samples"}]},"background-work/foreground/foreground-service-types":{"id":"background-work/foreground/foreground-service-types","title":"Foreground Service Types","description":"From Android 14 (API 34), every foreground service must declare one or more **service types** (e.g. `camera`, `location`, `mediaPlayback`, `health`, `dataSync`) in the manifest and supply the matching type constant to `startForeground()`. Each type also requires its own permission and, in many cases, a runtime permission. Failure to declare the correct type results in a `MissingForegroundServiceTypeException`.","resources":[{"type":"Official","title":"Foreground service types | Background work | Android Developers","url":"https://developer.android.com/develop/background-work/services/fgs/service-types"},{"type":"Article","title":"Guide to Foreground Services on Android 14 | Medium","url":"https://medium.com/@domen.lanisnik/guide-to-foreground-services-on-android-9d0127dc8f9a"},{"type":"Video","title":"Foreground Service in Android 14","url":"https://www.youtube.com/watch?v=2x5FABUViMc"},{"type":"Official","title":"Foreground service types are required | Android 14 changes","url":"https://developer.android.com/about/versions/14/changes/fgs-types-required"},{"type":"Article","title":"Improving Consistency of Background Work on Android | Android Developers Blog","url":"https://android-developers.googleblog.com/2023/05/improving-consistency-of-background-work-on-android.html"}]},"background-work/foreground/expedited-work":{"id":"background-work/foreground/expedited-work","title":"Expedited Work","description":"**Expedited work** in WorkManager (`setExpedited()`) is designed for short, user-important tasks that must start immediately, such as sending a message or uploading a photo. The system grants it reduced power-management restrictions (Doze and Battery Saver are less likely to block it) and maps it to an expedited job or a foreground service on older OS versions. Supply an `OutOfQuotaPolicy` to control behaviour when the system quota is exhausted.","resources":[{"type":"Official","title":"Define work requests | Background work | Android Developers","url":"https://developer.android.com/develop/background-work/background-tasks/persistent/getting-started/define-work"},{"type":"Official","title":"Getting started with WorkManager | Background work | Android Developers","url":"https://developer.android.com/develop/background-work/background-tasks/persistent/getting-started"},{"type":"Video","title":"Execute an important work using WorkManager — Expedited work","url":"https://www.youtube.com/watch?v=XAWzX2qYj00"},{"type":"Video","title":"WorkManager — Android Basics 2023","url":"https://www.youtube.com/watch?v=A2JetouoNSc"},{"type":"Course","title":"Background work with WorkManager | Codelab | Android Developers","url":"https://developer.android.com/codelabs/android-workmanager"}]},"background-work/scheduling/alarmmanager":{"id":"background-work/scheduling/alarmmanager","title":"AlarmManager","description":"**AlarmManager** fires `PendingIntent`s at scheduled clock or elapsed-realtime points, even when the app is not running and the device is asleep (with a wake lock). Use it only for time-sensitive user-facing alarms such as calendar reminders or an alarm clock—not for background networking or data-sync tasks, where WorkManager is the correct tool. All repeating alarms are inexact on API 19+; exact alarms require the `SCHEDULE_EXACT_ALARM` or `USE_EXACT_ALARM` permission from Android 12+.","resources":[{"type":"Official","title":"Schedule alarms | Background work | Android Developers","url":"https://developer.android.com/develop/background-work/services/alarms/schedule"},{"type":"Official","title":"AlarmManager | API reference | Android Developers","url":"https://developer.android.com/reference/android/app/AlarmManager"},{"type":"Video","title":"THIS Is How You Schedule Alarms on Android with AlarmManager","url":"https://www.youtube.com/watch?v=mWb_hEBLIqA"},{"type":"Video","title":"How to Schedule tasks with Alarm Manager in Android | Android Studio tutorial","url":"https://www.youtube.com/watch?v=zCCxKDWVRQo"},{"type":"Article","title":"How Android 13's new restrictions on alarm APIs will improve battery life | Esper","url":"https://www.esper.io/blog/android-13-exact-alarm-api-restrictions"}]},"background-work/scheduling/exact-alarms-permission":{"id":"background-work/scheduling/exact-alarms-permission","title":"Exact Alarms permission","description":"Android 12 introduced `SCHEDULE_EXACT_ALARM` as a special permission for apps that require precise timing (e.g. calendar or to-do apps). From Android 14, it is **denied by default** for newly installed apps, so apps must call `canScheduleExactAlarms()` and direct users to the system settings page if needed. Apps that qualify as a clock or calendar can alternatively declare `USE_EXACT_ALARM`, which is granted at install time without user interaction.","resources":[{"type":"Official","title":"Schedule exact alarms are denied by default | Android Developers","url":"https://developer.android.com/about/versions/14/changes/schedule-exact-alarms"},{"type":"Official","title":"Schedule alarms | Background work | Android Developers","url":"https://developer.android.com/develop/background-work/services/alarms/schedule"},{"type":"Article","title":"Android 14 Behavior Change: Schedule exact alarms are denied by default | Medium","url":"https://carterchen247.medium.com/android-14-behavior-change-schedule-exact-alarms-are-denied-by-default-7563a814dee4"},{"type":"Article","title":"How Android 13's new restrictions on alarm APIs will improve battery life | Esper","url":"https://www.esper.io/blog/android-13-exact-alarm-api-restrictions"},{"type":"Video","title":"THIS Is How You Schedule Alarms on Android with AlarmManager","url":"https://www.youtube.com/watch?v=mWb_hEBLIqA"}]},"background-work/scheduling/jobscheduler":{"id":"background-work/scheduling/jobscheduler","title":"JobScheduler","description":"**JobScheduler** is the platform API for deferrable, constraint-based background work—network availability, charging state, device idle, and storage thresholds. It batches jobs across apps to minimise radio and CPU wake-ups, which the system cannot do with raw threads or services. For most use cases WorkManager (which uses JobScheduler internally on API 23+) is the better abstraction; use JobScheduler directly only when you need lower-level control or are implementing a library that cannot take a WorkManager dependency.","resources":[{"type":"Official","title":"JobScheduler | API reference | Android Developers","url":"https://developer.android.com/reference/android/app/job/JobScheduler"},{"type":"Official","title":"Background tasks overview | Background work | Android Developers","url":"https://developer.android.com/develop/background-work/background-tasks"},{"type":"Video","title":"JobScheduler — Background Works made easy in Android","url":"https://www.youtube.com/watch?v=Lp_IbEMW5J8"},{"type":"Video","title":"Services in Android — Part 13, Introducing JobScheduler & JobService","url":"https://www.youtube.com/watch?v=gLgtgMiDrOE"},{"type":"Article","title":"Improving Consistency of Background Work on Android | Android Developers Blog","url":"https://android-developers.googleblog.com/2023/05/improving-consistency-of-background-work-on-android.html"}]},"background-work/scheduling/doze-app-standby":{"id":"background-work/scheduling/doze-app-standby","title":"Doze & App Standby","description":"**Doze mode** kicks in when the device is unplugged, stationary, and screen-off; it progressively restricts network access, wakelocks, jobs, syncs, and alarms to preserve battery. **App Standby Buckets** (Active, Working Set, Frequent, Rare, Restricted) further throttle job and alarm quotas based on how recently the user interacted with your app. Understanding these constraints is essential for designing background work that completes reliably—use high-priority FCM messages to break out of Doze when immediate delivery is critical.","resources":[{"type":"Official","title":"Optimize for Doze and App Standby | App quality | Android Developers","url":"https://developer.android.com/training/monitoring-device-state/doze-standby"},{"type":"Official","title":"App Standby Buckets | App quality | Android Developers","url":"https://developer.android.com/topic/performance/appstandby"},{"type":"Video","title":"WorkManager — Android Basics 2023 (covers Doze constraints)","url":"https://www.youtube.com/watch?v=A2JetouoNSc"},{"type":"Article","title":"Android Battery Optimization for Avoiding Doze Mode and App Standby | ProAndroidDev","url":"https://proandroiddev.com/android-battery-optimization-for-avoiding-doze-mode-and-app-standby-83cd379ee75b"},{"type":"Article","title":"Improving Consistency of Background Work on Android | Android Developers Blog","url":"https://android-developers.googleblog.com/2023/05/improving-consistency-of-background-work-on-android.html"}]},"privacy-security/privacy/privacy-sandbox-on-android":{"id":"privacy-security/privacy/privacy-sandbox-on-android","title":"Privacy Sandbox on Android","description":"Privacy Sandbox on Android is Google's multi-year initiative to build privacy-preserving advertising technologies that replace cross-app identifiers. It introduces two key pillars: an **SDK Runtime** that isolates third-party SDKs in a sandboxed environment, and a set of privacy-preserving APIs (Topics, Protected Audience, Attribution Reporting) for ad relevance and measurement. Use it when building or integrating ad SDKs that must comply with evolving platform privacy requirements on Android 13+.","resources":[{"type":"Official","title":"Privacy Sandbox on Android | Android Developers","url":"https://developer.android.com/design-for-safety/privacy-sandbox"},{"type":"Article","title":"Introduction to the Privacy Sandbox on Android | Android Developers","url":"https://developer.android.com/design-for-safety/ads/introduction"},{"type":"Repo","title":"android/privacy-sandbox-samples | GitHub","url":"https://github.com/android/privacy-sandbox-samples"},{"type":"Article","title":"Privacy highlights from Google I/O 2024 | Privacy Sandbox Blog","url":"https://privacysandbox.google.com/blog/io-2025"},{"type":"Video","title":"Privacy Sandbox at Google I/O 2024 | Google Developers","url":"https://developers.google.com/privacy-sandbox/blog/google-io-2024"}]},"privacy-security/privacy/photo-picker":{"id":"privacy-security/privacy/photo-picker","title":"Photo Picker","description":"The Photo Picker is a system-provided UI that lets users share only the specific images or videos they select with your app, rather than granting broad access to their entire media library. It is available on Android 11 (API 30)+ via Google Play system updates and can be backported to Android 4.4 through Play Services. **Always prefer Photo Picker over broad storage permissions** for any feature that requires user-selected media, as it requires no permission declaration at all.","resources":[{"type":"Official","title":"Photo picker | App data and files | Android Developers","url":"https://developer.android.com/training/data-storage/shared/photopicker"},{"type":"Article","title":"Permissionless is the future of Storage on Android | Android Developers Blog","url":"https://medium.com/androiddevelopers/permissionless-is-the-future-of-storage-on-android-3fbceeb3d70a"},{"type":"Article","title":"Photo Picker Everywhere | Android Developers Blog","url":"https://android-developers.googleblog.com/2023/04/photo-picker-everywhere.html"},{"type":"Article","title":"Cloud photos now available in the Android photo picker | Android Developers Blog","url":"https://android-developers.googleblog.com/2024/02/cloud-photos-now-available-in-android-photo-picker.html"},{"type":"Video","title":"Now in Android #76 – Webkit, Compose Compiler, Photo Picker | Android Developers","url":"https://medium.com/androiddevelopers/now-in-android-76-d2f182c4003c"}]},"privacy-security/privacy/granular-media-permissions":{"id":"privacy-security/privacy/granular-media-permissions","title":"Granular Media Permissions","description":"Android 13 (API 33) replaced the broad `READ_EXTERNAL_STORAGE` permission with three granular permissions: `READ_MEDIA_IMAGES`, `READ_MEDIA_VIDEO`, and `READ_MEDIA_AUDIO`. Apps declare only the media types they actually access, reducing unnecessary data exposure to users. Android 14 adds `READ_MEDIA_VISUAL_USER_SELECTED` for partial photo/video access. Adopt these when your app genuinely needs programmatic access to media files created by other apps and Photo Picker is not suitable.","resources":[{"type":"Official","title":"Access media files from shared storage | Android Developers","url":"https://developer.android.com/training/data-storage/shared/media"},{"type":"Official","title":"Behavior changes: Apps targeting Android 13 or higher | Android Developers","url":"https://developer.android.com/about/versions/13/behavior-changes-13"},{"type":"Video","title":"What's new in Android privacy and security | Google I/O 2023","url":"https://io.google/2023/program/277c56db-9c85-4298-b2d5-7428869ac1e1/"},{"type":"Article","title":"I/O 2023: What's new in Android security and privacy | Google Security Blog","url":"https://security.googleblog.com/2023/05/io-2023-android-security-and-privacy.html"},{"type":"Article","title":"I/O 2024: What's new in Android security and privacy | Google Security Blog","url":"https://security.googleblog.com/2024/05/io-2024-whats-new-in-android-security.html"}]},"privacy-security/privacy/notification-permission":{"id":"privacy-security/privacy/notification-permission","title":"Notification Permission","description":"Android 13 (API 33) introduced `POST_NOTIFICATIONS`, a runtime permission that apps must request before they can display non-exempt notifications. New installs on Android 13+ start with notifications off; existing app updates may receive an automatic grant for eligible apps. Request the permission in context—tied to a feature the user is actively enabling—rather than at cold launch, to maximise grant rates and respect user intent.","resources":[{"type":"Official","title":"Notification runtime permission | Android Developers","url":"https://developer.android.com/develop/ui/views/notifications/notification-permission"},{"type":"Article","title":"Behavior changes: Apps targeting Android 13 or higher | Android Developers","url":"https://developer.android.com/about/versions/13/behavior-changes-13"},{"type":"Video","title":"What's new in Android privacy and security | Google I/O 2023","url":"https://io.google/2023/program/277c56db-9c85-4298-b2d5-7428869ac1e1/"},{"type":"Article","title":"I/O 2023: What's new in Android security and privacy | Google Security Blog","url":"https://security.googleblog.com/2023/05/io-2023-android-security-and-privacy.html"},{"type":"Article","title":"I/O 2024: What's new in Android security and privacy | Google Security Blog","url":"https://security.googleblog.com/2024/05/io-2024-whats-new-in-android-security.html"}]},"privacy-security/privacy/scoped-storage":{"id":"privacy-security/privacy/scoped-storage","title":"Scoped Storage","description":"Scoped Storage, enforced from Android 11 (API 30) for apps targeting API 30+, restricts direct filesystem access to external storage. Apps can freely read and write their own app-specific directories (via `getExternalFilesDir()`) and contribute to shared media collections through MediaStore, but they cannot browse arbitrary paths on the device. This model protects user data from background file exfiltration and is the storage foundation all modern Android apps must be built on.","resources":[{"type":"Official","title":"Storage updates in Android 11 | Android Developers","url":"https://developer.android.com/about/versions/11/privacy/storage"},{"type":"Official","title":"Data and file storage overview | Android Developers","url":"https://developer.android.com/training/data-storage"},{"type":"Video","title":"Preparing for scoped storage (Android Dev Summit '19) | Android Developers","url":"https://www.youtube.com/watch?v=UnJ3amzJM94"},{"type":"Video","title":"Storage access with Android 11 | Android Developers","url":"https://www.youtube.com/watch?v=RjyYCUW-9tY"},{"type":"Video","title":"What's new in shared storage (Google I/O '19) | Android Developers","url":"https://www.youtube.com/watch?v=3EtBw5s9iRY"}]},"privacy-security/privacy/app-set-id":{"id":"privacy-security/privacy/app-set-id","title":"App Set ID","description":"App Set ID is a privacy-friendly, resettable identifier provided by Google Play Services for correlating usage across apps owned by the same developer, without relying on persistent device identifiers like the Advertising ID. It is scoped either per-app or per-developer and is never shared across different developer accounts. Use it for analytics, fraud detection, and frequency capping scenarios where you need cross-app correlation within your own portfolio but must respect user privacy.","resources":[{"type":"Official","title":"Identify developer-owned apps | Identity | Android Developers","url":"https://developer.android.com/identity/app-set-id"},{"type":"Official","title":"Best practices for unique identifiers | Identity | Android Developers","url":"https://developer.android.com/identity/user-data-ids"},{"type":"Article","title":"I/O 2023: What's new in Android security and privacy | Google Security Blog","url":"https://security.googleblog.com/2023/05/io-2023-android-security-and-privacy.html"},{"type":"Video","title":"What's new in Android privacy and security | Google I/O 2023","url":"https://io.google/2023/program/277c56db-9c85-4298-b2d5-7428869ac1e1/"},{"type":"Official","title":"Privacy Sandbox on Android overview | Privacy Sandbox","url":"https://privacysandbox.google.com/overview/android"}]},"privacy-security/security/credential-manager-passkeys":{"id":"privacy-security/security/credential-manager-passkeys","title":"Credential Manager / Passkeys","description":"Credential Manager is the unified Jetpack API for authenticating users on Android, supporting **passkeys** (FIDO2/WebAuthn), Sign-in with Google, and traditional passwords through a single, consistent UI surface. Passkeys replace passwords with public-key cryptography bound to the device, making phishing attacks impossible. Use Credential Manager for any new authentication flow on Android 9+ as it replaces the deprecated Google Sign-In, One Tap, Smart Lock, and FIDO2 APIs.","resources":[{"type":"Official","title":"About Credential Manager | Identity | Android Developers","url":"https://developer.android.com/identity/sign-in/credential-manager"},{"type":"Article","title":"Passkeys – Android Developers Blog","url":"https://android-developers.googleblog.com/2023/02/bringing-passkeys-to-android-and-chrome.html"},{"type":"Video","title":"How to reduce reliance on passwords in Android apps with passkey support | Google I/O 2023","url":"https://www.youtube.com/watch?v=36peNZUlgzU"},{"type":"Video","title":"Learn passkeys for simpler and safer sign-in | Android Developers","url":"https://www.youtube.com/watch?v=SF8ueIn2Nlc"},{"type":"Official","title":"Passkeys | Google for Developers","url":"https://developers.google.com/identity/passkeys"}]},"privacy-security/security/biometric-api":{"id":"privacy-security/security/biometric-api","title":"Biometric API","description":"The Jetpack Biometric library (`androidx.biometric`) provides a single API to authenticate users with fingerprint, face, or device credential (PIN/pattern/password) across all Android versions. It presents the platform-standard `BiometricPrompt` dialog and handles fallbacks automatically. Use it to gate access to sensitive in-app features or to unlock cryptographic keys stored in the Android Keystore, ensuring users are protected even if the device lacks specific biometric hardware.","resources":[{"type":"Official","title":"Show a biometric authentication dialog | Identity | Android Developers","url":"https://developer.android.com/identity/sign-in/biometric-auth"},{"type":"Official","title":"Biometric | Jetpack | Android Developers","url":"https://developer.android.com/jetpack/androidx/releases/biometric"},{"type":"Article","title":"One Biometric API Over all Android | Android Developers Blog","url":"https://android-developers.googleblog.com/2019/10/one-biometric-api-over-all-android.html"},{"type":"Article","title":"Biometric Authentication on Android — Part 1 | Android Developers Medium","url":"https://medium.com/androiddevelopers/biometric-authentication-on-android-part-1-264523bce85d"},{"type":"Video","title":"What's new in Android privacy and security | Google I/O 2023","url":"https://io.google/2023/program/277c56db-9c85-4298-b2d5-7428869ac1e1/"}]},"privacy-security/security/network-security-config":{"id":"privacy-security/security/network-security-config","title":"Network Security Config","description":"Network Security Config is an XML-based configuration file that lets you customise your app's TLS/SSL behaviour without writing code: pin certificates, trust custom CAs, restrict cleartext traffic, and configure debug-only overrides. From Android 9 (API 28) cleartext HTTP is blocked by default; this config is the recommended way to declare any necessary exceptions. Apply it to all apps that make network requests to ensure traffic is encrypted and certificate validation is strict.","resources":[{"type":"Official","title":"Network security configuration | Security | Android Developers","url":"https://developer.android.com/privacy-and-security/security-config"},{"type":"Official","title":"Improve your app's security | Security | Android Developers","url":"https://developer.android.com/privacy-and-security/security-best-practices"},{"type":"Video","title":"Network Security Config - Android | YouTube","url":"https://www.youtube.com/watch?v=oJbw7e79qLk"},{"type":"Video","title":"Network Security Config - Google Codelab - Android | YouTube","url":"https://www.youtube.com/watch?v=M5x2jFgKYxg"},{"type":"Article","title":"I/O 2024: What's new in Android security and privacy | Google Security Blog","url":"https://security.googleblog.com/2024/05/io-2024-whats-new-in-android-security.html"}]},"privacy-security/security/data-safety-play-console":{"id":"privacy-security/security/data-safety-play-console","title":"Data Safety (Play Console)","description":"The Data Safety section in Play Console is the mandatory disclosure form where developers declare what user data their app collects or shares, whether data is encrypted in transit, and whether users can request deletion. Google displays this information on your Play Store listing, and discrepancies between declared and actual behaviour can result in policy enforcement. Complete it accurately for every app before publishing and update it whenever your data-handling practices change.","resources":[{"type":"Official","title":"Declare your app's data use | Privacy | Android Developers","url":"https://developer.android.com/privacy-and-security/declare-data-use"},{"type":"Official","title":"Provide information for Google Play's Data safety section – Play Console Help","url":"https://support.google.com/googleplay/android-developer/answer/10787469"},{"type":"Video","title":"Introducing the new Data safety section in Play Console | Android Developers","url":"https://www.youtube.com/watch?v=pNAS_0IcHtM"},{"type":"Video","title":"What's new in Android privacy and security | Google I/O 2023","url":"https://io.google/2023/program/277c56db-9c85-4298-b2d5-7428869ac1e1/"},{"type":"Article","title":"I/O 2024: What's new in Android security and privacy | Google Security Blog","url":"https://security.googleblog.com/2024/05/io-2024-whats-new-in-android-security.html"}]},"on-device-ai-genai/on-device/aicore":{"id":"on-device-ai-genai/on-device/aicore","title":"AICore","description":"AICore is the Android system service introduced in Android 14 that manages the lifecycle of on-device AI foundation models, including downloading, updating, and serving Gemini Nano. It handles model weights, hardware acceleration selection (Google, MediaTek, Qualcomm NPUs), and input/output safety—so your app does not need to bundle large model files. Access AICore through the ML Kit GenAI APIs or the lower-level AICore developer preview APIs on supported Pixel and partner devices.","resources":[{"type":"Official","title":"Gemini Nano | AI | Android Developers","url":"https://developer.android.com/ai/gemini-nano"},{"type":"Official","title":"AICore Developer Preview program | ML Kit | Google for Developers","url":"https://developers.google.com/ml-kit/genai/aicore-dev-preview"},{"type":"Video","title":"A walkthrough for Android's on-device GenAI solutions | Spotlight Week | Android Developers","url":"https://www.youtube.com/watch?v=EpKghZYqVW4"},{"type":"Video","title":"Gemini Nano on Android: Building with on-device gen AI | Android Developers","url":"https://www.youtube.com/watch?v=mP9QESmEDls"},{"type":"Article","title":"Gemini Nano is now available on Android via experimental access | Android Developers Blog","url":"https://android-developers.googleblog.com/2024/10/gemini-nano-experimental-access-available-on-android.html"}]},"on-device-ai-genai/on-device/gemini-nano":{"id":"on-device-ai-genai/on-device/gemini-nano","title":"Gemini Nano","description":"Gemini Nano is Google's smallest Gemini model, optimised to run entirely on-device on supported Android smartphones. It executes locally with no network round-trip, providing privacy (prompts never leave the device), offline capability, and low latency. AICore manages the model and future updates transparently. Use Gemini Nano via ML Kit GenAI APIs for summarisation, proofreading, smart replies, and other NLU tasks on Pixel 9 series and newer Gemini-capable devices.","resources":[{"type":"Official","title":"Gemini Nano | AI | Android Developers","url":"https://developer.android.com/ai/gemini-nano"},{"type":"Article","title":"On-device GenAI APIs as part of ML Kit help you easily build with Gemini Nano | Android Developers Blog","url":"https://android-developers.googleblog.com/2025/05/on-device-gen-ai-apis-ml-kit-gemini-nano.html"},{"type":"Video","title":"Gemini Nano on Android: Building with on-device gen AI | Android Developers","url":"https://www.youtube.com/watch?v=mP9QESmEDls"},{"type":"Video","title":"A walkthrough for Android's on-device GenAI solutions | Spotlight Week | Android Developers","url":"https://www.youtube.com/watch?v=EpKghZYqVW4"},{"type":"Article","title":"An introduction to privacy and safety for Gemini Nano | Android Developers Blog","url":"https://android-developers.googleblog.com/2024/10/introduction-to-privacy-and-safety-gemini-nano.html"}]},"on-device-ai-genai/on-device/ml-kit-genai-apis":{"id":"on-device-ai-genai/on-device/ml-kit-genai-apis","title":"ML Kit GenAI APIs","description":"ML Kit GenAI APIs are high-level, task-oriented interfaces built on top of Gemini Nano via AICore, offering ready-made on-device AI tasks: **Summarization**, **Proofreading**, **Rewriting**, and **Image Description**. They abstract the complexity of prompt engineering and model management, and support both streaming and non-streaming response modes. Use them when you need on-device generative AI without the overhead of managing models directly, on Pixel 9 series and other AICore-enabled devices.","resources":[{"type":"Official","title":"ML Kit GenAI APIs | Android Developers","url":"https://developer.android.com/ai/gemini-nano/ml-kit-genai"},{"type":"Official","title":"Overview of the ML Kit GenAI APIs | Google for Developers","url":"https://developers.google.com/ml-kit/genai"},{"type":"Video","title":"A walkthrough for Android's on-device GenAI solutions | Spotlight Week | Android Developers","url":"https://www.youtube.com/watch?v=EpKghZYqVW4"},{"type":"Video","title":"Gemini Nano on Android: Building with on-device gen AI | Android Developers","url":"https://www.youtube.com/watch?v=mP9QESmEDls"},{"type":"Article","title":"On-device GenAI APIs as part of ML Kit help you easily build with Gemini Nano | Android Developers Blog","url":"https://android-developers.googleblog.com/2025/05/on-device-gen-ai-apis-ml-kit-gemini-nano.html"}]},"on-device-ai-genai/on-device/ml-kit-vision-text-translate":{"id":"on-device-ai-genai/on-device/ml-kit-vision-text-translate","title":"ML Kit (Vision/Text/Translate)","description":"ML Kit provides a suite of production-ready, on-device machine learning APIs for common mobile tasks: **Vision** (text recognition, barcode scanning, face detection, object detection, pose estimation), **Natural Language** (language identification, translation across 50+ languages, smart reply). Models run fully on-device, requiring no internet connection after optional model download. Integrate specific ML Kit APIs when your app needs reliable, privacy-safe ML inference without managing TFLite models manually.","resources":[{"type":"Official","title":"ML Kit | Google for Developers","url":"https://developers.google.com/ml-kit/guides"},{"type":"Official","title":"Translate text with ML Kit on Android | Google for Developers","url":"https://developers.google.com/ml-kit/language/translation/android"},{"type":"Video","title":"Easy on-device Machine Learning with MediaPipe | Google I/O 2023","url":"https://www.youtube.com/watch?v=yOP_FY2KTm8"},{"type":"Repo","title":"googlesamples/mlkit | GitHub","url":"https://github.com/googlesamples/mlkit"},{"type":"Article","title":"Welcome to AI on Android Spotlight Week | Android Developers Blog","url":"https://android-developers.googleblog.com/2024/09/welcome-to-ai-on-android-spotlight-week.html"}]},"on-device-ai-genai/on-device/litert-tflite":{"id":"on-device-ai-genai/on-device/litert-tflite","title":"LiteRT (TFLite)","description":"LiteRT (formerly TensorFlow Lite) is Google's cross-platform runtime for deploying custom ML models on-device across Android, iOS, desktop, and embedded systems. It supports models from TensorFlow, PyTorch, JAX, and Keras converted to the `.tflite` flatbuffer format, and accelerates inference via GPU, DSP, and NPU delegates. Use LiteRT when you need to run a custom-trained model (e.g., a fine-tuned image classifier or domain-specific NLP model) with maximum hardware acceleration on Android.","resources":[{"type":"Official","title":"LiteRT: High-Performance On-Device ML Framework | Google AI Edge","url":"https://ai.google.dev/edge/litert"},{"type":"Official","title":"LiteRT for Android | Google AI Edge","url":"https://ai.google.dev/edge/litert/android"},{"type":"Repo","title":"google-ai-edge/LiteRT | GitHub","url":"https://github.com/google-ai-edge/LiteRT"},{"type":"Video","title":"A walkthrough for Android's on-device GenAI solutions | Spotlight Week | Android Developers","url":"https://www.youtube.com/watch?v=EpKghZYqVW4"},{"type":"Article","title":"LiteRT: The Universal Framework for On-Device AI | Google Developers Blog","url":"https://developers.googleblog.com/litert-the-universal-framework-for-on-device-ai/"}]},"on-device-ai-genai/on-device/mediapipe-tasks":{"id":"on-device-ai-genai/on-device/mediapipe-tasks","title":"MediaPipe Tasks","description":"MediaPipe Tasks is the high-level API layer of the MediaPipe Solutions suite, providing pre-built, cross-platform task libraries for vision (object detection, image segmentation, hand/face/pose landmark detection), text (text classification, language detection), and audio (audio classification). Each task bundles a curated model with a clean API, handling pre/post-processing internally. Use MediaPipe Tasks when you need streaming, real-time ML on live camera or audio feeds without assembling a custom LiteRT pipeline.","resources":[{"type":"Official","title":"MediaPipe Tasks | Google AI Edge","url":"https://ai.google.dev/edge/mediapipe/solutions/tasks"},{"type":"Official","title":"Setup guide for Android | MediaPipe | Google AI Edge","url":"https://ai.google.dev/edge/mediapipe/solutions/setup_android"},{"type":"Video","title":"Easy on-device Machine Learning with MediaPipe | Google I/O 2023","url":"https://www.youtube.com/watch?v=yOP_FY2KTm8"},{"type":"Repo","title":"google-ai-edge/mediapipe | GitHub","url":"https://github.com/google-ai-edge/mediapipe"},{"type":"Article","title":"Introducing MediaPipe Solutions for On-Device Machine Learning | Google Developers Blog","url":"https://developers.googleblog.com/introducing-mediapipe-solutions-for-on-device-machine-learning/"}]},"on-device-ai-genai/cloud/firebase-ai-logic":{"id":"on-device-ai-genai/cloud/firebase-ai-logic","title":"Firebase AI Logic","description":"Firebase AI Logic is Firebase's client SDK and proxy layer for calling Google's Gemini API (both Gemini Developer API and Vertex AI Gemini API) directly from Android, iOS, Flutter, and web apps without a backend server. It integrates with **Firebase App Check** to protect your API keys from abuse, and supports hybrid inference that seamlessly falls back from on-device to cloud. Use it when you want fast, secure access to Gemini cloud models with Firebase's mobile-first security and configuration tooling.","resources":[{"type":"Official","title":"Gemini API using Firebase AI Logic | Firebase","url":"https://firebase.google.com/docs/ai-logic"},{"type":"Official","title":"Get started with the Gemini API using the Firebase AI Logic SDKs | Firebase","url":"https://firebase.google.com/docs/ai-logic/get-started"},{"type":"Video","title":"Gemini Nano on Android: Building with on-device gen AI | Android Developers","url":"https://www.youtube.com/watch?v=mP9QESmEDls"},{"type":"Article","title":"Google I/O 2024 recap: Making AI accessible and helpful for every developer | Google Developers Blog","url":"https://developers.googleblog.com/google-io-2024-recap-making-ai-accessible-and-helpful-for-every-developer/"},{"type":"Official","title":"Firebase AI Logic sessions | Google I/O 2024","url":"https://io.google/2024/explore/?q=firebase"}]},"on-device-ai-genai/cloud/vertex-ai-in-firebase":{"id":"on-device-ai-genai/cloud/vertex-ai-in-firebase","title":"Vertex AI in Firebase","description":"Vertex AI in Firebase exposes Google Cloud's Vertex AI Gemini API through the Firebase mobile SDK (`firebase-vertexai`), bringing enterprise-grade scalability, data-privacy guarantees (prompts are never used for model training), and Vertex AI's model lineup directly into Android and other client apps. It is generally available and production-ready, backed by Google Cloud SLAs. Choose it over Firebase AI Logic when you need Vertex AI's advanced models, regions, and compliance guarantees for production workloads.","resources":[{"type":"Official","title":"Gemini API using Vertex AI in Firebase | Firebase","url":"https://firebase.google.com/docs/vertex-ai"},{"type":"Official","title":"Vertex AI Gemini API | Android Developers","url":"https://developer.android.com/ai/vertex-ai-firebase"},{"type":"Video","title":"A walkthrough for Android's on-device GenAI solutions | Spotlight Week | Android Developers","url":"https://www.youtube.com/watch?v=EpKghZYqVW4"},{"type":"Article","title":"Google I/O 2024 recap: Making AI accessible and helpful for every developer | Google Developers Blog","url":"https://developers.googleblog.com/google-io-2024-recap-making-ai-accessible-and-helpful-for-every-developer/"},{"type":"Official","title":"Firebase AI Logic sessions | Google I/O 2024","url":"https://io.google/2024/explore/?q=firebase"}]},"kotlin-multiplatform/kmp/expect-actual":{"id":"kotlin-multiplatform/kmp/expect-actual","title":"expect / actual","description":"The `expect`/`actual` mechanism is Kotlin Multiplatform's compiler-enforced way to declare a platform-agnostic API in `commonMain` and supply platform-specific implementations in each target source set. An `expect` declaration (function, class, object, etc.) carries no implementation body; each platform provides its matching `actual` declaration. The compiler enforces that every `expect` has a corresponding `actual` for every configured target, making it the primary tool for wrapping platform-native APIs cleanly.","resources":[{"type":"Official","title":"Expected and actual declarations | Kotlin Multiplatform Documentation","url":"https://kotlinlang.org/docs/multiplatform-expect-actual.html"},{"type":"Article","title":"\"Expect Actual\" Mechanism in Kotlin Multiplatform Explained | ProAndroidDev","url":"https://proandroiddev.com/expect-actual-mechanism-in-kotlin-multiplatform-explained-a91e7d85af4e"},{"type":"Video","title":"KotlinConf 2024 full playlist | Kotlin by JetBrains","url":"https://www.youtube.com/playlist?list=PLlFc5cFwUnmyXbBGEiwv-CanF2bJyRFiT"},{"type":"Roadmap","title":"Kotlin Multiplatform Developer Roadmap | skydoves/kmp-developer-roadmap","url":"https://github.com/skydoves/kmp-developer-roadmap"},{"type":"Course","title":"Level Up with Kotlin Multiplatform | JetBrains Learning Journey","url":"https://lp.jetbrains.com/kmp-level-up/"}]},"kotlin-multiplatform/kmp/commonmain":{"id":"kotlin-multiplatform/kmp/commonmain","title":"commonMain","description":"`commonMain` is the default shared source set in a KMP project where all code that compiles to every configured target lives. Business logic, data models, use cases, and any multiplatform library calls go here. The Kotlin compiler merges `commonMain` with each platform source set during compilation, so declarations in `commonMain` are available everywhere. Keeping as much logic as possible in `commonMain` is the central goal of a KMP architecture—it maximises code reuse across Android, iOS, desktop, and web.","resources":[{"type":"Official","title":"The basics of Kotlin Multiplatform project structure | Kotlin Documentation","url":"https://kotlinlang.org/docs/multiplatform-discover-project.html"},{"type":"Official","title":"Create your Kotlin Multiplatform app | Kotlin Multiplatform Documentation","url":"https://kotlinlang.org/docs/multiplatform/multiplatform-create-first-app.html"},{"type":"Video","title":"KotlinConf 2024 full playlist | Kotlin by JetBrains","url":"https://www.youtube.com/playlist?list=PLlFc5cFwUnmyXbBGEiwv-CanF2bJyRFiT"},{"type":"Roadmap","title":"Kotlin Multiplatform Developer Roadmap | skydoves/kmp-developer-roadmap","url":"https://github.com/skydoves/kmp-developer-roadmap"},{"type":"Course","title":"Level Up with Kotlin Multiplatform | JetBrains Learning Journey","url":"https://lp.jetbrains.com/kmp-level-up/"}]},"kotlin-multiplatform/kmp/androidmain":{"id":"kotlin-multiplatform/kmp/androidmain","title":"androidMain","description":"`andro
